<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>XCYJ — Claude Code 教程：用 Claude 自动做视觉元素</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      :root {
        /* 底色 —— 午夜深蓝（参考 Nate 32 Tricks 视觉） */
        --c-bg: #0a1124;
        --c-bg-2: #0d172e;
        --c-bg-3: #142042;
        --c-grid: rgba(91, 180, 255, 0.08);
        /* 教程语义色 */
        --c-blue: #5BA9FF;
        --c-blue-glow: rgba(91, 169, 255, 0.55);
        --c-green: #8DD891;
        --c-red: #F05F6E;
        --c-purple: #B891E4;
        --c-yellow: #F0C75E;
        --c-orange: #d97757;
        --c-orange-glow: rgba(217, 119, 87, 0.55);
        /* chrome */
        --c-chrome-1: #ffffff;
        --c-chrome-2: #c8d3e0;
        --c-text: #ffffff;
        --c-text-dim: #96a2b6;
        --c-text-mute: rgba(255, 255, 255, 0.5);
        --c-success: #8DD891;
        --c-warn: #F05F6E;
        /* 字体 */
        --f-zh: "Noto Sans SC", "Inter", sans-serif;
        --f-en: "Inter", system-ui, sans-serif;
        --f-mono: "JetBrains Mono", ui-monospace, monospace;
        /* 字号 */
        --fs-headline: 88px;
        --fs-headline-hero: 120px;
        --fs-card-title: 56px;
        --fs-body: 32px;
        --fs-kicker: 22px;
        --fs-mono: 26px;
        /* halo */
        --halo-orange: 0 0 60px var(--c-orange-glow), 0 0 0 2px var(--c-orange);
        --halo-blue: 0 0 60px rgba(91, 169, 255, 0.5), 0 0 0 2px var(--c-blue);
        --halo-card: 0 24px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.08);
        --halo-soft: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--c-bg);
        font-family: var(--f-zh);
        color: var(--c-text);
      }

      /* -------- Face-cam wrapper --------
         GSAP 动 wrapper 不动 <video>（动 <video> 会冻帧）。
         <video> 内部 width:auto, height:100%, translateX(-50%) 自动竖切。 */
      #face-wrapper {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-origin: 0 0;
        z-index: 0;
        background: #000;
      }
      #face-video {
        position: absolute;
        top: 0;
        left: 50%;
        height: 100%;
        width: auto;
        transform: translateX(-50%);
        display: block;
        filter: contrast(1.05) saturate(1.06);
      }
      /* PiP dress — 缩到右上角时挂这个 class，圆角 + Claude 橙 halo */
      #face-wrapper.pip {
        z-index: 10;
        border-radius: 36px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.55),
          0 0 0 2px rgba(217, 119, 87, 0.6),
          0 0 60px rgba(217, 119, 87, 0.45);
      }

      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
      }

      /* 全屏网格层 z-index 5，叠在 face/beat 之上（半透明所以能透看下层）*/
      #global-grid {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        z-index: 5;
        background-image:
          linear-gradient(var(--c-grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--c-grid) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0;
      }

      /* 全屏暗角层 z-index 6 */
      #global-vignette {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        z-index: 6;
        background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(5, 8, 20, 0.55) 100%);
        opacity: 0;
      }

      /* 全程 grain 永久挂 z-index 8，盖在网格/暗角上 */
      #global-grain {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        z-index: 8;
        opacity: 0.12;
        mix-blend-mode: overlay;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="xcyj-claude-code-tutorial"
      data-start="0"
      data-duration="64.6"
      data-width="1920"
      data-height="1080"
    >
      <!-- 录屏当 V1 底层 + 8 beat overlay 叠在上面（body 的 #0a1124 自动垫底） -->
      <div id="face-wrapper" data-layout-allow-overflow>
        <video
          id="face-video"
          data-start="0"
          data-duration="64.6"
          data-track-index="0"
          src="assets/source.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="face-audio"
        data-start="0"
        data-duration="64.6"
        data-track-index="2"
        data-volume="1"
        src="assets/source.mp4"
      ></audio>

      <!-- 全屏网格 + 暗角（非 timed，全程显示，由 GSAP 控制 fade-in） -->
      <div id="global-grid"></div>
      <div id="global-vignette"></div>

      <!-- 全局 grain（z-index 8，全程 64.6s）-->
      <div
        id="global-grain"
        class="scene-layer"
        data-composition-id="global-grain"
        data-composition-src="compositions/components/grain-overlay.html"
        data-start="0"
        data-duration="64.6"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 1 [0→6.5s] HOOK — "真正耗费时间的不是录制" -->
      <div
        id="beat-1"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="6.5"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 2 [6.5→13s] PAIN LIST — 三痛点 -->
      <div
        id="beat-2"
        class="scene-layer"
        data-composition-id="beat-2-pain-list"
        data-composition-src="compositions/02-pain-list.html"
        data-start="6.5"
        data-duration="6.5"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 3 [13→19s] PAIN VERDICT — 会剪辑的人 vs 普通创作者 -->
      <div
        id="beat-3"
        class="scene-layer"
        data-composition-id="beat-3-pain-verdict"
        data-composition-src="compositions/03-pain-verdict.html"
        data-start="13"
        data-duration="6"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 4 [19→25s] 🌟 PUNCHLINE — "都是 Claude 帮我做的" hero -->
      <div
        id="beat-4"
        class="scene-layer"
        data-composition-id="beat-4-punchline"
        data-composition-src="compositions/04-punchline.html"
        data-start="19"
        data-duration="6"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 5 [25→31.5s] TEACH PROMISE — "教你做这种效果，不需要写代码" -->
      <div
        id="beat-5"
        class="scene-layer"
        data-composition-id="beat-5-promise"
        data-composition-src="compositions/05-promise.html"
        data-start="25"
        data-duration="6.5"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 6 [31.5→42.5s] CONCEPT — 自然语言 → Claude Code → HyperFrames -->
      <div
        id="beat-6"
        class="scene-layer"
        data-composition-id="beat-6-concept"
        data-composition-src="compositions/06-concept.html"
        data-start="31.5"
        data-duration="11"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 7 [42.5→56.5s] FLOW — 完整 5 步流程 + mini chart -->
      <div
        id="beat-7"
        class="scene-layer"
        data-composition-id="beat-7-flow"
        data-composition-src="compositions/07-flow.html"
        data-start="42.5"
        data-duration="14"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 8 [56.5→64.6s] OUTRO — XCYJ 落版 + grid pixelate wipe -->
      <div
        id="beat-8"
        class="scene-layer"
        data-composition-id="beat-8-outro"
        data-composition-src="compositions/08-outro.html"
        data-start="56.5"
        data-duration="8.1"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // ------------ Face-wrapper PiP choreography ------------
      // FULL (0–18.4s)         — face 全屏作为 hook 期 hero
      // PIP  (18.4–60.0s)      — face 缩到右上 540x360（教学段）
      // FULL (60.0–64.6s)      — outro 回归全屏 hero
      const FULL = { x: 0, y: 0, width: 1920, height: 1080 };
      const PIP  = { x: 1380, y: 60, width: 480, height: 320 };

      gsap.set("#face-wrapper", FULL);

      // 全屏 grid + vignette 在 0.6s fade-in 之后全程保持显示
      mainTl.to("#global-grid", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.0);
      mainTl.to("#global-vignette", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.0);

      // 18.4s 缩到 PiP（在 beat-3 末尾，掩护切到 beat-4 hero）
      mainTl.to(
        "#face-wrapper",
        {
          ...PIP,
          duration: 0.60,
          ease: "power3.inOut",
          onStart: () => document.getElementById("face-wrapper").classList.add("pip"),
        },
        18.4
      );

      // 60.0s 放回 full（outro 中段，让脸回归 hero 收尾）
      mainTl.to(
        "#face-wrapper",
        {
          ...FULL,
          duration: 0.50,
          ease: "power3.out",
          onComplete: () => document.getElementById("face-wrapper").classList.remove("pip"),
        },
        60.0
      );

      // 锚点：保证 timeline.duration() >= data-duration（11 法则之 11）
      mainTl.to({}, { duration: 64.6 }, 0);
      window.__timelines["xcyj-claude-code-tutorial"] = mainTl;
    </script>
  </body>
</html>
