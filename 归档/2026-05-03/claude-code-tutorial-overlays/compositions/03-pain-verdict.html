<template id="beat-3-pain-verdict-template">
  <div
    data-composition-id="beat-3-pain-verdict"
    data-start="13"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <!-- NO local grid / vignette — top-level index.html paints them -->

    <!-- Center divider line -->
    <div class="b3-divider"></div>

    <!-- Left panel: 会剪辑的人 ✓ green -->
    <div class="b3-panel-left">
      <div class="b3-check-badge b3-check-green">✓</div>
      <div class="b3-panel-title">会剪辑的人</div>
      <div class="b3-panel-sub">时间富裕</div>
    </div>

    <!-- Right panel: 普通创作者 ✗ red -->
    <div class="b3-panel-right">
      <div class="b3-check-badge b3-check-red">✗</div>
      <div class="b3-panel-title">普通创作者</div>
      <div class="b3-panel-sub">被剪辑吞噬</div>
    </div>

    <!-- Bottom hero line: 差距，就在这里 -->
    <div class="b3-hero">
      <span class="b3-hero-plain">差距，就在</span><span class="b3-hero-hot">这里</span>
    </div>

    <style>
      [data-composition-id="beat-3-pain-verdict"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        background: transparent;
      }

      /* ── Divider ── */
      [data-composition-id="beat-3-pain-verdict"] .b3-divider {
        position: absolute;
        left: 50%;
        top: 12%;
        bottom: 22%;
        width: 1.5px;
        transform: translateX(-50%) scaleY(0);
        transform-origin: top center;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(255,255,255,0.10) 15%,
          rgba(255,255,255,0.20) 50%,
          rgba(255,255,255,0.10) 85%,
          transparent 100%
        );
      }

      /* ── Panels ── */
      [data-composition-id="beat-3-pain-verdict"] .b3-panel-left,
      [data-composition-id="beat-3-pain-verdict"] .b3-panel-right {
        position: absolute;
        top: 50%;
        transform: translateY(-55%);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 32px;
        opacity: 0;
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-panel-left {
        left: 160px;
        width: 700px;
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-panel-right {
        right: 160px;
        width: 700px;
        align-items: flex-end;
        text-align: right;
      }

      /* ── Check badges ── */
      [data-composition-id="beat-3-pain-verdict"] .b3-check-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        font-size: 52px;
        font-weight: 900;
        font-family: "Inter", sans-serif;
        line-height: 1;
        opacity: 0;
        transform: scale(0.5);
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-check-green {
        color: #8DD891;
        background: rgba(141,216,145,0.12);
        border: 2.5px solid #8DD891;
        box-shadow: 0 0 40px rgba(141,216,145,0.35), 0 0 0 0 rgba(141,216,145,0.2);
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-check-red {
        color: #F05F6E;
        background: rgba(240,95,110,0.12);
        border: 2.5px solid #F05F6E;
        box-shadow: 0 0 40px rgba(240,95,110,0.35), 0 0 0 0 rgba(240,95,110,0.2);
      }

      /* ── Panel title ── */
      [data-composition-id="beat-3-pain-verdict"] .b3-panel-title {
        font-size: 88px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1.0;
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 65%, #e8ecf2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        opacity: 0;
        transform: translateY(20px);
        filter: blur(10px);
      }

      /* ── Panel sub ── */
      [data-composition-id="beat-3-pain-verdict"] .b3-panel-sub {
        font-size: 36px;
        font-weight: 600;
        letter-spacing: 0.04em;
        opacity: 0;
        transform: translateY(14px);
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-panel-left .b3-panel-sub {
        color: #8DD891;
        text-shadow: 0 0 20px rgba(141,216,145,0.45);
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-panel-right .b3-panel-sub {
        color: #F05F6E;
        text-shadow: 0 0 20px rgba(240,95,110,0.45);
      }

      /* ── Hero bottom ── */
      [data-composition-id="beat-3-pain-verdict"] .b3-hero {
        position: absolute;
        bottom: 96px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 88px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1.0;
        opacity: 0;
        transform: translateY(24px);
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-hero-plain {
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 65%, #e8ecf2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      [data-composition-id="beat-3-pain-verdict"] .b3-hero-hot {
        color: #F05F6E;
        text-shadow: 0 0 40px rgba(240,95,110,0.6), 0 0 80px rgba(240,95,110,0.3);
        -webkit-background-clip: unset;
        background-clip: unset;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 0. Divider line scales in from top
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-divider',
          { scaleY: 1, duration: 0.55, ease: 'expo.out' }, 0.15);

        // 1. Left panel fades in (t=0.3s)
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-left',
          { opacity: 1, duration: 0.5, ease: 'power3.out' }, 0.3);

        // 1a. Left badge pops (back.out spring)
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-left .b3-check-badge',
          { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(2.0)' }, 0.4);

        // 1b. Left title blur → sharp
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-left .b3-panel-title',
          { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out' }, 0.55);

        // 1c. Left sub slides up
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-left .b3-panel-sub',
          { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0.85);

        // 2. Right panel fades in (t=0.6s — staggered 0.3s after left)
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-right',
          { opacity: 1, duration: 0.5, ease: 'power3.out' }, 0.6);

        // 2a. Right badge pops
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-right .b3-check-badge',
          { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(2.0)' }, 0.7);

        // 2b. Right title blur → sharp
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-right .b3-panel-title',
          { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out' }, 0.85);

        // 2c. Right sub slides up
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-panel-right .b3-panel-sub',
          { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 1.15);

        // 3. Hero bottom line enters (t=1.8s)
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-hero',
          { opacity: 1, y: 0, duration: 0.6, ease: 'back.out(1.4)' }, 1.8);

        // 4. Red badge pulse (ambient — 3 pulses)
        tl.to('[data-composition-id="beat-3-pain-verdict"] .b3-check-red',
          { boxShadow: '0 0 60px rgba(240,95,110,0.7), 0 0 0 12px rgba(240,95,110,0.08)', duration: 0.4, ease: 'sine.inOut', yoyo: true, repeat: 5 }, 2.2);

        // 5. Exit fade
        tl.to('[data-composition-id="beat-3-pain-verdict"]',
          { opacity: 0, duration: 0.5, ease: 'power2.in' }, 5.5);

        // Duration anchor (data-duration="6")
        tl.to({}, { duration: 6 }, 0);
        window.__timelines['beat-3-pain-verdict'] = tl;
      })();
    </script>
  </div>
</template>
