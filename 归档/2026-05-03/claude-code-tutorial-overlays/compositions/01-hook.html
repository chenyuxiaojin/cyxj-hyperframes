<template id="beat-1-hook-template">
  <div
    data-composition-id="beat-1-hook"
    data-start="0"
    data-duration="6.5"
    data-width="1920"
    data-height="1080"
  >
    <!-- Kicker: EP·01 / 时间陷阱 -->
    <div class="b1-kicker">
      <span class="b1-kicker-num">EP·01</span>
      <span class="b1-kicker-sep">/</span>
      <span class="b1-kicker-label">时间陷阱</span>
    </div>

    <!-- Central dialogue bubble with strikethrough (Nate 7.40.04 style) -->
    <div class="b1-bubble-wrap">
      <div class="b1-bubble">
        <span class="b1-bubble-text">录制 30 分钟</span>
        <!-- Red strikethrough line drawn by GSAP width expansion -->
        <div class="b1-strike"></div>
      </div>
    </div>

    <!-- Bottom hero text -->
    <div class="b1-hero">
      <div class="b1-hero-line1">
        <span class="b1-char">真</span><span class="b1-char">正</span><span class="b1-char">耗</span><span class="b1-char">费</span><span class="b1-char">时</span><span class="b1-char">间</span><span class="b1-char">的</span>
      </div>
      <div class="b1-hero-line2">
        从来不是<span class="b1-hot">录制</span>
      </div>
    </div>

    <!-- Red halo glow behind hero (ambient) -->
    <div class="b1-halo"></div>

    <style>
      [data-composition-id="beat-1-hook"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        background: transparent;
      }

      /* ── Kicker ── */
      [data-composition-id="beat-1-hook"] .b1-kicker {
        position: absolute;
        top: 56px;
        left: 56px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
      }
      [data-composition-id="beat-1-hook"] .b1-kicker-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: #d97757;
        text-shadow: 0 0 16px rgba(217,119,87,0.65);
      }
      [data-composition-id="beat-1-hook"] .b1-kicker-sep {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 400;
        color: rgba(150, 162, 182, 0.6);
        letter-spacing: 0;
      }
      [data-composition-id="beat-1-hook"] .b1-kicker-label {
        font-family: "Noto Sans SC", "Inter", sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: #ffffff;
      }

      /* ── Bubble (central) ── */
      [data-composition-id="beat-1-hook"] .b1-bubble-wrap {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        margin-top: -80px;
        opacity: 0;
      }
      [data-composition-id="beat-1-hook"] .b1-bubble {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 28px 56px;
        background: #0d172e;
        border: 1.5px solid rgba(91, 169, 255, 0.28);
        border-radius: 50px;
        box-shadow:
          0 24px 60px rgba(0,0,0,0.55),
          0 0 0 1px rgba(255,255,255,0.06) inset;
      }
      [data-composition-id="beat-1-hook"] .b1-bubble-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 38px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(255,255,255,0.85);
        white-space: nowrap;
        position: relative;
        z-index: 1;
      }
      /* Red strikethrough line — width animated from 0 to 100% by GSAP */
      [data-composition-id="beat-1-hook"] .b1-strike {
        position: absolute;
        left: 56px;
        right: 56px;
        top: 50%;
        transform: translateY(-50%) rotate(-4deg);
        height: 3px;
        width: 0%;
        background: #F05F6E;
        border-radius: 2px;
        box-shadow: 0 0 12px rgba(240,95,110,0.75), 0 0 4px rgba(240,95,110,0.9);
        z-index: 2;
        transform-origin: left center;
      }

      /* ── Hero text (bottom area) ── */
      [data-composition-id="beat-1-hook"] .b1-hero {
        position: absolute;
        bottom: 140px;
        left: 88px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        line-height: 1.05;
      }
      [data-composition-id="beat-1-hook"] .b1-hero-line1,
      [data-composition-id="beat-1-hook"] .b1-hero-line2 {
        font-size: 88px;
        font-weight: 900;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 62%, #e8ecf2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      [data-composition-id="beat-1-hook"] .b1-char {
        display: inline-block;
        opacity: 0;
      }
      [data-composition-id="beat-1-hook"] .b1-hero-line2 {
        opacity: 0;
      }
      /* Red hot word 录制 */
      [data-composition-id="beat-1-hook"] .b1-hot {
        background: linear-gradient(180deg, #ff8a94 0%, #F05F6E 60%, #d94050 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        display: inline-block;
        filter: drop-shadow(0 0 18px rgba(240,95,110,0.65));
      }

      /* ── Red ambient halo (behind hero) ── */
      [data-composition-id="beat-1-hook"] .b1-halo {
        position: absolute;
        bottom: 60px;
        left: -60px;
        width: 900px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(ellipse at 30% 80%, rgba(240,95,110,0.18) 0%, transparent 70%);
        pointer-events: none;
        opacity: 0;
        filter: blur(40px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 0.0s — kicker slides in from left
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-kicker',
          { x: -24, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.5, ease: 'power3.out' },
          0.1);

        // 0.4s — bubble fades in from below
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-bubble-wrap',
          { y: 24, opacity: 0, filter: 'blur(10px)' },
          { y: 0, opacity: 1, filter: 'blur(0px)', duration: 0.55, ease: 'back.out(1.4)' },
          0.4);

        // 1.1s — red strikethrough sweeps across bubble text
        tl.to('[data-composition-id="beat-1-hook"] .b1-strike',
          { width: '100%', duration: 0.45, ease: 'expo.out' },
          1.1);

        // 1.5s — bubble dims slightly after struck
        tl.to('[data-composition-id="beat-1-hook"] .b1-bubble-text',
          { opacity: 0.45, duration: 0.3, ease: 'power2.out' },
          1.55);

        // 1.8s — red halo glows up
        tl.to('[data-composition-id="beat-1-hook"] .b1-halo',
          { opacity: 1, duration: 0.7, ease: 'power2.out' },
          1.8);

        // 2.0s — hero line1 char stagger
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-hero-line1 .b1-char',
          { y: 40, opacity: 0, filter: 'blur(14px)' },
          { y: 0, opacity: 1, filter: 'blur(0px)', stagger: 0.07, duration: 0.55, ease: 'back.out(1.4)' },
          2.0);

        // 2.6s — hero line2 enters
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-hero-line2',
          { y: 30, opacity: 0, filter: 'blur(14px)' },
          { y: 0, opacity: 1, filter: 'blur(0px)', duration: 0.55, ease: 'back.out(1.4)' },
          2.6);

        // 3.0s — hot word 「录制」 pulse scale
        tl.fromTo('[data-composition-id="beat-1-hook"] .b1-hot',
          { scale: 1 },
          { scale: 1.07, duration: 0.18, ease: 'power2.out', yoyo: true, repeat: 1 },
          3.1);

        // 5.6s — exit: whole beat fades + blurs out
        tl.to('[data-composition-id="beat-1-hook"]',
          { opacity: 0, filter: 'blur(8px)', duration: 0.7, ease: 'power2.in' },
          5.6);

        // Duration anchor
        tl.to({}, { duration: 6.5 }, 0);
        window.__timelines['beat-1-hook'] = tl;
      })();
    </script>
  </div>
</template>
