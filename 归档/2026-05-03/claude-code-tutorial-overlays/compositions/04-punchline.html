<template id="beat-4-punchline-template">
  <div
    data-composition-id="beat-4-punchline"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <!-- 全片支点：观众听到「都是 Claude 帮我做的」会本能怀疑「真的吗？」
         必须用真实工具的可见证据回答。布局：headline 中央 + 仿真 terminal 左下
         + macos notification 右中（避开右上 face PiP 540×360 区域）+ ↑ 弧线
         箭头从 headline 指向 face PiP（那是「我」，所有视觉都是 Claude 做的）
         + 3 个 evidence tags 飞向画面三角，5s hold 落在静态。 -->

    <div class="b4-stage">
      <!-- 中央橙色扩散光（隐喻 Claude 的存在）-->
      <div class="b4-orange-radial"></div>

      <!-- 中央橙色发光 orb（隐喻 Claude 的存在）-->
      <div class="b4-orb">
        <div class="b4-orb-core"></div>
        <!-- Ripple rings -->
        <div class="b4-ripple b4-ripple-1"></div>
        <div class="b4-ripple b4-ripple-2"></div>
        <div class="b4-ripple b4-ripple-3"></div>
      </div>

      <!-- 弧线箭头：从 headline 顶部往右上 face PiP 方向画弧 -->
      <svg class="b4-arrow-up" viewBox="0 0 600 320" fill="none">
        <defs>
          <linearGradient id="b4-arrow-grad" x1="0" y1="320" x2="600" y2="0">
            <stop offset="0" stop-color="#d97757" stop-opacity="0.0" />
            <stop offset="0.3" stop-color="#d97757" stop-opacity="0.7" />
            <stop offset="1" stop-color="#d97757" stop-opacity="1.0" />
          </linearGradient>
          <filter id="b4-arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <!-- Glow layer (wider stroke, blurred) -->
        <path
          class="b4-arrow-path-glow"
          d="M 60 300 C 200 280, 380 180, 540 60"
          stroke="rgba(217,119,87,0.45)"
          stroke-width="14"
          stroke-linecap="round"
          filter="url(#b4-arrow-glow)"
        />
        <!-- Main stroke -->
        <path
          class="b4-arrow-path"
          d="M 60 300 C 200 280, 380 180, 540 60"
          stroke="url(#b4-arrow-grad)"
          stroke-width="5"
          stroke-linecap="round"
        />
        <path
          class="b4-arrow-head"
          d="M 540 60 L 510 80 M 540 60 L 520 90"
          stroke="#d97757"
          stroke-width="5"
          stroke-linecap="round"
          filter="url(#b4-arrow-glow)"
        />
      </svg>

      <!-- Headline：「都是 Claude 帮我做的」 -->
      <div class="b4-headline">
        <span class="b4-char">都</span>
        <span class="b4-char">是</span>
        <span class="b4-char b4-keyword">C</span>
        <span class="b4-char b4-keyword">l</span>
        <span class="b4-char b4-keyword">a</span>
        <span class="b4-char b4-keyword">u</span>
        <span class="b4-char b4-keyword">d</span>
        <span class="b4-char b4-keyword">e</span>
        <span class="b4-char">&nbsp;</span>
        <span class="b4-char">帮</span>
        <span class="b4-char">我</span>
        <span class="b4-char">做</span>
        <span class="b4-char">的</span>
      </div>

      <!-- 伪 macOS terminal（ANSI 多色高亮）-->
      <div class="b4-terminal">
        <div class="b4-term-bar">
          <span class="b4-dot b4-dot-r"></span>
          <span class="b4-dot b4-dot-y"></span>
          <span class="b4-dot b4-dot-g"></span>
          <span class="b4-term-title">Terminal — claude</span>
          <span class="b4-led"></span>
        </div>
        <div class="b4-term-body">
          <!-- Line 1: prompt + command -->
          <div class="b4-term-line b4-l1">
            <span class="b4-prompt-sym">&gt;</span>
            <span class="b4-cmd-name"> /context</span>
          </div>
          <!-- Line 2: section header -->
          <div class="b4-term-line b4-l2">
            <span class="b4-section-header">Context Usage Breakdown</span>
          </div>
          <!-- Line 3: row highlight (yellow key, cyan value) -->
          <div class="b4-term-line b4-l3">
            <span class="b4-ansi-yellow">System prompt</span>
            <span class="b4-ansi-dim-tab">    12,400</span>
            <span class="b4-ansi-green"> 18%</span>
          </div>
          <!-- Line 4: orange key -->
          <div class="b4-term-line b4-l4">
            <span class="b4-ansi-orange">CLAUDE.md</span>
            <span class="b4-ansi-dim-tab">        8,200</span>
            <span class="b4-ansi-green"> 12%</span>
          </div>
          <!-- Line 5: red key -->
          <div class="b4-term-line b4-l5">
            <span class="b4-ansi-red">File contents</span>
            <span class="b4-ansi-dim-tab">    31,600</span>
            <span class="b4-ansi-orange"> 46%</span>
          </div>
          <!-- Line 6: dim row + comment -->
          <div class="b4-term-line b4-l6">
            <span class="b4-ansi-dim">MCP servers</span>
            <span class="b4-ansi-dim-tab">       9,800</span>
            <span class="b4-ansi-dim"> 14%</span>
            <span class="b4-ansi-comment">  // ✓ Done</span>
          </div>
          <!-- Line 7: total -->
          <div class="b4-term-line b4-l7">
            <span class="b4-ansi-bold">Total</span>
            <span class="b4-ansi-dim-tab">    68,900 / </span>
            <span class="b4-ansi-blue">200K</span>
          </div>
        </div>
      </div>

      <!-- macOS-style notification（位于右中，避开右上 face PiP）-->
      <div class="b4-notif">
        <div class="b4-notif-icon">
          <svg viewBox="0 0 36 36">
            <rect width="36" height="36" rx="8" fill="#d97757" />
            <text
              x="18"
              y="24"
              text-anchor="middle"
              font-family="Inter, sans-serif"
              font-size="16"
              font-weight="800"
              fill="#fff"
            >C</text>
          </svg>
        </div>
        <div class="b4-notif-body">
          <div class="b4-notif-head">
            <span class="b4-notif-app">CLAUDE CODE</span>
            <span class="b4-notif-time">now</span>
          </div>
          <div class="b4-notif-title">已生成 12 个动效元素</div>
          <div class="b4-notif-sub">scene-2 shimmer · title slam · card stagger…</div>
        </div>
      </div>

      <!-- 3 个 evidence tags：从 terminal 上方飞向画面三个角落 -->
      <div class="b4-tag b4-tag-1">
        <span class="b4-tag-arrow">←</span>
        <span class="b4-tag-text">shimmer · Claude</span>
      </div>
      <div class="b4-tag b4-tag-2">
        <span class="b4-tag-arrow">←</span>
        <span class="b4-tag-text">title slam · Claude</span>
      </div>
      <div class="b4-tag b4-tag-3">
        <span class="b4-tag-arrow">←</span>
        <span class="b4-tag-text">card stagger · Claude</span>
      </div>
    </div>

    <style>
      [data-composition-id="beat-4-punchline"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
      }
      [data-composition-id="beat-4-punchline"] .b4-stage {
        position: absolute;
        inset: 0;
      }

      /* ---------- 中央橙色扩散光（不是 grid/vignette，是 beat 装饰） ---------- */
      [data-composition-id="beat-4-punchline"] .b4-orange-radial {
        position: absolute;
        left: 280px;
        top: 280px;
        width: 1000px;
        height: 700px;
        background: radial-gradient(
          ellipse at center,
          rgba(217, 119, 87, 0.28) 0%,
          rgba(217, 119, 87, 0.06) 45%,
          transparent 70%
        );
        opacity: 0;
        filter: blur(24px);
        pointer-events: none;
        z-index: 0;
      }

      /* ---------- 中央橙色 orb + ripple ---------- */
      [data-composition-id="beat-4-punchline"] .b4-orb {
        position: absolute;
        left: 660px;
        top: 220px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        opacity: 0;
        transform: scale(0);
        z-index: 2;
      }
      [data-composition-id="beat-4-punchline"] .b4-orb-core {
        position: absolute;
        inset: 55px;
        background: radial-gradient(
          circle,
          #ffd2bc 0%,
          #d97757 40%,
          rgba(217, 119, 87, 0.0) 80%
        );
        border-radius: 50%;
        box-shadow:
          0 0 50px rgba(217, 119, 87, 0.9),
          0 0 100px rgba(217, 119, 87, 0.55),
          0 0 180px rgba(217, 119, 87, 0.35);
      }

      /* Ripple rings */
      [data-composition-id="beat-4-punchline"] .b4-ripple {
        position: absolute;
        top: 50%;
        left: 50%;
        border-radius: 50%;
        border: 1.5px solid rgba(217, 119, 87, 0.55);
        transform: translate(-50%, -50%) scale(0.5);

        pointer-events: none;
      }
      [data-composition-id="beat-4-punchline"] .b4-ripple-1 { width: 140px; height: 140px; }
      [data-composition-id="beat-4-punchline"] .b4-ripple-2 { width: 190px; height: 190px; border-color: rgba(217, 119, 87, 0.35); }
      [data-composition-id="beat-4-punchline"] .b4-ripple-3 { width: 240px; height: 240px; border-color: rgba(217, 119, 87, 0.18); }

      /* ---------- 弧线箭头 ---------- */
      [data-composition-id="beat-4-punchline"] .b4-arrow-up {
        position: absolute;
        left: 760px;
        top: 90px;
        width: 600px;
        height: 320px;

        pointer-events: none;
        z-index: 3;
      }
      [data-composition-id="beat-4-punchline"] .b4-arrow-path,
      [data-composition-id="beat-4-punchline"] .b4-arrow-path-glow {
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
      }
      [data-composition-id="beat-4-punchline"] .b4-arrow-head {
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
      }

      /* ---------- Headline ---------- */
      [data-composition-id="beat-4-punchline"] .b4-headline {
        position: absolute;
        left: 80px;
        top: 420px;
        width: 1260px;
        font-size: 120px;
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: 0.02em;
        text-shadow: 0 6px 36px rgba(0, 0, 0, 0.7);
        z-index: 4;
      }
      [data-composition-id="beat-4-punchline"] .b4-char {
        display: inline-block;
        opacity: 0;
        /* Chrome gradient fill */
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 62%, #e8ecf2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        white-space: pre;
      }
      [data-composition-id="beat-4-punchline"] .b4-keyword {
        background: linear-gradient(180deg, #ffd2bc 0%, #d97757 55%, #b85c3a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 16px rgba(217, 119, 87, 0.75));
        font-family: "Inter", sans-serif;
        font-style: italic;
      }

      /* ---------- Terminal ---------- */
      [data-composition-id="beat-4-punchline"] .b4-terminal {
        position: absolute;
        left: 80px;
        top: 690px;
        width: 940px;
        background: rgba(13, 17, 28, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 14px;
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(217, 119, 87, 0.09),
          0 0 36px rgba(217, 119, 87, 0.16);
        opacity: 0;
        overflow: hidden;
        z-index: 4;
      }
      [data-composition-id="beat-4-punchline"] .b4-term-bar {
        position: relative;
        height: 38px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(24, 28, 40, 0.92);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      [data-composition-id="beat-4-punchline"] .b4-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      [data-composition-id="beat-4-punchline"] .b4-dot-r { background: #ff5f57; }
      [data-composition-id="beat-4-punchline"] .b4-dot-y { background: #febc2e; }
      [data-composition-id="beat-4-punchline"] .b4-dot-g { background: #28c840; }
      [data-composition-id="beat-4-punchline"] .b4-term-title {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.45);
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      [data-composition-id="beat-4-punchline"] .b4-led {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #28c840;
        box-shadow: 0 0 12px #28c840, 0 0 24px rgba(40, 200, 64, 0.6);
        opacity: 0;
      }
      [data-composition-id="beat-4-punchline"] .b4-term-body {
        padding: 18px 24px 22px;
        font-family: "JetBrains Mono", monospace;

        line-height: 1.65;
      }
      [data-composition-id="beat-4-punchline"] .b4-term-line {
        opacity: 0;
        white-space: nowrap;
        display: block;
      }

      /* ANSI color classes */
      [data-composition-id="beat-4-punchline"] .b4-prompt-sym {
        color: #8dd891;   /* green prompt > */
        font-weight: 700;
        margin-right: 4px;
      }
      [data-composition-id="beat-4-punchline"] .b4-cmd-name {
        color: #5ba9ff;   /* blue command name */
        font-weight: 600;
      }
      [data-composition-id="beat-4-punchline"] .b4-section-header {
        color: #5ba9ff;   /* blue header */
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      [data-composition-id="beat-4-punchline"] .b4-ansi-yellow { color: #f0c75e; }
      [data-composition-id="beat-4-punchline"] .b4-ansi-orange { color: #d97757; }
      [data-composition-id="beat-4-punchline"] .b4-ansi-red    { color: #f05f6e; }
      [data-composition-id="beat-4-punchline"] .b4-ansi-green  { color: #8dd891; }
      [data-composition-id="beat-4-punchline"] .b4-ansi-blue   { color: #5ba9ff; }
      [data-composition-id="beat-4-punchline"] .b4-ansi-bold   {
        color: rgba(255,255,255,0.92);
        font-weight: 700;
      }
      [data-composition-id="beat-4-punchline"] .b4-ansi-dim {
        color: rgba(150, 162, 182, 0.75);
      }
      [data-composition-id="beat-4-punchline"] .b4-ansi-dim-tab {
        color: rgba(150, 162, 182, 0.65);
      }
      [data-composition-id="beat-4-punchline"] .b4-ansi-comment {
        color: rgba(150, 162, 182, 0.45);
        font-style: italic;
      }

      /* ---------- macOS notification ---------- */
      [data-composition-id="beat-4-punchline"] .b4-notif {
        position: absolute;
        right: 60px;
        top: 440px;
        width: 480px;
        padding: 18px 18px 18px 16px;
        background: rgba(30, 30, 30, 0.88);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border-radius: 18px;
        box-shadow:
          0 14px 40px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 0 30px rgba(217, 119, 87, 0.18);
        display: flex;
        gap: 14px;
        align-items: flex-start;
        opacity: 0;
        transform: translateX(220px);
        z-index: 4;
      }
      [data-composition-id="beat-4-punchline"] .b4-notif-icon {
        width: 40px;
        height: 40px;
        border-radius: 9px;
        overflow: hidden;
        flex-shrink: 0;
      }
      [data-composition-id="beat-4-punchline"] .b4-notif-body {
        flex: 1;

      }
      [data-composition-id="beat-4-punchline"] .b4-notif-head {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      [data-composition-id="beat-4-punchline"] .b4-notif-app {
        font-family: "Inter", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.55);
      }
      [data-composition-id="beat-4-punchline"] .b4-notif-time {
        font-family: "Inter", sans-serif;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
      }
      [data-composition-id="beat-4-punchline"] .b4-notif-title {
        font-family: "Noto Sans SC", sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 2px;
      }
      [data-composition-id="beat-4-punchline"] .b4-notif-sub {
        font-family: "JetBrains Mono", monospace;

        line-height: 1.35;
      }

      /* ---------- Evidence tags ---------- */
      [data-composition-id="beat-4-punchline"] .b4-tag {
        position: absolute;
        padding: 8px 16px;
        background: rgba(217, 119, 87, 0.15);
        border: 1px solid rgba(217, 119, 87, 0.5);
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        color: #ffd2bc;

        -webkit-backdrop-filter: blur(12px);

      }
      [data-composition-id="beat-4-punchline"] .b4-tag-arrow {
        color: #d97757;
        margin-right: 8px;
        font-weight: 700;
      }
      [data-composition-id="beat-4-punchline"] .b4-tag-1 { left: 60px; top: 60px; }
      [data-composition-id="beat-4-punchline"] .b4-tag-2 { left: 60px; top: 188px; }
      [data-composition-id="beat-4-punchline"] .b4-tag-3 { left: 60px; top: 316px; }
    </style>

    <script>
      (function () {
        const tpl = document.getElementById("beat-4-punchline-template");
        const target = document.querySelector("#beat-4");
        if (target && !target.firstElementChild) {
          target.appendChild(tpl.content.cloneNode(true));
        }

        const tl = gsap.timeline({ paused: true });

        // 1. Orange radial backdrop
        tl.to('[data-composition-id="beat-4-punchline"] .b4-orange-radial',
          { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.1);

        // 2. Arced arrow stroke-draw
        tl.to('[data-composition-id="beat-4-punchline"] .b4-arrow-up',
          { opacity: 1, duration: 0.15 }, 0.0);
        tl.to('[data-composition-id="beat-4-punchline"] .b4-arrow-path-glow',
          { strokeDashoffset: 0, duration: 0.65, ease: "power2.inOut" }, 0.0);
        tl.to('[data-composition-id="beat-4-punchline"] .b4-arrow-path',
          { strokeDashoffset: 0, duration: 0.65, ease: "power2.inOut" }, 0.0);
        tl.to('[data-composition-id="beat-4-punchline"] .b4-arrow-head',
          { strokeDashoffset: 0, duration: 0.22, ease: "power2.out" }, 0.6);

        // 3. Headline 13 字 stagger blur clear
        tl.to('[data-composition-id="beat-4-punchline"] .b4-char',
          { opacity: 1, duration: 0.01 }, 0.25);
        tl.from('[data-composition-id="beat-4-punchline"] .b4-char',
          {
            y: 28,
            scale: 0.87,
            filter: "blur(14px)",
            stagger: 0.048,
            duration: 0.5,
            ease: "back.out(1.7)",
          }, 0.25);

        // 4. Claude keyword double-bounce 强调
        tl.to('[data-composition-id="beat-4-punchline"] .b4-keyword',
          { scale: 1.10, duration: 0.16, ease: "power2.out" }, 0.92);
        tl.to('[data-composition-id="beat-4-punchline"] .b4-keyword',
          { scale: 1.0, duration: 0.20, ease: "power2.in" }, 1.08);

        // 5. Claude orb scale + halo bloom
        tl.to('[data-composition-id="beat-4-punchline"] .b4-orb',
          { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 0.75);

        // 5b. Ripple wave animation — staggered loops (finite for deterministic capture)
        tl.fromTo('[data-composition-id="beat-4-punchline"] .b4-ripple-1',
          { scale: 0.5, opacity: 0.75 },
          { scale: 1.8, opacity: 0, duration: 1.5, ease: "power1.out", repeat: 2 }, 1.1);
        tl.fromTo('[data-composition-id="beat-4-punchline"] .b4-ripple-2',
          { scale: 0.5, opacity: 0.55 },
          { scale: 1.8, opacity: 0, duration: 1.5, ease: "power1.out", repeat: 2, delay: 0.5 }, 1.1);
        tl.fromTo('[data-composition-id="beat-4-punchline"] .b4-ripple-3',
          { scale: 0.5, opacity: 0.35 },
          { scale: 1.8, opacity: 0, duration: 1.5, ease: "power1.out", repeat: 2, delay: 1.0 }, 1.1);

        // 6. Terminal 入场
        tl.fromTo('[data-composition-id="beat-4-punchline"] .b4-terminal',
          { y: 55, scale: 0.93 },
          { y: 0, scale: 1, opacity: 1, duration: 0.5, ease: "power3.out" }, 1.0);

        // 7. LED 绿点亮 + 持续呼吸
        tl.to('[data-composition-id="beat-4-punchline"] .b4-led',
          { opacity: 1, duration: 0.2 }, 1.5);
        tl.to('[data-composition-id="beat-4-punchline"] .b4-led',
