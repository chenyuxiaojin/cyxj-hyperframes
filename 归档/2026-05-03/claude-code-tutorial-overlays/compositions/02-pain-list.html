<template id="beat-2-pain-list-template">
  <div
    data-composition-id="beat-2-pain-list"
    data-start="6.5"
    data-duration="6.5"
    data-width="1920"
    data-height="1080"
  >
    <!-- Kicker: META / 真相对刻 -->
    <div class="b2-kicker">
      <span class="b2-kicker-num">META</span>
      <span class="b2-kicker-sep">/</span>
      <span class="b2-kicker-label">真相对刻</span>
    </div>

    <!-- Section subtitle above cards -->
    <div class="b2-subtitle">剪辑工作量，从哪里来？</div>

    <!-- Three pain-point cards: horizontal layout -->
    <!-- Card 1: 调动效 -->
    <div class="b2-card b2-card-1">
      <div class="b2-card-icon">⚙️</div>
      <div class="b2-card-title">调动效</div>
      <div class="b2-card-desc">逐帧调曲线<br>对齐每个字</div>
      <div class="b2-card-tag">Motion</div>
    </div>

    <!-- Card 2: 字幕同步 -->
    <div class="b2-card b2-card-2">
      <div class="b2-card-icon">📝</div>
      <div class="b2-card-title">字幕同步</div>
      <div class="b2-card-desc">逐句对时间轴<br>改错别字</div>
      <div class="b2-card-tag">Subtitle</div>
    </div>

    <!-- Card 3: 转场切换 -->
    <div class="b2-card b2-card-3">
      <div class="b2-card-icon">🎬</div>
      <div class="b2-card-title">转场切换</div>
      <div class="b2-card-desc">卡点、拼接<br>反复预览</div>
      <div class="b2-card-tag">Transition</div>
    </div>

    <style>
      [data-composition-id="beat-2-pain-list"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        background: transparent;
      }

      /* ── Kicker ── */
      [data-composition-id="beat-2-pain-list"] .b2-kicker {
        position: absolute;
        top: 56px;
        left: 56px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
      }
      [data-composition-id="beat-2-pain-list"] .b2-kicker-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: #d97757;
        text-shadow: 0 0 16px rgba(217,119,87,0.65);
      }
      [data-composition-id="beat-2-pain-list"] .b2-kicker-sep {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 400;
        color: rgba(150, 162, 182, 0.6);
        letter-spacing: 0;
      }
      [data-composition-id="beat-2-pain-list"] .b2-kicker-label {
        font-family: "Noto Sans SC", "Inter", sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: #ffffff;
      }

      /* ── Section subtitle ── */
      [data-composition-id="beat-2-pain-list"] .b2-subtitle {
        position: absolute;
        top: 148px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        font-size: 32px;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: rgba(150, 162, 182, 0.85);
        opacity: 0;
      }

      /* ── Card shared ── */
      [data-composition-id="beat-2-pain-list"] .b2-card {
        position: absolute;
        top: 50%;
        transform: translateY(calc(-50% + 40px));
        width: 440px;
        padding: 48px 40px 40px;
        background: linear-gradient(150deg, #0d172e 0%, #142042 100%);
        border: 1.5px solid rgba(255,255,255,0.10);
        border-radius: 24px;
        box-shadow:
          0 24px 60px rgba(0,0,0,0.55),
          0 0 0 1px rgba(255,255,255,0.06) inset,
          0 0 50px rgba(240,95,110,0.08);
        display: flex;
        flex-direction: column;
        gap: 16px;
        opacity: 0;
        filter: blur(14px);
      }

      /* Card positions: centered group of 3 */
      [data-composition-id="beat-2-pain-list"] .b2-card-1 { left: 100px; }
      [data-composition-id="beat-2-pain-list"] .b2-card-2 { left: 740px; }
      [data-composition-id="beat-2-pain-list"] .b2-card-3 { left: 1380px; }

      /* ── Card icon ── */
      [data-composition-id="beat-2-pain-list"] .b2-card-icon {
        font-size: 56px;
        line-height: 1;
        filter: drop-shadow(0 0 12px rgba(240,95,110,0.45));
      }

      /* ── Card title ── */
      [data-composition-id="beat-2-pain-list"] .b2-card-title {
        font-family: "Noto Sans SC", "Inter", sans-serif;
        font-size: 56px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1.0;
        background: linear-gradient(180deg, #ff8a94 0%, #F05F6E 55%, #d94050 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 14px rgba(240,95,110,0.45));
      }

      /* ── Card desc ── */
      [data-composition-id="beat-2-pain-list"] .b2-card-desc {
        font-family: "Noto Sans SC", "Inter", sans-serif;
        font-size: 26px;
        font-weight: 400;
        line-height: 1.5;
        color: rgba(150,162,182,0.85);
      }

      /* ── Card tag ── */
      [data-composition-id="beat-2-pain-list"] .b2-card-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: #F05F6E;
        text-shadow: 0 0 10px rgba(240,95,110,0.50);
        margin-top: 8px;
      }

      /* ── Card red left border accent (enters after card) ── */
      [data-composition-id="beat-2-pain-list"] .b2-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 24px;
        bottom: 24px;
        width: 3px;
        border-radius: 2px;
        background: linear-gradient(180deg, #F05F6E, rgba(240,95,110,0));
        box-shadow: 0 0 14px rgba(240,95,110,0.6);
        transform: scaleY(0);
        transform-origin: top center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 0.1s — kicker entrance
        tl.fromTo('[data-composition-id="beat-2-pain-list"] .b2-kicker',
          { x: -24, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.5, ease: 'power3.out' },
          0.1);

        // 0.4s — subtitle
        tl.fromTo('[data-composition-id="beat-2-pain-list"] .b2-subtitle',
          { y: 10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: 'power3.out' },
          0.4);

        // Cards stagger in: 0.6, 0.75, 0.90s (stagger 0.15s)
        // Card 1 at 0.6
        tl.fromTo('[data-composition-id="beat-2-pain-list"] .b2-card-1',
          { y: 'calc(-50% + 60px)', opacity: 0, filter: 'blur(14px)' },
          { y: 'calc(-50% + 40px)', opacity: 1, filter: 'blur(0px)', duration: 0.65, ease: 'back.out(1.4)' },
          0.6);
        tl.to('[data-composition-id="beat-2-pain-list"] .b2-card-1::before',
          { scaleY: 1, duration: 0.4, ease: 'expo.out' },
          1.0);

        // Card 2 at 0.75
        tl.fromTo('[data-composition-id="beat-2-pain-list"] .b2-card-2',
          { y: 'calc(-50% + 60px)', opacity: 0, filter: 'blur(14px)' },
          { y: 'calc(-50% + 40px)', opacity: 1, filter: 'blur(0px)', duration: 0.65, ease: 'back.out(1.4)' },
          0.75);
        tl.to('[data-composition-id="beat-2-pain-list"] .b2-card-2::before',
          { scaleY: 1, duration: 0.4, ease: 'expo.out' },
          1.15);

        // Card 3 at 0.90
        tl.fromTo('[data-composition-id="beat-2-pain-list"] .b2-card-3',
          { y: 'calc(-50% + 60px)', opacity: 0, filter: 'blur(14px)' },
          { y: 'calc(-50% + 40px)', opacity: 1, filter: 'blur(0px)', duration: 0.65, ease: 'back.out(1.4)' },
          0.9);
        tl.to('[data-composition-id="beat-2-pain-list"] .b2-card-3::before',
          { scaleY: 1, duration: 0.4, ease: 'expo.out' },
          1.3);

        // 5.6s — exit: all elements fade + blur out
        tl.to('[data-composition-id="beat-2-pain-list"]',
          { opacity: 0, filter: 'blur(8px)', duration: 0.7, ease: 'power2.in' },
          5.6);

        // Duration anchor
        tl.to({}, { duration: 6.5 }, 0);
        window.__timelines['beat-2-pain-list'] = tl;
      })();
    </script>
  </div>
</template>
