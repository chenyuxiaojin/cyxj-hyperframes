    <style>
      [data-composition-id="beat-7-flow"] {

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const ROOT = '[data-composition-id="beat-7-flow"]';

        // 0. Kicker slides in
        tl.to(ROOT + ' .b7-kicker',
          { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' },
          0.2
        );

        // 1. Panel slides up + de-blur
        tl.to(ROOT + ' .b7-panel',
          { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.7, ease: 'power3.out' },
          0.4
        );

        // ─── Each step: item slides in, check draws, QA tag fades in ───
        // Total beat duration: 14s. Kicker: 0-1s. Steps 1-5: t=1.2 to t=12.7 (~2.3s each)
        // Step timing: step_n starts at 1.2 + (n-1)*2.2

        // Helper timing: step offsets
        var stepTimes = [1.2, 3.4, 5.6, 7.8, 10.0];

        // Step 1
        tl.to(ROOT + ' .b7-item-1',
          { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' },
          stepTimes[0]
        );
        tl.to(ROOT + ' .b7-item-1',
          {
            backgroundColor: 'rgba(91,169,255,0.06)',
            borderColor: 'rgba(91,169,255,0.35)',
            boxShadow: '0 0 30px rgba(91,169,255,0.12), inset 0 0 20px rgba(91,169,255,0.04)',
            duration: 0.35, ease: 'power2.out'
          },
          stepTimes[0] + 0.5
        );
        tl.to(ROOT + ' .b7-mark-1',
          { strokeDashoffset: 0, duration: 0.45, ease: 'power2.out' },
          stepTimes[0] + 0.55
        );
        tl.to(ROOT + ' .b7-item-1 .b7-qa-tag',
          { opacity: 1, duration: 0.35, ease: 'power2.out' },
          stepTimes[0] + 1.1
        );
        tl.to(ROOT + ' .b7-step-text',
          { color: '#ffffff', duration: 0.01 },
          stepTimes[0] + 0.5
        );

        // Step 2
        tl.to(ROOT + ' .b7-item-2',
          { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' },
          stepTimes[1]
        );
        tl.to(ROOT + ' .b7-item-2',
          {
            backgroundColor: 'rgba(91,169,255,0.06)',
            borderColor: 'rgba(91,169,255,0.35)',
            boxShadow: '0 0 30px rgba(91,169,255,0.12), inset 0 0 20px rgba(91,169,255,0.04)',
            duration: 0.35, ease: 'power2.out'
          },
          stepTimes[1] + 0.5
        );
        tl.to(ROOT + ' .b7-mark-2',
          { strokeDashoffset: 0, duration: 0.45, ease: 'power2.out' },
          stepTimes[1] + 0.55
        );
        tl.to(ROOT + ' .b7-item-2 .b7-qa-tag',
          { opacity: 1, duration: 0.35, ease: 'power2.out' },
          stepTimes[1] + 1.1
        );

        // Step 3
        tl.to(ROOT + ' .b7-item-3',
          { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' },
          stepTimes[2]
        );
        tl.to(ROOT + ' .b7-item-3',
          {
            backgroundColor: 'rgba(91,169,255,0.06)',
            borderColor: 'rgba(91,169,255,0.35)',
            boxShadow: '0 0 30px rgba(91,169,255,0.12), inset 0 0 20px rgba(91,169,255,0.04)',
            duration: 0.35, ease: 'power2.out'
          },
          stepTimes[2] + 0.5
        );
        tl.to(ROOT + ' .b7-mark-3',
          { strokeDashoffset: 0, duration: 0.45, ease: 'power2.out' },
          stepTimes[2] + 0.55
        );
        tl.to(ROOT + ' .b7-item-3 .b7-qa-tag',
          { opacity: 1, duration: 0.35, ease: 'power2.out' },
          stepTimes[2] + 1.1
        );

        // Step 4
        tl.to(ROOT + ' .b7-item-4',
          { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' },
          stepTimes[3]
        );
        tl.to(ROOT + ' .b7-item-4',
          {
            backgroundColor: 'rgba(91,169,255,0.06)',
            borderColor: 'rgba(91,169,255,0.35)',
            boxShadow: '0 0 30px rgba(91,169,255,0.12), inset 0 0 20px rgba(91,169,255,0.04)',
            duration: 0.35, ease: 'power2.out'
          },
          stepTimes[3] + 0.5
        );
        tl.to(ROOT + ' .b7-mark-4',
          { strokeDashoffset: 0, duration: 0.45, ease: 'power2.out' },
          stepTimes[3] + 0.55
        );
        tl.to(ROOT + ' .b7-item-4 .b7-qa-tag',
          { opacity: 1, duration: 0.35, ease: 'power2.out' },
          stepTimes[3] + 1.1
        );

        // Step 5 — final, green glow enhanced
        tl.to(ROOT + ' .b7-item-5',
          { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' },
          stepTimes[4]
        );
        tl.to(ROOT + ' .b7-item-5',
          {
            backgroundColor: 'rgba(141,216,145,0.06)',
            borderColor: 'rgba(141,216,145,0.40)',
            boxShadow: '0 0 40px rgba(141,216,145,0.15), inset 0 0 20px rgba(141,216,145,0.05)',
            duration: 0.35, ease: 'power2.out'
          },
          stepTimes[4] + 0.5

        tl.to(ROOT + ' .b7-mark-5',
          { strokeDashoffset: 0, duration: 0.45, ease: 'power2.out' },
          stepTimes[4] + 0.55

        // Change mark-5 color to green for final step
        tl.to(ROOT + ' .b7-mark-5',
          { stroke: '#8DD891', duration: 0.01 },
          stepTimes[4] + 0.55

        tl.to(ROOT + ' .b7-item-5 .b7-qa-tag',
          { opacity: 1, duration: 0.35, ease: 'power2.out' },
          stepTimes[4] + 1.1
        );

        // Final panel pulse: all-done green halo on the panel
        tl.to(ROOT + ' .b7-panel',
          {
            borderColor: 'rgba(141,216,145,0.35)',
            boxShadow: '0 32px 80px rgba(0,0,0,0.60), 0 0 0 1px rgba(255,255,255,0.06), 0 0 60px rgba(141,216,145,0.12)',
            duration: 0.6, ease: 'power2.out'
          },
          stepTimes[4] + 1.2
        );

        // Outro: fade + scale before beat-8
        tl.to(ROOT + ' [data-composition-id="beat-7-flow"]',
          { scale: 0.95, opacity: 0, duration: 1.0, ease: 'power2.in' },
          13.0
        );
        // Also fade the whole composition root
        tl.to(ROOT,
          { opacity: 0, duration: 0.8, ease: 'power2.in' },
          13.0
        );

        // Duration anchor: 14s
        tl.to({}, { duration: 14 }, 0);
        window.__timelines['beat-7-flow'] = tl;
      })();
