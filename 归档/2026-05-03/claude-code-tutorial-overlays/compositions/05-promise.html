<template id="beat-5-promise-template">
  <div
    data-composition-id="beat-5-promise"
    data-start="25"
    data-duration="6.5"
    data-width="1920"
    data-height="1080"
  >
    <!-- NO local grid / vignette — top-level index.html paints them -->

    <!-- Dark overlay (simulates background blur/dim over face video) -->
    <div class="b5-overlay"></div>

    <!-- Chapter card — centered -->
    <div class="b5-card">
      <!-- Number badge -->
      <div class="b5-num-badge">
        <span class="b5-num-text">02</span>
      </div>

      <!-- Chapter label -->
      <div class="b5-label">教程承诺</div>

      <!-- Main title -->
      <div class="b5-title">不需要写代码</div>
    </div>

    <style>
      [data-composition-id="beat-5-promise"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Dark overlay (dims the face video behind) ── */
      [data-composition-id="beat-5-promise"] .b5-overlay {
        position: absolute;
        inset: 0;
        background: rgba(10, 17, 36, 0.60);
        opacity: 0;
        pointer-events: none;
      }

      /* ── Chapter card ── */
      [data-composition-id="beat-5-promise"] .b5-card {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        padding: 72px 120px 80px;
        background: linear-gradient(180deg, #0d172e 0%, #0a1124 100%);
        border-radius: 28px;
        border: 1.5px solid #5BA9FF;
        box-shadow:
          0 0 60px rgba(91,169,255,0.50),
          0 0 0 1px rgba(91,169,255,0.25),
          0 24px 80px rgba(0,0,0,0.65);
        min-width: 820px;
        max-width: 920px;
        opacity: 0;
        transform: scale(0.92);
        /* initial state for GSAP */
      }

      /* ── Number badge ── */
      [data-composition-id="beat-5-promise"] .b5-num-badge {
        position: absolute;
        top: -44px;
        left: 50%;
        transform: translateX(-50%);
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(180deg, #0d172e 0%, #0a1124 100%);
        border: 2px solid #5BA9FF;
        box-shadow:
          0 0 40px rgba(91,169,255,0.55),
          0 0 0 1px rgba(91,169,255,0.20);
        display: flex;
        align-items: center;
        justify-content: center;
        /* GSAP controls opacity + scale via gsap.set; CSS only sets the centering translateX */
        opacity: 0;
        transform: translateX(-50%);
      }

      [data-composition-id="beat-5-promise"] .b5-num-text {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 34px;
        font-weight: 700;
        color: #5BA9FF;
        letter-spacing: 0.04em;
        line-height: 1;
        text-shadow: 0 0 16px rgba(91,169,255,0.8);
      }

      /* ── Chapter label ── */
      [data-composition-id="beat-5-promise"] .b5-label {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.36em;
        color: #5BA9FF;
        text-transform: uppercase;
        margin-top: 24px;
        opacity: 0;
        transform: translateY(-8px);
      }

      /* ── Main title ── */
      [data-composition-id="beat-5-promise"] .b5-title {
        font-size: 88px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1.0;
        text-align: center;
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 62%, #e8ecf2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        opacity: 0;
        transform: translateY(12px);
        filter: blur(8px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 0. Dark overlay fades in (dims face video)
        tl.to('[data-composition-id="beat-5-promise"] .b5-overlay',
          { opacity: 1, duration: 0.45, ease: 'power2.out' }, 0.0);

        // 1. Card entrance — scale 0.92 → 1, opacity 0 → 1, ease back.out(1.4)
        tl.to('[data-composition-id="beat-5-promise"] .b5-card',
          { opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.4)' }, 0.2);

        // 2. Number badge pops — scale 0.6 → 1, opacity 0 → 1 (spring)
        // Note: CSS sets transform: translateX(-50%) scale(0.6) as initial;
        // GSAP animates scale only, translateX stays via CSS transform-origin trick.
        // We reset scale separately so translateX(-50%) is not disturbed.
        gsap.set('[data-composition-id="beat-5-promise"] .b5-num-badge', { scale: 0.6, opacity: 0 });
        tl.to('[data-composition-id="beat-5-promise"] .b5-num-badge',
          { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(2.0)' }, 0.45);

        // 3. Label slides down and fades in
        tl.to('[data-composition-id="beat-5-promise"] .b5-label',
          { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out' }, 0.7);

        // 4. Title unfurls — blur 8 → 0, y 12 → 0, opacity 0 → 1
        tl.to('[data-composition-id="beat-5-promise"] .b5-title',
          { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.65, ease: 'power3.out' }, 0.95);

        // 5. Card halo pulse (ambient breathing — subtle)
        tl.to('[data-composition-id="beat-5-promise"] .b5-card',
          {
            boxShadow: '0 0 100px rgba(91,169,255,0.75), 0 0 0 1px rgba(91,169,255,0.40), 0 24px 80px rgba(0,0,0,0.65)',
            duration: 1.0,
            ease: 'sine.inOut',
            yoyo: true,
            repeat: 3
          }, 1.8);

        // 6. Exit fade
        tl.to('[data-composition-id="beat-5-promise"]',
          { opacity: 0, duration: 0.5, ease: 'power2.in' }, 6.0);

        // Duration anchor (data-duration="6.5")
        tl.to({}, { duration: 6.5 }, 0);
        window.__timelines['beat-5-promise'] = tl;
      })();
    </script>
  </div>
</template>
