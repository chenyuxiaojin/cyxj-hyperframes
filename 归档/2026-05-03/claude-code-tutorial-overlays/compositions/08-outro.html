<template id="beat-8-outro-template">
  <div
    data-composition-id="beat-8-outro"
    data-start="0"
    data-duration="8.1"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Beat 8 OUTRO [56.5–64.6s]
      时序分段：
        Seg A: 0.0–3.5s  (全局 56.5–60.0s)  face 在右上 PiP，logo 入场在左侧画布
        Seg B: 3.5–6.5s  (全局 60.0–63.0s)  face 回归全屏，logo 居中 hero hold 呼吸
        Seg C: 6.5–8.1s  (全局 63.0–64.6s)  粒子爆发 + 渐黑收尾

      PiP 位置：x=1340, y=60, w=540, h=360（index.html 定义）
      Seg A 阶段：logo 在 x<1300 的左侧区域（不挡 PiP）
      Seg B 阶段：face 占全屏，logo/文字叠在 face 上方（半透明）不能挡脸核心
    -->

    <!-- A: 背景光晕（橙色，Seg A 入 Seg B 峰值）-->
    <div class="b8-bg-radial"></div>

    <!-- 光线辐射（参考 v10-logo-outro v10-rays 结构）-->
    <div class="b8-rays">
      <div class="b8-ray" style="--b8-deg: 0deg"></div>
      <div class="b8-ray" style="--b8-deg: 45deg"></div>
      <div class="b8-ray" style="--b8-deg: 90deg"></div>
      <div class="b8-ray" style="--b8-deg: 135deg"></div>
      <div class="b8-ray" style="--b8-deg: 180deg"></div>
      <div class="b8-ray" style="--b8-deg: 225deg"></div>
      <div class="b8-ray" style="--b8-deg: 270deg"></div>
      <div class="b8-ray" style="--b8-deg: 315deg"></div>
    </div>

    <!-- Seg A: 左侧锁定布局（不挡 PiP，宽度 ≤ 1280px） -->
    <div class="b8-lockup-left">
      <!-- XCYJ 文字 logo (chrome 渐变) -->
      <div class="b8-xcyj-text">XCYJ</div>
      <!-- 细分割线 -->
      <div class="b8-divider"></div>
      <!-- 副标题 -->
      <div class="b8-tagline-left">Claude Code × HyperFrames</div>
    </div>

    <!-- Seg B: 居中布局（face 全屏后叠加，60s 移入）-->
    <div class="b8-lockup-center">
      <div class="b8-xcyj-center">XCYJ</div>
      <!-- Halo ring around text -->
      <div class="b8-center-halo"></div>
    </div>

    <!-- 副标题（居中，Seg B）-->
    <div class="b8-tagline-center">Claude Code × HyperFrames</div>

    <!-- CTA 胶囊（两个阶段共用，Seg A 在左侧，Seg B 居中）-->
    <div class="b8-cta-pill">
      <span class="b8-cta-dot"></span>
      <span class="b8-cta-text">youtube.com/@XCYJ</span>
    </div>

    <!-- Seg C: 粒子容器（JS 注入） -->
    <canvas class="b8-particles-canvas"></canvas>

    <!-- Final black fade overlay -->
    <div class="b8-final-fade"></div>

    <style>
      [data-composition-id="beat-8-outro"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Inter", system-ui, sans-serif;
      }

      /* ── 背景橙色光晕 ── */
      [data-composition-id="beat-8-outro"] .b8-bg-radial {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 1100px 800px at 640px 540px,
          rgba(217, 119, 87, 0.32) 0%,
          rgba(217, 119, 87, 0.10) 45%,
          transparent 70%
        );
        pointer-events: none;
        opacity: 0;
        z-index: 1;
      }

      /* ── 光线辐射（从左侧中央发出，Seg A 阶段） ── */
      [data-composition-id="beat-8-outro"] .b8-rays {
        position: absolute;
        top: 540px;
        left: 640px;
        width: 2px;
        height: 2px;
        opacity: 0;
        z-index: 1;
        pointer-events: none;
      }
      [data-composition-id="beat-8-outro"] .b8-ray {
        position: absolute;
        top: 0;
        left: 0;
        width: 1400px;
        height: 1px;
        background: linear-gradient(90deg, rgba(217, 119, 87, 0.28) 0%, transparent 100%);
        transform-origin: 0 0;
        transform: rotate(var(--b8-deg)) translateX(-700px);
      }

      /* ── Seg A 左侧锁定布局 ── */
      [data-composition-id="beat-8-outro"] .b8-lockup-left {
        position: absolute;
        left: 120px;
        top: 380px;
        width: 1100px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        opacity: 0;
        transform: scale(0.9);
        transform-origin: left center;
        z-index: 5;
      }
      [data-composition-id="beat-8-outro"] .b8-xcyj-text {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 160px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.03em;
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 55%, #f0f4f8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 40px rgba(217, 119, 87, 0.55));
        white-space: nowrap;
      }
      [data-composition-id="beat-8-outro"] .b8-divider {
        width: 100%;
        max-width: 520px;
        height: 1.5px;
        background: linear-gradient(90deg, rgba(217, 119, 87, 0.8) 0%, rgba(91, 169, 255, 0.4) 60%, transparent 100%);
        margin: 16px 0;
        opacity: 0.75;
      }
      [data-composition-id="beat-8-outro"] .b8-tagline-left {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 40px;
        font-weight: 500;
        letter-spacing: 0.18em;
        color: rgba(150, 162, 182, 0.85);
        white-space: nowrap;
      }

      /* ── Seg B 居中锁定布局 ── */
      [data-composition-id="beat-8-outro"] .b8-lockup-center {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0.85);
        opacity: 0;
        z-index: 6;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      [data-composition-id="beat-8-outro"] .b8-xcyj-center {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 200px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(180deg, #ffffff 0%, #c8d3e0 50%, #f0f4f8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: none;
        white-space: nowrap;
        position: relative;
        z-index: 2;
      }
      [data-composition-id="beat-8-outro"] .b8-center-halo {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 700px;
        height: 400px;
        transform: translate(-50%, -50%);
        background: radial-gradient(ellipse at center,
          rgba(217, 119, 87, 0.45) 0%,
          rgba(91, 169, 255, 0.18) 45%,
          transparent 70%
        );
        filter: blur(40px);
        opacity: 0;
        z-index: 1;
      }

      /* ── 居中副标题（Seg B）── */
      [data-composition-id="beat-8-outro"] .b8-tagline-center {
        position: absolute;
        left: 50%;
        top: calc(50% + 130px);
        transform: translateX(-50%) translateY(20px);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 36px;
        font-weight: 500;
        letter-spacing: 0.22em;
        color: rgba(150, 162, 182, 0.80);
        white-space: nowrap;
        opacity: 0;
        z-index: 6;
        text-align: center;
      }

      /* ── CTA 胶囊 ── */
      [data-composition-id="beat-8-outro"] .b8-cta-pill {
        position: absolute;
        left: 120px;
        bottom: 100px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 28px;
        background: rgba(255, 255, 255, 0.05);
        border: 1.5px solid rgba(217, 119, 87, 0.45);
        border-radius: 100px;
        opacity: 0;
        transform: translateY(16px);
        z-index: 7;
        transition: none;
      }
      [data-composition-id="beat-8-outro"] .b8-cta-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #d97757;
        box-shadow: 0 0 10px rgba(217, 119, 87, 0.8), 0 0 20px rgba(217, 119, 87, 0.45);
        flex-shrink: 0;
      }
      [data-composition-id="beat-8-outro"] .b8-cta-text {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 28px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.80);
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      /* ── 粒子 canvas ── */
      [data-composition-id="beat-8-outro"] .b8-particles-canvas {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        opacity: 0;
        z-index: 8;
      }

      /* ── Final fade ── */
      [data-composition-id="beat-8-outro"] .b8-final-fade {
        position: absolute;
        inset: 0;
        background: #000000;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        // ── Mount template ──
        const tpl = document.getElementById("beat-8-outro-template");
        const target = document.querySelector("#beat-8");
        if (target && !target.firstElementChild) {
          target.appendChild(tpl.content.cloneNode(true));
        }

        const tl = gsap.timeline({ paused: true });

        // ────────────────────────────────────────────────
        // SEG A: 0.0–3.5s  (全局 56.5–60.0s)
        // Face 还在右上 PiP（x=1340,y=60,w=540,h=360）
        // 我们的内容在左侧 ≤ 1280px 画布
        // ────────────────────────────────────────────────

        // A1: bg radial 橙色光晕升起
        tl.to('[data-composition-id="beat-8-outro"] .b8-bg-radial',
          { opacity: 1, duration: 1.2, ease: "power2.out" }, 0.0);

        // A2: 光线辐射出现 + 缓慢旋转
        tl.to('[data-composition-id="beat-8-outro"] .b8-rays',
          { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.3);
        tl.to('[data-composition-id="beat-8-outro"] .b8-rays',
          { rotate: 45, duration: 8.0, ease: "none" }, 0.3);

        // A3: 左侧锁定 logo 入场（scale 0.9→1，opacity 0→1，back.out）
        tl.to('[data-composition-id="beat-8-outro"] .b8-lockup-left',
          { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.4)" }, 0.5);

        // A4: CTA 胶囊从下飘入
        tl.to('[data-composition-id="beat-8-outro"] .b8-cta-pill',
          { opacity: 1, y: 0, duration: 0.7, ease: "power2.out" }, 1.2);

        // A5: 光晕呼吸（Seg A 持续）
        tl.to('[data-composition-id="beat-8-outro"] .b8-bg-radial',
          { opacity: 0.55, duration: 1.8, ease: "sine.inOut" }, 1.5);
        tl.to('[data-composition-id="beat-8-outro"] .b8-bg-radial',
          { opacity: 0.85, duration: 1.8, ease: "sine.inOut" }, 3.3);

        // ────────────────────────────────────────────────
        // SEG B: 3.5–6.5s  (全局 60.0–63.0s)
        // Face 60.0s 开始回归全屏（index.html 控制，0.5s 动画）
        // 3.5s 时 face 已经基本全屏，我们叠在上面不挡脸
        // ────────────────────────────────────────────────

        // B1: 左侧锁定退场
        tl.to('[data-composition-id="beat-8-outro"] .b8-lockup-left',
          { opacity: 0, scale: 0.92, duration: 0.55, ease: "power2.in" }, 3.5);

        // B2: CTA 移动到居中（先淡出再淡入居中）
        tl.to('[data-composition-id="beat-8-outro"] .b8-cta-pill',
          { opacity: 0, y: 10, duration: 0.4, ease: "power2.in" }, 3.5);
        tl.set('[data-composition-id="beat-8-outro"] .b8-cta-pill',
          { left: "50%", bottom: "80px", xPercent: -50 }, 3.95);
        tl.to('[data-composition-id="beat-8-outro"] .b8-cta-pill',
          { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 4.05);

        // B3: 居中 XCYJ 文字入场（scale 0.85→1，opacity 0→1，back.out 1.4）
        tl.to('[data-composition-id="beat-8-outro"] .b8-lockup-center',
          { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.4)",
            transformOrigin: "50% 50%" }, 3.9);

        // B4: 中央 halo 绽放
        tl.to('[data-composition-id="beat-8-outro"] .b8-center-halo',
          { opacity: 1, duration: 0.8, ease: "power2.out" }, 4.1);

        // B5: 居中副标题出现
        tl.to('[data-composition-id="beat-8-outro"] .b8-tagline-center',
          { opacity: 1, y: 0, letterSpacing: "0.28em", duration: 0.7, ease: "power2.out" }, 4.4);

        // B6: hero hold 呼吸 4.8–6.3s（scale 1→1.02→1，sine.inOut，2s loop ×1）
        tl.to('[data-composition-id="beat-8-outro"] .b8-lockup-center',
          { scale: 1.02, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.8);

        // B7: 光线 bg 在居中阶段收敛到正中
        tl.to('[data-composition-id="beat-8-outro"] .b8-bg-radial',
          { backgroundImage: "radial-gradient(ellipse 1100px 800px at 960px 540px, rgba(217,119,87,0.38) 0%, rgba(217,119,87,0.12) 45%, transparent 70%)", duration: 0.8, ease: "power2.out" }, 3.8);

        // ────────────────────────────────────────────────
        // SEG C: 6.5–8.1s  (全局 63.0–64.6s)
        // 粒子爆发 + fade out 收尾
        // ────────────────────────────────────────────────

        // C1: logo center + tagline 淡出
        tl.to('[data-composition-id="beat-8-outro"] .b8-lockup-center',
          { opacity: 0, scale: 1.06, duration: 0.7, ease: "power2.in" }, 6.5);
        tl.to('[data-composition-id="beat-8-outro"] .b8-tagline-center',
          { opacity: 0, y: -16, duration: 0.55, ease: "power2.in" }, 6.5);
        tl.to('[data-composition-id="beat-8-outro"] .b8-cta-pill',
          { opacity: 0, duration: 0.45, ease: "power2.in" }, 6.5);

        // C2: 粒子 canvas 显现（粒子由 JS 驱动）
        tl.to('[data-composition-id="beat-8-outro"] .b8-particles-canvas',
          { opacity: 1, duration: 0.15 }, 6.5);

        // C3: bg radial 淡出
        tl.to('[data-composition-id="beat-8-outro"] .b8-bg-radial',
          { opacity: 0, duration: 1.0, ease: "power2.in" }, 6.6);
        tl.to('[data-composition-id="beat-8-outro"] .b8-rays',
          { opacity: 0, duration: 0.6, ease: "power2.in" }, 6.6);

        // C4: 渐黑 fade
        tl.to('[data-composition-id="beat-8-outro"] .b8-final-fade',
          { opacity: 1, duration: 1.2, ease: "power2.inOut" }, 6.9);

        // Duration anchor
        tl.to({}, { duration: 8.1 }, 0);

        window.__timelines["beat-8-outro"] = tl;

        // ── 粒子爆发（Seg C，6.5s 触发，seeded deterministic） ──
        // 用 onStart 触发 canvas 绘制，避免 Date.now()
        (function initParticles() {
          const canvas = document.querySelector('[data-composition-id="beat-8-outro"] .b8-particles-canvas');
          if (!canvas) return;
          const ctx = canvas.getContext("2d");
          canvas.width = 1920;
          canvas.height = 1080;

          // Seeded LCG random（deterministic）
          let seed = 42;
          function rand() {
            seed = (seed * 1664525 + 1013904223) & 0xffffffff;
            return (seed >>> 0) / 0x100000000;
          }

          const COLORS = ["#d97757", "#ffd2bc", "#5ba9ff", "#ffffff", "#b891e4"];
          const particles = [];
          const N = 120;
          const cx = 960, cy = 540;

          for (let i = 0; i < N; i++) {
            const angle = rand() * Math.PI * 2;
            const speed = 180 + rand() * 420;
            const size = 2 + rand() * 6;
            const color = COLORS[Math.floor(rand() * COLORS.length)];
            particles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, size, color, life: 1.0, decay: 0.55 + rand() * 0.45 });
          }

          let startTime = null;
          let rafId = null;

          function draw(ts) {
            if (!startTime) startTime = ts;
            const dt = Math.min((ts - startTime) / 1000, 0.1); // seconds per frame capped
            startTime = ts;

            ctx.clearRect(0, 0, 1920, 1080);
            let alive = false;
            for (const p of particles) {
              if (p.life <= 0) continue;
              alive = true;
              p.x += p.vx * dt;
              p.y += p.vy * dt;
              p.vy += 320 * dt; // gravity
              p.life -= p.decay * dt;
              ctx.globalAlpha = Math.max(0, p.life);
              ctx.fillStyle = p.color;
              ctx.shadowColor = p.color;
              ctx.shadowBlur = 8;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            if (alive) rafId = requestAnimationFrame(draw);
          }

          // Start drawing when canvas becomes visible (opacity→1 at 6.5s)
          tl.call(function () {
            startTime = null;
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(draw);
          }, [], 6.5);
        })();
      })();
    </script>
  </div>
</template>
