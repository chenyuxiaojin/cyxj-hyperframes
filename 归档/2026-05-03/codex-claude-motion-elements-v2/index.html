<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Claude Motion Elements V2</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #07090d;
        font-family: "Inter", "Noto Sans SC", sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07090d;
      }

      #video-wrap {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: #07090d;
      }

      #source-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: contrast(1.02) saturate(0.93) brightness(0.82);
      }

      .global-grade {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 42% 52% at 63% 36%, rgba(217, 119, 87, 0.10), transparent 65%),
          radial-gradient(ellipse 40% 62% at 12% 70%, rgba(91, 180, 255, 0.12), transparent 68%),
          linear-gradient(90deg, rgba(7, 9, 13, 0.52), rgba(7, 9, 13, 0.08) 45%, rgba(7, 9, 13, 0.30));
        z-index: 1;
      }

      .scan-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(245, 239, 232, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 239, 232, 0.035) 1px, transparent 1px);
        background-size: 96px 96px;
        mask-image: linear-gradient(90deg, #000 0%, #000 34%, transparent 68%);
        -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 34%, transparent 68%);
        z-index: 2;
      }

      .scene-layer {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        pointer-events: none;
        z-index: 5;
      }

      .grain {
        position: absolute;
        inset: -20%;
        pointer-events: none;
        opacity: 0.08;
        mix-blend-mode: overlay;
        z-index: 7;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(255,255,255,0.22) 0 1px, transparent 1px),
          radial-gradient(circle at 70% 60%, rgba(255,255,255,0.16) 0 1px, transparent 1px);
        background-size: 17px 17px, 23px 23px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="xcyj-codex-claude-motion-elements-v2"
      data-start="0"
      data-duration="64.6"
      data-width="1920"
      data-height="1080"
    >
      <div id="video-wrap">
        <video
          id="source-video"
          data-start="0"
          data-duration="64.6"
          data-track-index="0"
          src="assets/source.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="source-audio"
        data-start="0"
        data-duration="64.6"
        data-track-index="1"
        data-volume="1"
        src="assets/source.mp4"
      ></audio>

      <div class="global-grade"></div>
      <div class="scan-grid"></div>

      <div
        id="scene-hook"
        class="scene-layer"
        data-composition-id="codex-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="8"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-pain"
        class="scene-layer"
        data-composition-id="codex-pain"
        data-composition-src="compositions/02-pain.html"
        data-start="8"
        data-duration="10"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-verdict"
        class="scene-layer"
        data-composition-id="codex-verdict"
        data-composition-src="compositions/03-verdict.html"
        data-start="18"
        data-duration="11"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-concept"
        class="scene-layer"
        data-composition-id="codex-concept"
        data-composition-src="compositions/04-concept.html"
        data-start="29"
        data-duration="13"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-flow"
        class="scene-layer"
        data-composition-id="codex-flow"
        data-composition-src="compositions/05-flow.html"
        data-start="42"
        data-duration="13"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-outro"
        class="scene-layer"
        data-composition-id="codex-outro"
        data-composition-src="compositions/06-outro.html"
        data-start="55"
        data-duration="9.6"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <div class="grain"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(".global-grade", { opacity: 0.65 }, { opacity: 1, duration: 1.2, ease: "power2.out" }, 0);
        tl.to(".scan-grid", { x: 28, y: -18, duration: 16, ease: "sine.inOut", repeat: 3, yoyo: true }, 0);
        tl.to(".grain", { x: 34, y: -21, duration: 8, ease: "steps(6)", repeat: 7, yoyo: true }, 0);
        window.__timelines["xcyj-codex-claude-motion-elements-v2"] = tl;
      })();
    </script>
  </body>
</html>
