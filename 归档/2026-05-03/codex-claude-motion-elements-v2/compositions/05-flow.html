    data-duration="13"
    data-width="1920"
    data-height="1080"

      <div class="board-title">完整流程</div>

    <style>
      [data-composition-id="codex-flow"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        color: #f5efe8;
        font-family: "Inter", "Noto Sans SC", sans-serif;
      }

      [data-composition-id="codex-flow"] .flow-board {
        position: absolute;
        left: 92px;
        bottom: 72px;
        width: 1020px;
        height: 310px;
        padding: 28px 34px;
        border-radius: 8px;
        background: rgba(12, 16, 24, 0.76);
        border: 1px solid rgba(245, 239, 232, 0.13);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.34);
      }

      [data-composition-id="codex-flow"] .board-title {
        font-size: 46px;
        line-height: 1;
        font-weight: 900;
        color: #d97757;
      }

      [data-composition-id="codex-flow"] .flow-line {

      }

      [data-composition-id="codex-flow"] .step {
        position: absolute;
        top: 106px;
        width: 190px;
        min-height: 190px;
      }

      [data-composition-id="codex-flow"] .s1 {
        left: 44px;

      [data-composition-id="codex-flow"] .s2 {

      }

      [data-composition-id="codex-flow"] .s4 {
        left: 764px;
      }

      [data-composition-id="codex-flow"] b {
        display: grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: rgba(217, 119, 87, 0.16);
        border: 1px solid rgba(217, 119, 87, 0.52);

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from('[data-composition-id="codex-flow"] .flow-board', { opacity: 0, y: 64, duration: 0.55, ease: "power3.out" }, 0.15);
        tl.from('[data-composition-id="codex-flow"] .board-title', { opacity: 0, y: 18, duration: 0.32, ease: "power2.out" }, 0.55);
        tl.from('[data-composition-id="codex-flow"] .flow-line', { scaleX: 0, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.95);
        tl.from('[data-composition-id="codex-flow"] .step', { opacity: 0, y: 32, duration: 0.42, ease: "power3.out", stagger: 0.34 }, 1.05);
        tl.to('[data-composition-id="codex-flow"] b', { scale: 1.08, duration: 0.22, ease: "power2.out", yoyo: true, repeat: 1, stagger: 0.58 }, 2.8);
        tl.to('[data-composition-id="codex-flow"] .flow-board', { opacity: 0, duration: 0.5, ease: "power2.in" }, 12.15);
        window.__timelines["codex-flow"] = tl;
      })();
    </script>
