<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>$15,000 烧穿 - Acts 1-2 Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=block" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #0A0A0F;
        font-family: "JetBrains Mono", monospace;
        color: #D4AF37;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 48%, rgba(255, 198, 87, 0.28), transparent 21%),
          radial-gradient(circle at 72% 42%, rgba(255, 45, 45, 0.18), transparent 26%),
          radial-gradient(circle at 22% 18%, rgba(255, 45, 45, 0.22), transparent 30%),
          linear-gradient(180deg, #020204 0%, #0A0A0F 48%, #180707 100%);
      }

      #three-stage {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      #three-stage canvas {
        display: block;
      }

      .vignette {
        position: absolute;
        inset: 0;
        z-index: 18;
        pointer-events: none;
        background:
          radial-gradient(ellipse at center, transparent 28%, rgba(0, 0, 0, 0.42) 58%, rgba(0,0,0,0.82) 100%),
          linear-gradient(90deg, rgba(0,0,0,0.5), transparent 18%, transparent 82%, rgba(0,0,0,0.5));
      }

      .scanlines {
        position: absolute;
        inset: 0;
        z-index: 12;
        pointer-events: none;
        opacity: 0.24;
        background: repeating-linear-gradient(
          to bottom,
          rgba(248, 243, 231, 0.06) 0px,
          rgba(248, 243, 231, 0.06) 1px,
          transparent 1px,
          transparent 5px
        );
        mix-blend-mode: overlay;
      }

      .dollar-field {
        position: absolute;
        inset: 0;
        z-index: 7;
        overflow: hidden;
        opacity: 0;
      }

      .dollar-mark {
        position: absolute;
        font-size: 92px;
        line-height: 1;
        color: rgba(212, 175, 55, 0.19);
        text-shadow: 0 0 28px rgba(212, 175, 55, 0.22);
      }

      .particle-field {
        position: absolute;
        inset: 0;
        z-index: 11;
        perspective: 760px;
        transform-style: preserve-3d;
      }

      .money-particle {
        position: absolute;
        left: 960px;
        top: 520px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #D4AF37;
        box-shadow:
          0 0 10px rgba(212, 175, 55, 0.9),
          0 0 26px rgba(212, 175, 55, 0.34);
        opacity: 0;
        will-change: transform, opacity;
      }

      .hero-number {
        position: absolute;
        left: 50%;
        top: 47%;
        z-index: 15;
        transform: translate(-50%, -50%);
        font-size: 330px;
        line-height: 0.9;
        font-weight: 700;
        letter-spacing: -0.105em;
        color: #D4AF37;
        background: linear-gradient(180deg, #FFF2A6 0%, #D4AF37 42%, #6E4B12 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow:
          0 0 18px rgba(255, 242, 166, 0.95),
          0 0 64px rgba(212, 175, 55, 0.62),
          0 0 150px rgba(212, 175, 55, 0.32),
          22px 0 0 rgba(212, 175, 55, 0.16),
          -24px 0 0 rgba(255, 45, 45, 0.14);
        filter: drop-shadow(0 0 38px rgba(212, 175, 55, 0.8));
        will-change: transform, filter, opacity;
      }

      .hero-number::after {
        content: attr(data-ghost);
        position: absolute;
        inset: 0;
        transform: translateX(-28px);
        opacity: 0.28;
        color: #FF2D2D;
        -webkit-text-fill-color: #FF2D2D;
        filter: blur(7px);
      }

      .title {
        position: absolute;
        left: 72px;
        top: 58px;
        z-index: 16;
        font-size: 31px;
        letter-spacing: 0.18em;
        color: rgba(248, 243, 231, 0.74);
        text-transform: uppercase;
      }

      .title strong {
        color: #FF2D2D;
        text-shadow: 0 0 18px rgba(255, 45, 45, 0.8);
      }

      .subtitle {
        position: absolute;
        left: 76px;
        bottom: 82px;
        z-index: 20;
        font-size: 30px;
        color: rgba(248, 243, 231, 0.72);
        letter-spacing: 0.12em;
      }

      .shimmer {
        position: absolute;
        left: -520px;
        top: 368px;
        z-index: 17;
        width: 680px;
        height: 230px;
        background: linear-gradient(90deg, transparent 0%, rgba(255, 242, 166, 0.08) 28%, rgba(255, 242, 166, 0.72) 50%, rgba(255, 242, 166, 0.08) 72%, transparent 100%);
        filter: blur(8px);
        transform: skewX(-18deg);
        mix-blend-mode: screen;
        opacity: 0;
      }

      .red-bars {
        position: absolute;
        inset: 0;
        z-index: 11;
        overflow: hidden;
        pointer-events: none;
      }

      .red-bar {
        position: absolute;
        width: 760px;
        height: 14px;
        background: linear-gradient(90deg, transparent, rgba(255, 45, 45, 0.96), transparent);
        box-shadow: 0 0 32px rgba(255, 45, 45, 0.9), 0 0 90px rgba(255,45,45,0.28);
        opacity: 0;
        will-change: transform, opacity;
      }

      .glitch-flash {
        position: absolute;
        inset: 0;
        z-index: 18;
        pointer-events: none;
        opacity: 0;
        background:
          linear-gradient(90deg, rgba(255,45,45,0.22), transparent 17%, rgba(212,175,55,0.18) 26%, transparent 42%),
          repeating-linear-gradient(to bottom, transparent 0 18px, rgba(255,45,45,0.24) 19px 20px);
        mix-blend-mode: screen;
      }

      .act-label {
        position: absolute;
        right: 70px;
        top: 64px;
        z-index: 16;
        font-size: 24px;
        letter-spacing: 0.18em;
        color: rgba(212, 175, 55, 0.78);
      }

      .burn-panel {
        position: absolute;
        left: 58px;
        bottom: 130px;
        z-index: 20;
        display: flex;
        gap: 12px;
        opacity: 0;
      }

      .burn-panel span {
        padding: 10px 14px;
        border: 1px solid rgba(255, 45, 45, 0.62);
        background: rgba(60, 0, 0, 0.36);
        color: #FF2D2D;
        font-size: 18px;
        letter-spacing: 0.12em;
        box-shadow: 0 0 24px rgba(255,45,45,0.18);
      }

      .gold-streaks {
        position: absolute;
        inset: 0;
        z-index: 13;
        pointer-events: none;
        overflow: hidden;
      }

      .gold-streak {
        position: absolute;
        width: 340px;
        height: 4px;
        background: linear-gradient(90deg, transparent, rgba(255,242,166,0.95), transparent);
        box-shadow: 0 0 24px rgba(212,175,55,0.78);
        opacity: 0;
        transform: skewX(-18deg);
      }

      .shock-ring {
        position: absolute;
        left: 50%;
        top: 48%;
        z-index: 14;
        width: 380px;
        height: 380px;
        margin-left: -190px;
        margin-top: -190px;
        border: 3px solid rgba(212,175,55,0.88);
        border-radius: 50%;
        box-shadow: 0 0 36px rgba(212,175,55,0.8), inset 0 0 36px rgba(212,175,55,0.36);
        opacity: 0;
      }

      .white-flash {
        position: absolute;
        inset: 0;
        z-index: 30;
        pointer-events: none;
        background: #FFF2A6;
        opacity: 0;
        mix-blend-mode: screen;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="burn-through-preview"
      data-start="0"
      data-duration="7"
      data-width="1920"
      data-height="1080"
    >
      <div id="three-stage"></div>
      <div class="dollar-field" id="dollar-field"></div>
      <div class="particle-field" id="particle-field"></div>
      <div class="gold-streaks" id="gold-streaks"></div>
      <div class="red-bars" id="red-bars"></div>
      <div class="hero-number" id="hero-number" data-ghost="$0">$0</div>
      <div class="shock-ring"></div>
      <div class="shimmer"></div>
      <div class="glitch-flash"></div>
      <div class="white-flash"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="title"><strong>$15,000</strong> BURN THROUGH</div>
      <div class="act-label">ACT 01-02 PREVIEW</div>
      <div class="burn-panel"><span>TUITION LEAK</span><span>GPU BILL</span><span>FAILED PROMPT</span></div>
      <div class="subtitle">CYBER FINANCE FAILURE · GOLD RUNAWAY</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const WIDTH = 1920;
      const HEIGHT = 1080;
      const GOLD = "#D4AF37";
      const RED = "#FF2D2D";
      const BLACK = "#0A0A0F";

      function seededUnit(index) {
        const value = Math.sin(index * 12.9898 + 78.233) * 43758.5453;
        return value - Math.floor(value);
      }

      function createParticles() {
        const field = document.getElementById("particle-field");
        const total = 980;
        for (let i = 0; i < total; i += 1) {
          const dot = document.createElement("div");
          dot.className = "money-particle";
          field.appendChild(dot);
          const side = i % 4;
          const u = seededUnit(i + 1);
          const v = seededUnit(i + 101);
          let x = 0;
          let y = 0;
          if (side === 0) { x = -980 - u * 520; y = -520 + v * 1080; }
          if (side === 1) { x = 980 + u * 520; y = -520 + v * 1080; }
          if (side === 2) { x = -960 + u * 1920; y = -780 - v * 420; }
          if (side === 3) { x = -960 + u * 1920; y = 520 + v * 420; }
          const z = -420 + seededUnit(i + 201) * 860;
          gsap.set(dot, {
            x: x,
            y: y,
            z: z,
            scale: 0.7 + seededUnit(i + 301) * 2.6,
            opacity: 0
          });
        }
      }

      function createDollarField() {
        const field = document.getElementById("dollar-field");
        for (let i = 0; i < 84; i += 1) {
          const mark = document.createElement("div");
          mark.className = "dollar-mark";
          mark.textContent = "$";
          field.appendChild(mark);
          gsap.set(mark, {
            x: 70 + (i % 12) * 170,
            y: 80 + Math.floor(i / 12) * 138,
            scale: 0.6 + seededUnit(i + 77) * 1.1,
            opacity: 0.4 + seededUnit(i + 88) * 0.32
          });
        }
      }

      function createRedBars() {
        const field = document.getElementById("red-bars");
        for (let i = 0; i < 28; i += 1) {
          const bar = document.createElement("div");
          bar.className = "red-bar";
          field.appendChild(bar);
          gsap.set(bar, {
            left: i % 2 === 0 ? -540 : 1940,
            top: 80 + (i % 14) * 66,
            x: i % 2 === 0 ? -680 : 680,
            skewX: -18,
            rotation: i % 2 === 0 ? -6 : 186,
            scaleX: 1.0 + seededUnit(i + 17) * 2.1
          });
        }
      }

      function createGoldStreaks() {
        const field = document.getElementById("gold-streaks");
        for (let i = 0; i < 34; i += 1) {
          const streak = document.createElement("div");
          streak.className = "gold-streak";
          field.appendChild(streak);
          gsap.set(streak, {
            left: -440 - seededUnit(i + 9) * 500,
            top: 110 + seededUnit(i + 19) * 820,
            scaleX: 0.6 + seededUnit(i + 29) * 1.8,
            rotation: -8 + seededUnit(i + 39) * 16
          });
        }
      }

      createParticles();
      createDollarField();
      createRedBars();
      createGoldStreaks();

      const stage = document.getElementById("three-stage");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(BLACK);
      scene.fog = new THREE.FogExp2(BLACK, 0.032);

      const camera = new THREE.PerspectiveCamera(68, WIDTH / HEIGHT, 0.1, 120);
      camera.position.set(0, 4.6, 6.6);
      camera.rotation.x = -0.66;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setPixelRatio(1);
      stage.appendChild(renderer.domElement);

      const grid = new THREE.GridHelper(86, 86, 0xD4AF37, 0x5E4612);
      grid.position.y = -2.7;
      grid.material.transparent = true;
      grid.material.opacity = 0.72;
      scene.add(grid);

      const horizon = new THREE.GridHelper(62, 62, 0xFF2D2D, 0x382020);
      horizon.position.set(0, 0.1, -22);
      horizon.rotation.x = Math.PI / 2.35;
      horizon.material.transparent = true;
      horizon.material.opacity = 0.28;
      scene.add(horizon);

      const floorGlow = new THREE.Mesh(
        new THREE.PlaneGeometry(70, 70),
        new THREE.MeshBasicMaterial({
          color: 0xD4AF37,
          transparent: true,
          opacity: 0.095,
          side: THREE.DoubleSide
        })
      );
      floorGlow.rotation.x = -Math.PI / 2;
      floorGlow.position.y = -2.71;
      scene.add(floorGlow);

      const state = {
        gridRotation: 0,
        gridPulse: 0,
        cameraZ: 6.6,
        cameraY: 4.6,
        shake: 0,
        amount: 0
      };

      function renderThree() {
        grid.rotation.y = state.gridRotation;
        grid.position.x = Math.sin(state.gridPulse * 22) * (0.08 + state.shake);
        grid.position.z = Math.cos(state.gridPulse * 19) * (0.12 + state.shake);
        horizon.rotation.z = -state.gridRotation * 0.55;
        camera.position.x = Math.sin(state.gridPulse * 31) * state.shake * 0.45;
        camera.position.z = state.cameraZ + Math.cos(state.gridPulse * 17) * state.shake;
        camera.position.y = state.cameraY + Math.sin(state.gridPulse * 23) * state.shake * 0.35;
        renderer.render(scene, camera);
      }

      renderThree();

      const number = document.getElementById("hero-number");
      function updateAmount() {
        const rounded = Math.round(state.amount / 50) * 50;
        const formatted = "$" + rounded.toLocaleString("en-US");
        number.textContent = formatted;
        number.setAttribute("data-ghost", formatted);
      }

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out" },
        onUpdate: renderThree
      });

      gsap.set("#hero-number", { scale: 0.44, opacity: 0, filter: "blur(18px)" });
      gsap.set(".title, .subtitle, .act-label", { opacity: 0, y: -18 });
      gsap.set(".burn-panel", { opacity: 0, y: 18 });

      tl.to(".title, .act-label", { opacity: 1, y: 0, duration: 0.7, stagger: 0.08 }, 0);
      tl.to(".subtitle", { opacity: 1, y: 0, duration: 0.7 }, 0.35);

      tl.to(state, { gridRotation: 0.32, duration: 7, ease: "none" }, 0);
      tl.to(state, { cameraZ: 5.25, cameraY: 3.9, duration: 7, ease: "sine.inOut" }, 0);

      tl.to(".money-particle", {
        opacity: 0.95,
        x: 0,
        y: 0,
        z: 0,
        scale: 1,
        duration: 2.15,
        stagger: { amount: 1.65, from: "center" },
        ease: "expo.inOut"
      }, 0.18);

      tl.to("#hero-number", { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.62, ease: "back.out(2.2)" }, 2.05);
      tl.fromTo(".shock-ring", { opacity: 0.95, scale: 0.2 }, { opacity: 0, scale: 2.9, duration: 0.78, ease: "power3.out" }, 2.1);
      tl.to("#hero-number", { scale: 1.07, duration: 0.18, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.72);
      tl.to(".shimmer", { opacity: 1, x: 2600, duration: 0.82, ease: "power2.inOut" }, 2.18);
      tl.to(".money-particle", { opacity: 0.08, scale: 0.22, duration: 0.5, ease: "power2.in" }, 2.78);

      tl.to("#dollar-field", { opacity: 1, duration: 0.5 }, 3.0);
      tl.to(".dollar-mark", { x: "-=180", y: "+=34", duration: 4, ease: "none", stagger: { amount: 0.35, from: "start" } }, 3.0);
      tl.to(".burn-panel", { opacity: 1, y: 0, duration: 0.34, ease: "power2.out" }, 3.0);
      tl.to(".gold-streak", {
        opacity: 0.88,
        x: 2900,
        duration: 0.62,
        stagger: { amount: 3.3, from: "start" },
        ease: "power2.in"
      }, 3.05);

      tl.to(state, {
        amount: 15000,
        duration: 2.95,
        ease: "expo.out",
        onUpdate: updateAmount
      }, 3.0);

      tl.to("#hero-number", { x: -22, duration: 0.055, yoyo: true, repeat: 52, ease: "none" }, 3.0);
      tl.to("#hero-number", { filter: "drop-shadow(0 0 58px rgba(212, 175, 55, 0.95)) blur(1.1px)", duration: 0.12, yoyo: true, repeat: 19, ease: "power1.inOut" }, 3.05);
      tl.to(state, { gridPulse: 1, shake: 0.22, duration: 3.9, ease: "none" }, 3.0);

      tl.to(".red-bar", {
        opacity: 0.94,
        x: 3050,
        duration: 0.62,
        stagger: { amount: 2.8, from: "start" },
        ease: "power2.in"
      }, 3.18);

      tl.to(".glitch-flash", { opacity: 0.82, duration: 0.06, yoyo: true, repeat: 1, ease: "none" }, 3.86);
      tl.to(".glitch-flash", { opacity: 0.68, duration: 0.05, yoyo: true, repeat: 1, ease: "none" }, 4.82);
      tl.to(".white-flash", { opacity: 0.72, duration: 0.035, yoyo: true, repeat: 1, ease: "none" }, 5.98);
      tl.to(".glitch-flash", { opacity: 0.95, duration: 0.045, yoyo: true, repeat: 1, ease: "none" }, 6.28);

      tl.to("#hero-number", { scale: 1.11, duration: 0.35, ease: "power2.out" }, 6.52);
      tl.to({}, { duration: 7 }, 0);

      window.__timelines["burn-through-preview"] = tl;
    </script>
  </body>
</html>
