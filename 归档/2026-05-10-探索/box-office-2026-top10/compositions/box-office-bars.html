<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>2026 中国电影票房榜 TOP 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #0e0d0c;
      }
    </style>
  </head>
  <body>
    <div
      id="box-office-bars"
      data-composition-id="box-office-bars"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="10"
    >
      <div class="stage">
        <div class="header">
          <div class="eyebrow">
            <span class="eyebrow-dot"></span>
            <span class="eyebrow-text">CHINA BOX OFFICE 2026</span>
          </div>
          <h1 class="title">2026 中国电影票房榜 <span class="title-accent">TOP 10</span></h1>
          <p class="subtitle">单位：亿元 · 数据来源 boxofficecn · 截至 2026-04-18</p>
        </div>

        <div class="rows"></div>

        <div class="footer">
          <span class="footer-left">© 2026 XCYJ — 票房数据可视化</span>
          <span class="footer-right">SOURCE · boxofficecn.com</span>
        </div>
      </div>

      <style>
        [data-composition-id="box-office-bars"] {
          width: 1920px;
          height: 1080px;
          background: radial-gradient(ellipse at top left, #1a1815 0%, #0e0d0c 60%);
          font-family: "Noto Sans SC", "Inter", sans-serif;
          color: #fafaf5;
          position: relative;
          overflow: hidden;
        }

        [data-composition-id="box-office-bars"] .stage {
          width: 1760px;
          height: 1000px;
          margin: 40px 80px;
          display: flex;
          flex-direction: column;
        }

        [data-composition-id="box-office-bars"] .header {
          padding-bottom: 32px;
          border-bottom: 1px solid #2a2722;
          margin-bottom: 28px;
        }

        [data-composition-id="box-office-bars"] .eyebrow {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 14px;
          opacity: 0;
        }

        [data-composition-id="box-office-bars"] .eyebrow-dot {
          width: 8px;
          height: 8px;
          background: #d97706;
          border-radius: 50%;
          box-shadow: 0 0 12px rgba(217, 119, 6, 0.7);
        }

        [data-composition-id="box-office-bars"] .eyebrow-text {
          font-family: "Inter", sans-serif;
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.24em;
          color: #d97706;
        }

        [data-composition-id="box-office-bars"] .title {
          font-family: "Noto Sans SC", sans-serif;
          font-size: 56px;
          font-weight: 900;
          letter-spacing: -0.01em;
          line-height: 1.05;
          clip-path: inset(0 100% 0 0);
        }

        [data-composition-id="box-office-bars"] .title-accent {
          color: #d97706;
          font-family: "Inter", sans-serif;
          font-weight: 900;
          letter-spacing: 0.02em;
        }

        [data-composition-id="box-office-bars"] .subtitle {
          margin-top: 10px;
          font-size: 16px;
          color: #807a72;
          letter-spacing: 0.02em;
          opacity: 0;
        }

        [data-composition-id="box-office-bars"] .rows {
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          padding: 8px 0;
        }

        [data-composition-id="box-office-bars"] .row {
          display: grid;
          grid-template-columns: 64px 360px 1fr;
          align-items: center;
          gap: 24px;
          height: 56px;
        }

        [data-composition-id="box-office-bars"] .rank {
          font-family: "JetBrains Mono", monospace;
          font-size: 22px;
          font-weight: 700;
          color: #4a4640;
          text-align: right;
          letter-spacing: 0.02em;
          opacity: 0;
        }

        [data-composition-id="box-office-bars"] .row.is-champion .rank {
          color: #d97706;
        }

        [data-composition-id="box-office-bars"] .name {
          font-family: "Noto Sans SC", sans-serif;
          font-size: 24px;
          font-weight: 500;
          color: #fafaf5;
          text-align: right;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          opacity: 0;
        }

        [data-composition-id="box-office-bars"] .row.is-champion .name {
          font-weight: 700;
        }

        [data-composition-id="box-office-bars"] .bar-area {
          position: relative;
          height: 100%;
          display: flex;
          align-items: center;
        }

        [data-composition-id="box-office-bars"] .bar-track {
          height: 36px;
          border-radius: 2px;
          position: relative;
          overflow: hidden;
          background: linear-gradient(90deg, #5c5c5c 0%, #4a4a4a 100%);
          width: 0;
          box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
        }

        [data-composition-id="box-office-bars"] .row.is-tier-2 .bar-track {
          background: linear-gradient(90deg, #c2410c 0%, #9a3412 100%);
        }

        [data-composition-id="box-office-bars"] .row.is-champion .bar-track {
          height: 44px;
          background: linear-gradient(90deg, #fbbf24 0%, #d97706 50%, #b45309 100%);
          box-shadow:
            0 0 28px rgba(217, 119, 6, 0.45),
            0 1px 0 rgba(255, 255, 255, 0.1) inset;
        }

        [data-composition-id="box-office-bars"] .bar-shine {
          position: absolute;
          top: 0;
          left: -40%;
          width: 30%;
          height: 100%;
          background: linear-gradient(
            90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.18) 50%,
            transparent 100%
          );
          opacity: 0;
        }

        [data-composition-id="box-office-bars"] .row.is-champion .bar-shine {
          background: linear-gradient(
            90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.45) 50%,
            transparent 100%
          );
        }

        [data-composition-id="box-office-bars"] .value {
          position: absolute;
          font-family: "Inter", sans-serif;
          font-size: 22px;
          font-weight: 700;
          color: #fafaf5;
          letter-spacing: 0.01em;
          opacity: 0;
          white-space: nowrap;
          pointer-events: none;
        }

        [data-composition-id="box-office-bars"] .value-num {
          font-variant-numeric: tabular-nums;
        }

        [data-composition-id="box-office-bars"] .value-unit {
          font-size: 14px;
          font-weight: 500;
          color: #aaa39a;
          margin-left: 4px;
        }

        [data-composition-id="box-office-bars"] .row.is-champion .value {
          font-size: 28px;
          color: #fbbf24;
        }

        [data-composition-id="box-office-bars"] .row.is-champion .value-unit {
          color: #fbbf24;
        }

        [data-composition-id="box-office-bars"] .footer {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding-top: 22px;
          border-top: 1px solid #2a2722;
          font-family: "Inter", sans-serif;
          font-size: 12px;
          letter-spacing: 0.18em;
          color: #4a4640;
          opacity: 0;
        }
      </style>

      <script>
        (function () {
          const data = [
            { rank: 1,  name: '飞驰人生 3',          value: 44.05, tier: 'champion' },
            { rank: 2,  name: '镖人：风起大漠',       value: 14.44, tier: 'tier-2' },
            { rank: 3,  name: '惊蛰无声',             value: 13.61, tier: 'tier-2' },
            { rank: 4,  name: '熊出没·年年有熊',      value: 10.62, tier: 'tier-2' },
            { rank: 5,  name: '熊猫计划之部落奇遇记',  value: 2.87,  tier: 'normal' },
            { rank: 6,  name: '挽救计划',             value: 2.49,  tier: 'normal' },
            { rank: 7,  name: '夜王',                 value: 2.25,  tier: 'normal' },
            { rank: 8,  name: '河狸变身计划',         value: 1.61,  tier: 'normal' },
            { rank: 9,  name: '我，许可',             value: 1.55,  tier: 'normal' },
            { rank: 10, name: '重返寂静岭',           value: 1.42,  tier: 'normal' },
          ];

          const maxValue = data[0].value;
          const BAR_AREA_WIDTH = 1288;
          const VALUE_PAD = 150;
          const MAX_BAR = BAR_AREA_WIDTH - VALUE_PAD;

          const root = document.querySelector('[data-composition-id="box-office-bars"]');
          const rowsContainer = root.querySelector('.rows');

          const makeEl = (tag, className, text) => {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (text != null) el.textContent = text;
            return el;
          };

          data.forEach((d) => {
            const row = makeEl('div', 'row is-' + d.tier);
            row.dataset.idx = String(d.rank - 1);

            const rankPad = String(d.rank).padStart(2, '0');
            row.appendChild(makeEl('div', 'rank', '#' + rankPad));
            row.appendChild(makeEl('div', 'name', d.name));

            const barArea = makeEl('div', 'bar-area');
            const barTrack = makeEl('div', 'bar-track');
            const shine = makeEl('div', 'bar-shine');
            barTrack.appendChild(shine);

            const value = makeEl('div', 'value');
            const valueNum = makeEl('span', 'value-num', '0.00');
            const valueUnit = makeEl('span', 'value-unit', '亿');
            value.appendChild(valueNum);
            value.appendChild(valueUnit);

            barArea.appendChild(barTrack);
            barArea.appendChild(value);
            row.appendChild(barArea);
            rowsContainer.appendChild(row);
          });

          const rows = rowsContainer.querySelectorAll('.row');
          const tl = gsap.timeline({ paused: true });

          tl.to(root.querySelector('.eyebrow'), {
            opacity: 1,
            duration: 0.5,
            ease: 'power2.out',
          }, 0.1);

          tl.to(root.querySelector('.title'), {
            clipPath: 'inset(0 0% 0 0)',
            duration: 1.0,
            ease: 'power2.inOut',
          }, 0.3);

          tl.to(root.querySelector('.subtitle'), {
            opacity: 1,
            duration: 0.6,
            ease: 'power2.out',
          }, 0.9);

          rows.forEach((row, i) => {
            const startTime = 1.0 + i * 0.06;
            tl.to(row.querySelector('.rank'), {
              opacity: 1,
              duration: 0.4,
              ease: 'power2.out',
            }, startTime);
            tl.to(row.querySelector('.name'), {
              opacity: 1,
              duration: 0.4,
              ease: 'power2.out',
            }, startTime);
          });

          // Bars: bottom-up reveal (rank 10 first, champion last)
          const ordered = Array.from(rows).reverse();
          ordered.forEach((row, i) => {
            const idx = Number(row.dataset.idx);
            const d = data[idx];
            const isChampion = d.tier === 'champion';
            const barWidth = (d.value / maxValue) * MAX_BAR;
            const barTrack = row.querySelector('.bar-track');
            const valueEl = row.querySelector('.value');
            const valueNum = row.querySelector('.value-num');
            const shine = row.querySelector('.bar-shine');

            const baseStart = 2.2 + i * 0.22;
            const start = isChampion ? baseStart + 0.5 : baseStart;
            const dur = isChampion ? 1.6 : 0.85;

            tl.to(barTrack, {
              width: barWidth,
              duration: dur,
              ease: isChampion ? 'power3.inOut' : 'power2.out',
            }, start);

            const counter = { v: 0 };
            tl.to(counter, {
              v: d.value,
              duration: dur,
              ease: isChampion ? 'power2.inOut' : 'power2.out',
              onUpdate: () => {
                valueNum.textContent = counter.v.toFixed(2);
              },
            }, start);

            tl.to(valueEl, {
              opacity: 1,
              duration: 0.3,
              ease: 'power2.out',
              onStart: () => {
                valueEl.style.left = (barWidth + 12) + 'px';
              },
            }, start + dur * 0.4);

            if (isChampion) {
              tl.fromTo(shine, {
                opacity: 1,
                left: '-40%',
              }, {
                left: '110%',
                duration: 1.4,
                ease: 'power2.inOut',
              }, start + dur);
            }
          });

          tl.to(root.querySelector('.footer'), {
            opacity: 1,
            duration: 0.6,
            ease: 'power2.out',
          }, 6.8);

          // Champion bar slow-breathing glow during hold (7-10s)
          const championRow = root.querySelector('.row.is-champion .bar-track');
          if (championRow) {
            tl.to(championRow, {
              boxShadow:
                '0 0 60px rgba(217, 119, 6, 0.85), 0 1px 0 rgba(255, 255, 255, 0.1) inset',
              duration: 1.2,
              ease: 'sine.inOut',
              yoyo: true,
              repeat: 2,
            }, 7.0);
          }

          tl.to({}, { duration: 0.6 }, '>');

          window.__timelines = window.__timelines || {};
          window.__timelines['box-office-bars'] = tl;
        })();
      </script>
    </div>
  </body>
</html>
