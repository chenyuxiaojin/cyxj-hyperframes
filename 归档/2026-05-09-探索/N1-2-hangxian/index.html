<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>N1-2 — 跨洋航线 (NYC→Paris, 6s)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="n1-2-hangxian"
      data-start="0"
      data-duration="6"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="block-flight-map"
        data-composition-id="nyc-paris-flight"
        data-composition-src="compositions/nyc-paris-flight.html"
        data-start="0"
        data-duration="6"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- ===== grain-overlay component（胶片颗粒，全程叠在所有内容之上）===== -->
      <div
        id="grain-overlay"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 100;
        "
      >
        <div class="grain-texture"></div>
      </div>
    </div>

    <style>
      @keyframes hf-grain-noise {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -5%); }
        20% { transform: translate(-10%, 5%); }
        30% { transform: translate(5%, -10%); }
        40% { transform: translate(-5%, 15%); }
        50% { transform: translate(-10%, 5%); }
        60% { transform: translate(15%, 0); }
        70% { transform: translate(0, 10%); }
        80% { transform: translate(-15%, 0); }
        90% { transform: translate(10%, 5%); }
      }
      #grain-overlay .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.15;
        animation: hf-grain-noise 0.5s steps(1) infinite;
      }
    </style>

    <script>
      const tl = gsap.timeline({ paused: true });
      tl.to({}, { duration: 6 }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines["n1-2-hangxian"] = tl;
    </script>
  </body>
</html>
