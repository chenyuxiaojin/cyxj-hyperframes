<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>CLI vs TUI vs GUI — 一句话区分三者</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/xcyj-tokens.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: var(--c-bg);
        font-family: var(--f-zh);
        color: #2B2622;
      }

      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
      }

      /* ── DNA 四件套：grid + vignette + grain + crosshair（全程） ── */
      #global-grid {
        position: absolute; inset: 0;
        pointer-events: none;
        z-index: 5;
        background-image:
          linear-gradient(rgba(43,38,34,.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(43,38,34,.06) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0;
      }
      #global-vignette {
        position: absolute; inset: 0;
        pointer-events: none;
        z-index: 6;
        background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 35%, rgba(43,38,34,.18) 100%);
        opacity: 0;
      }
      #global-grain {
        position: absolute; inset: 0;
        pointer-events: none;
        z-index: 8;
        opacity: 0.08;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
        background-size: 200px 200px;
      }
      .crosshair {
        position: absolute;
        width: 14px; height: 14px;
        z-index: 7;
        pointer-events: none;
        opacity: 0;
      }
      .crosshair::before, .crosshair::after {
        content: "";
        position: absolute;
        background: rgba(43,38,34,.32);
      }
      .crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
      .crosshair::after { top: 0; bottom: 0; left: 50%; width: 1px; transform: translateX(-50%); }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="xcyj-cli-tui-gui-relationship"
      data-start="0"
      data-duration="27"
      data-width="1920"
      data-height="1080"
    >
      <!-- DNA 四件套 -->
      <div id="global-grid"></div>
      <div id="global-vignette"></div>
      <div id="global-grain"></div>

      <div class="crosshair" style="top:120px; left:160px;"></div>
      <div class="crosshair" style="top:120px; right:160px;"></div>
      <div class="crosshair" style="bottom:120px; left:160px;"></div>
      <div class="crosshair" style="bottom:120px; right:160px;"></div>
      <div class="crosshair" style="top:50%; left:80px;"></div>
      <div class="crosshair" style="top:50%; right:80px;"></div>

      <!-- Beat 1 — HOOK (0–4s) 大标题 -->
      <div
        id="beat-1-hook-host"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/beat-1-hook.html"
        data-start="0"
        data-duration="4"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 2 — CLI (4–8.5s) 终端 + 一次性命令 -->
      <div
        id="beat-2-cli-host"
        class="scene-layer"
        data-composition-id="beat-2-cli"
        data-composition-src="compositions/beat-2-cli.html"
        data-start="4"
        data-duration="4.5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 3 — TUI (8.5–13.5s) 终端里画界面 -->
      <div
        id="beat-3-tui-host"
        class="scene-layer"
        data-composition-id="beat-3-tui"
        data-composition-src="compositions/beat-3-tui.html"
        data-start="8.5"
        data-duration="5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 4 — GUI (13.5–18.5s) mac 窗口 + 鼠标 -->
      <div
        id="beat-4-gui-host"
        class="scene-layer"
        data-composition-id="beat-4-gui"
        data-composition-src="compositions/beat-4-gui.html"
        data-start="13.5"
        data-duration="5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 5 — 详情对比图 (18.5–24s) 三栏并排 -->
      <div
        id="beat-5-compare-host"
        class="scene-layer"
        data-composition-id="beat-5-compare"
        data-composition-src="compositions/beat-5-compare.html"
        data-start="18.5"
        data-duration="5.5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 6 — OUTRO (24–27s) -->
      <div
        id="beat-6-outro-host"
        class="scene-layer"
        data-composition-id="beat-6-outro"
        data-composition-src="compositions/beat-6-outro.html"
        data-start="24"
        data-duration="3"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      mainTl.to("#global-grid",     { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.0);
      mainTl.to("#global-vignette", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.0);

      mainTl.to(".crosshair", {
        opacity: 0.8,
        duration: 0.4,
        ease: "sine.inOut",
        yoyo: true,
        repeat: -1,
        stagger: { each: 0.15, from: "random" }
      }, 0.4);

      mainTl.to({}, { duration: 27 }, 0);
      window.__timelines["xcyj-cli-tui-gui-relationship"] = mainTl;
    </script>
  </body>
</html>
