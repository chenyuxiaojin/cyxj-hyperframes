<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;500;600&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #0A0A0A;
        color: #E8E8E6;
      }
      [data-composition-id="beat-1-hook"] {
        position: relative;
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #0A0A0A;
      }
      .b1-smoke-main {
        position: absolute; inset: 0;
        background-image: url("../assets/smoke-main-tiled.webp");
        background-size: 1200px auto;
        background-repeat: repeat;
        opacity: 0;
        z-index: 1;
        mix-blend-mode: screen;
      }
      .b1-smoke-mist {
        position: absolute; inset: 0;
        background-image: url("../assets/smoke-mist-tiled.webp");
        background-size: 1600px auto;
        background-repeat: repeat;
        opacity: 0;
        z-index: 2;
        mix-blend-mode: screen;
      }
      .b1-hero-window {
        position: absolute;
        top: 396px; left: 730px;
        width: 460px; height: 288px;
        border-radius: 16px;
        overflow: hidden;
        opacity: 0;
        z-index: 5;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      }
      .b1-hero-window img {
        width: 100%; height: 100%;
        object-fit: cover;
        filter: brightness(0.9) contrast(1.05);
      }
      .b1-title-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
      }
      .b1-title {
        font-family: "Noto Serif SC", serif;
        font-weight: 900;
        font-size: 220px;
        color: #E8E8E6;
        letter-spacing: 0.12em;
        line-height: 1;
        display: flex;
        gap: 0.05em;
      }
      .b1-title .ch {
        display: inline-block;
        opacity: 0;
      }
      .b1-underline {
        position: absolute;
        left: 50%;
        top: 720px;
        height: 6px;
        width: 0;
        background: #E8E8E6;
        transform: translateX(-50%);
        z-index: 21;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="beat-1-hook"
      data-start="0"
      data-duration="3"
      data-width="1920"
      data-height="1080"
    >
      <div class="b1-smoke-main"></div>
      <div class="b1-smoke-mist"></div>

      <div class="b1-hero-window">
        <img src="../assets/hero-poster.jpg" alt="" />
      </div>

      <div class="b1-title-wrap">
        <div class="b1-title">
          <span class="ch">陈</span>
          <span class="ch">与</span>
          <span class="ch">小</span>
          <span class="ch">金</span>
        </div>
      </div>

      <div class="b1-underline"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true, defaults: { overwrite: "auto" } });

      tl.to(".b1-smoke-main", { opacity: 0.55, duration: 1.2, ease: "power2.out" }, 0);
      tl.to(".b1-smoke-mist", { opacity: 0.35, duration: 1.2, ease: "power3.out" }, 0);

      tl.fromTo(".b1-hero-window",
        { opacity: 0, y: 30 },
        { opacity: 0.85, y: 0, duration: 0.7, ease: "power3.out" },
        0.8
      );

      tl.fromTo(".b1-title .ch",
        { opacity: 0, scale: 1.08 },
        { opacity: 1, scale: 1.0, duration: 0.4, ease: "back.out(1.4)", stagger: 0.15 },
        1.2
      );

      tl.to(".b1-title", { scale: 1.02, duration: 0.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.5);

      tl.to(".b1-underline", { width: 280, duration: 0.5, ease: "power3.out" }, 2.5);

      tl.to({}, { duration: 3 }, 0);

      window.__timelines["beat-1-hook"] = tl;
    </script>
  </body>
</html>
