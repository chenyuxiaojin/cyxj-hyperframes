<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #0A0A0A;
      }
      [data-composition-id="beat-3-platforms"] {
        position: relative;
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #0A0A0A;
      }
      .b3-smoke-main {
        position: absolute; inset: 0;
        background-image: url("../assets/smoke-main-tiled.webp");
        background-size: 1200px auto;
        background-repeat: repeat;
        opacity: 0.5;
        z-index: 1;
        mix-blend-mode: screen;
      }
      .b3-smoke-mist {
        position: absolute; inset: 0;
        background-image: url("../assets/smoke-mist-tiled.webp");
        background-size: 1600px auto;
        background-repeat: repeat;
        opacity: 0.32;
        z-index: 2;
        mix-blend-mode: screen;
      }
      .b3-kicker {
        position: absolute;
        top: 110px;
        left: 0; right: 0;
        text-align: center;
        font-family: "Archivo Black", sans-serif;
        font-weight: 400;
        font-size: 28px;
        color: #A0A0A0;
        letter-spacing: 0.4em;
        opacity: 0;
        z-index: 20;
      }
      .b3-cards {
        position: absolute;
        top: 220px;
        left: 0; right: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 30px;
        z-index: 10;
      }
      .b3-card {
        position: relative;
        width: 460px;
        opacity: 0;
        transform: translateX(900px);
      }
      .b3-card-img {
        width: 460px;
        height: 640px;
        border-radius: 24px;
        background: #18181B;
        overflow: hidden;
        box-shadow: 0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06) inset;
      }
      .b3-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .b3-caption {
        margin-top: 18px;
        text-align: center;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 26px;
        color: #E8E8E6;
        letter-spacing: 0.05em;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="beat-3-platforms"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="b3-smoke-main"></div>
      <div class="b3-smoke-mist"></div>

      <div class="b3-kicker">WHERE TO FIND ME</div>

      <div class="b3-cards">
        <div class="b3-card" data-card="1">
          <div class="b3-card-img"><img src="../assets/douyin.webp" alt="" /></div>
          <div class="b3-caption">抖音 · 408 粉</div>
        </div>
        <div class="b3-card" data-card="2">
          <div class="b3-card-img"><img src="../assets/bilibili.webp" alt="" /></div>
          <div class="b3-caption">B 站 · Lv4 · 21 条</div>
        </div>
        <div class="b3-card" data-card="3">
          <div class="b3-card-img"><img src="../assets/wechat.webp" alt="" /></div>
          <div class="b3-caption">视频号 · 主阵地</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true, defaults: { overwrite: "auto" } });

      // Top kicker
      tl.fromTo(".b3-kicker",
        { x: 40, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.3, ease: "power3.out" },
        0
      );

      // Cards slide in from right
      tl.fromTo(".b3-card",
        { x: 900, opacity: 0, scale: 0.95 },
        { x: 0, opacity: 1, scale: 1.0, duration: 0.5, ease: "power3.out", stagger: 0.2 },
        0.3
      );

      // Captions rise in
      tl.fromTo(".b3-caption",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: "power3.out", stagger: 0.15 },
        1.5
      );

      // Cards idle floating (different phases via stagger)
      tl.to('.b3-card[data-card="1"]', { y: -4, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.5);
      tl.to('.b3-card[data-card="2"]', { y: -6, duration: 2.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.4);
      tl.to('.b3-card[data-card="3"]', { y: -5, duration: 2.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.6);

      // Kicker blink near end
      tl.to(".b3-kicker", { opacity: 0.4, duration: 0.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.5);

      tl.to({}, { duration: 5 }, 0);

      window.__timelines["beat-3-platforms"] = tl;
    </script>
  </body>
</html>
