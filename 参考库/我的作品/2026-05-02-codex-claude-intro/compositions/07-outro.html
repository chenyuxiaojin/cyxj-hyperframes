<template id="beat-7-outro-template">
  <div
    data-composition-id="beat-7-outro"
    data-start="0"
    data-duration="4"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Beat 7 (master 48.0–52.0s, local 0–4s)
      Long outro — Law #9：5s+ outro 换取前面的运动快感。
      画面 hold：网格缓退 + grain 静止 + 频道 ID 锁定。
    -->

    <div class="b7-stage">
      <div class="b7-eyebrow">XCYJ · CLAUDE CODE 创作者</div>
      <div class="b7-channel-name">陈与小金</div>
      <div class="b7-handle">@xcyj</div>
      <div class="b7-divider"></div>
      <div class="b7-tagline">下期见 — Codex 保姆级教程</div>
    </div>

    <style>
      [data-composition-id="beat-7-outro"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
      }
      [data-composition-id="beat-7-outro"] .b7-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }
      [data-composition-id="beat-7-outro"] .b7-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.46em;
        padding-left: 0.46em;
        color: #d97757;
        text-shadow: 0 0 12px rgba(217, 119, 87, 0.55);
      }
      [data-composition-id="beat-7-outro"] .b7-channel-name {
        font-size: 132px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 30px rgba(217, 119, 87, 0.55),
          0 0 64px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-7-outro"] .b7-handle {
        font-family: "JetBrains Mono", monospace;
        font-size: 28px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.18em;
      }
      [data-composition-id="beat-7-outro"] .b7-divider {
        width: 240px;
        height: 4px;
        background: linear-gradient(
          90deg,
          rgba(217, 119, 87, 0),
          #d97757,
          rgba(217, 119, 87, 0)
        );
        border-radius: 2px;
        box-shadow: 0 0 18px rgba(217, 119, 87, 0.65);
      }
      [data-composition-id="beat-7-outro"] .b7-tagline {
        font-size: 26px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.06em;
      }
    </style>

    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ====================================================
        // PHASE 0 (0.0–1.0s) — outro 入场（缓慢，对应 long-outro 节奏）
        // ====================================================
        tl.from('[data-composition-id="beat-7-outro"] .b7-eyebrow',
          { opacity: 0, y: 10, duration: 0.50,
            ease: "power3.out" }, 0.10);
        tl.from('[data-composition-id="beat-7-outro"] .b7-channel-name',
          { opacity: 0, y: 30, filter: "blur(18px)",
            duration: 0.75, ease: "power4.out" }, 0.30);
        tl.from('[data-composition-id="beat-7-outro"] .b7-handle',
          { opacity: 0, y: 12, duration: 0.45,
            ease: "power3.out" }, 0.85);
        tl.from('[data-composition-id="beat-7-outro"] .b7-divider',
          { width: 0, opacity: 0, duration: 0.55,
            ease: "expo.out" }, 1.10);
        tl.from('[data-composition-id="beat-7-outro"] .b7-tagline',
          { opacity: 0, y: 10, duration: 0.45,
            ease: "power3.out" }, 1.40);

        // ====================================================
        // PHASE 1 (1.8–4.0s) — hold（呼吸 + grain feel）
        //   channel name 缓慢推近，divider glow 呼吸
        // ====================================================
        tl.to('[data-composition-id="beat-7-outro"] .b7-channel-name',
          { scale: 1.03, duration: 2.0, ease: "sine.inOut" }, 1.80);

        gsap.to('[data-composition-id="beat-7-outro"] .b7-divider',
          { boxShadow: "0 0 28px rgba(217,119,87,0.85), 0 0 56px rgba(217,119,87,0.4)",
            duration: 0.9, repeat: 2, yoyo: true,
            ease: "sine.inOut", delay: 1.80 });

        // 不做 fade-out — outro 静止 hold 到底

        // Duration anchor
        tl.to({}, { duration: 4 }, 0);
        window.__timelines["beat-7-outro"] = tl;
      })();
    </script>
  </div>
</template>
