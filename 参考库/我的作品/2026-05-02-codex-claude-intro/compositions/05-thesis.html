<template id="beat-5-thesis-template">
  <div
    data-composition-id="beat-5-thesis"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Beat 5 (master 37.0–43.0s, local 0–6s)
      文案："发挥 1+1>2 的威力"
      纯 kinetic type：1 + 1 > 2 三段式冲屏，> 用 Claude 橙渲染，
      dolly 穿字 + 后续静音 hold 余韵（Law #9 — long outro 维持节奏）
    -->

    <div class="b5-stage">
      <div class="b5-row">
        <span class="b5-token b5-one">1</span>
        <span class="b5-token b5-plus">+</span>
        <span class="b5-token b5-one2">1</span>
        <span class="b5-token b5-gt">&gt;</span>
        <span class="b5-token b5-two">2</span>
      </div>
      <div class="b5-tagline">1 + 1 大于 2 的威力</div>
    </div>

    <style>
      [data-composition-id="beat-5-thesis"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Inter", "Noto Sans SC", sans-serif;
      }
      [data-composition-id="beat-5-thesis"] .b5-stage {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
      }
      [data-composition-id="beat-5-thesis"] .b5-row {
        display: flex;
        align-items: center;
        gap: 36px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="beat-5-thesis"] .b5-token {
        display: inline-block;
        font-size: 280px;
      }
      [data-composition-id="beat-5-thesis"] .b5-one,
      [data-composition-id="beat-5-thesis"] .b5-one2 {
        background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 62%, #ededed 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 32px rgba(255, 255, 255, 0.32),
          0 0 64px rgba(255, 255, 255, 0.14);
      }
      [data-composition-id="beat-5-thesis"] .b5-plus {
        color: rgba(255, 255, 255, 0.45);
        font-weight: 300;
        font-size: 200px;
      }
      [data-composition-id="beat-5-thesis"] .b5-gt {
        color: #d97757;
        font-weight: 300;
        font-size: 320px;
        text-shadow:
          0 0 40px rgba(217, 119, 87, 0.85),
          0 0 100px rgba(217, 119, 87, 0.45);
      }
      [data-composition-id="beat-5-thesis"] .b5-two {
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 32px rgba(217, 119, 87, 0.55),
          0 0 64px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-5-thesis"] .b5-tagline {
        font-size: 36px;
        font-weight: 500;
        letter-spacing: 0.16em;
        color: rgba(255, 255, 255, 0.72);
      }
    </style>

    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ====================================================
        // PHASE 0 (0.0–2.4s) — tokens stagger 冲屏
        // ====================================================
        tl.from('[data-composition-id="beat-5-thesis"] .b5-one',
          { scale: 4.5, opacity: 0, filter: "blur(28px)",
            duration: 0.55, ease: "power4.out" }, 0.10);
        tl.from('[data-composition-id="beat-5-thesis"] .b5-plus',
          { scale: 0.3, opacity: 0, rotation: -45,
            duration: 0.45, ease: "back.out(2.0)" }, 0.65);
        tl.from('[data-composition-id="beat-5-thesis"] .b5-one2',
          { scale: 4.5, opacity: 0, filter: "blur(28px)",
            duration: 0.55, ease: "power4.out" }, 1.05);
        tl.from('[data-composition-id="beat-5-thesis"] .b5-gt',
          { scale: 0.2, opacity: 0, rotation: -180,
            duration: 0.7, ease: "back.out(2.4)" }, 1.55);
        tl.from('[data-composition-id="beat-5-thesis"] .b5-two',
          { scale: 4.5, opacity: 0, filter: "blur(28px)",
            duration: 0.65, ease: "power4.out" }, 2.10);

        // ====================================================
        // PHASE 1 (2.6–3.4s) — > 持续呼吸，整 row scale 一下强调
        // ====================================================
        tl.to('[data-composition-id="beat-5-thesis"] .b5-row',
          { scale: 1.06, duration: 0.40, ease: "power2.out" }, 2.70);
        tl.to('[data-composition-id="beat-5-thesis"] .b5-row',
          { scale: 1.00, duration: 0.40, ease: "power2.in" }, 3.10);

        gsap.to('[data-composition-id="beat-5-thesis"] .b5-gt',
          { textShadow:
              "0 0 64px rgba(217,119,87,0.95), 0 0 140px rgba(217,119,87,0.55)",
            duration: 0.7, repeat: 5, yoyo: true,
            ease: "sine.inOut", delay: 2.50 });

        // ====================================================
        // PHASE 2 (3.4–4.0s) — tagline 入场
        // ====================================================
        tl.from('[data-composition-id="beat-5-thesis"] .b5-tagline',
          { y: 16, opacity: 0, filter: "blur(8px)",
            duration: 0.50, ease: "power3.out" }, 3.50);

        // ====================================================
        // PHASE 3 (4.0–5.4s) — hold（让画面呼吸）
        //   tokens 微微推近，维持节奏
        // ====================================================
        tl.to('[data-composition-id="beat-5-thesis"] .b5-stage',
          { scale: 1.04, duration: 1.40, ease: "sine.inOut" }, 4.00);

        // ====================================================
        // PHASE 4 (5.40–6.0s) — whip out
        // ====================================================
        tl.to('[data-composition-id="beat-5-thesis"] .b5-stage',
          { scale: 1.18, opacity: 0, filter: "blur(24px)",
            duration: 0.55, ease: "power3.in" }, 5.40);

        // Duration anchor
        tl.to({}, { duration: 6 }, 0);
        window.__timelines["beat-5-thesis"] = tl;
      })();
    </script>
  </div>
</template>
