<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>XCYJ — Claude Code HyperFrames Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: transparent;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        color: #ffffff;
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="xcyj-claude-overlays-only"
      data-start="0"
      data-duration="26"
      data-width="1920"
      data-height="1080"
    >
      <!-- 录屏已抽离：只渲染 4 个 overlay，输出 alpha 通道 ProRes 4444 给达芬奇 -->

      <!-- BEAT 1 — Hook: "用 Claude Code 自动做动效" 中文卡片，FULL 模式 -->
      <div
        id="beat-1"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="3.95"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 2 — Claude Code 终端演示（说"演示如何让 Claude Code 帮我添加..."），FULL 模式 -->
      <div
        id="beat-2"
        class="scene-layer"
        data-composition-id="beat-2-terminal"
        data-composition-src="compositions/02-claude-terminal.html"
        data-start="5.46"
        data-duration="5.78"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 3 — 动效合集（说"帮我添加旁边的这些动效"），PIP 模式开始 -->
      <div
        id="beat-3"
        class="scene-layer"
        data-composition-id="beat-c-motion-grid"
        data-composition-src="compositions/03-motion-grid.html"
        data-start="11.24"
        data-duration="3.88"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 5 — PiP 主舞台（Claude Code 终端 + mini 片头/片尾 + outro），PIP 模式 -->
      <div
        id="beat-5"
        class="scene-layer"
        data-composition-id="beat-5-pip"
        data-composition-src="compositions/05-pip.html"
        data-start="15.12"
        data-duration="10.88"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // 录屏已抽离到达芬奇时间线，hyperframes 这里只负责 overlay timeline。
      // 时长锚点：26s 主合成总长（与 v2 保持一致，方便达芬奇里逐帧对齐录屏）。
      mainTl.to({}, { duration: 26 }, 0);
      window.__timelines["xcyj-claude-overlays-only"] = mainTl;
    </script>
  </body>
</html>
