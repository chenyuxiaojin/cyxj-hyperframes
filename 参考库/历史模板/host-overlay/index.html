<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>XCYJ — Claude Code HyperFrames Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #05080f;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        color: #ffffff;
      }
      #face-wrapper {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-origin: 0 0;
        z-index: 0;
        background: #000;
      }
      #face-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background:
          radial-gradient(circle at 35% 25%, rgba(217, 119, 87, 0.20), transparent 34%),
          linear-gradient(135deg, #111827 0%, #05080f 62%, #1c0e0a 100%);
        color: rgba(255, 255, 255, 0.86);
        font-family: "JetBrains Mono", "Noto Sans SC", monospace;
      }
      #face-video .placeholder-title {
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }
      #face-video .placeholder-subtitle {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.56);
        letter-spacing: 0.08em;
      }
      #face-wrapper.pip {
        z-index: 10;
        border-radius: 36px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset,
          0 0 60px rgba(217, 119, 87, 0.25);
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="xcyj-claude-demo-v2"
      data-start="0"
      data-duration="26"
      data-width="1920"
      data-height="1080"
    >
      <!-- 录屏占位：复制模板后，把这个 div 换成 muted video + 单独 audio。 -->
      <div id="face-wrapper">
        <div id="face-video">
          <div class="placeholder-title">REPLACE WITH RECORDING</div>
          <div class="placeholder-subtitle">assets/recording.mp4 · muted video + separate audio</div>
        </div>
      </div>

      <!-- BEAT 1 — Hook: "用 Claude Code 自动做动效" 中文卡片，FULL 模式 -->
      <div
        id="beat-1"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="3.95"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 2 — Claude Code 终端演示（说"演示如何让 Claude Code 帮我添加..."），FULL 模式 -->
      <div
        id="beat-2"
        class="scene-layer"
        data-composition-id="beat-2-terminal"
        data-composition-src="compositions/02-claude-terminal.html"
        data-start="5.46"
        data-duration="5.78"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 3 — 动效合集（说"帮我添加旁边的这些动效"），PIP 模式开始 -->
      <div
        id="beat-3"
        class="scene-layer"
        data-composition-id="beat-c-motion-grid"
        data-composition-src="compositions/03-motion-grid.html"
        data-start="11.24"
        data-duration="3.88"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 5 — PiP 主舞台（Claude Code 终端 + mini 片头/片尾 + outro），PIP 模式 -->
      <div
        id="beat-5"
        class="scene-layer"
        data-composition-id="beat-5-pip"
        data-composition-src="compositions/05-pip.html"
        data-start="15.12"
        data-duration="10.88"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // 录屏 wrapper 模式：
      //   FULL  (0–11.24s)   — 占满 1920×1080
      //   PIP   (11.24–26s)  — 缩到右上 540×960，给左侧主舞台让位
      const FULL = { x: 0, y: 0, width: 1920, height: 1080 };
      const PIP  = { x: 1340, y: 60, width: 540, height: 960 };

      gsap.set("#face-wrapper", FULL);

      // 11.24s 起切到 PIP（与"帮我添加旁边的这些动效"语义边界对齐），0.5s 完成
      mainTl.to("#face-wrapper",
        { ...PIP, duration: 0.50, ease: "power3.inOut",
          onStart: () => document.getElementById("face-wrapper").classList.add("pip") },
        11.24);

      // duration anchor
      mainTl.to({}, { duration: 26 }, 0);
      window.__timelines["xcyj-claude-demo-v2"] = mainTl;
    </script>
  </body>
</html>
