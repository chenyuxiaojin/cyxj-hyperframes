    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const ROOT = '[data-composition-id="beat-5-pip"]';

        // -------- 种子星空（确定性，无 Math.random） --------
        const starsEl = document.querySelector(ROOT + ' .b5-stars');
        const STAR_COUNT = 36;
        const stars = [];
        if (starsEl) {
          for (let i = 0; i < STAR_COUNT; i++) {
            const el = document.createElement("div");
            el.className = "b5-star";
            const hx = Math.abs(Math.sin(i * 12.9898 + 78.233));
            const hy = Math.abs(Math.cos(i * 4.1414 + 23.456));
            const size = 1.5 + (Math.abs(Math.sin(i * 2.71)) * 3);
            el.style.left   = (40 + hx * 1240) + "px";
            el.style.top    = (40 + hy * 1000) + "px";
            el.style.width  = size + "px";
            el.style.height = size + "px";
            el.style.opacity = (0.25 + Math.abs(Math.sin(i * 3.14)) * 0.55).toFixed(2);
            starsEl.appendChild(el);
            stars.push(el);
          }
        }

        // ---- 0–0.5s 背景起场 ----
        tl.from(ROOT + ' .b5-bg',       { opacity: 0, duration: 0.50, ease: "power2.out" }, 0);
        tl.from(ROOT + ' .b5-grid',     { opacity: 0, duration: 0.80, ease: "power2.out" }, 0.10);
        tl.from(ROOT + ' .b5-pip-halo', { opacity: 0, scale: 0.85, duration: 0.80, ease: "power3.out" }, 0.15);

        stars.forEach((s, i) => {
          const dx = Math.sin(i * 0.9) * 22;
          const dy = -14 - Math.abs(Math.cos(i * 1.3)) * 10;
          gsap.to(s, {
            x: dx, y: dy, duration: 3.2, repeat: 3, yoyo: true,
            ease: "sine.inOut", delay: (i % 8) * 0.08,
          });
        });

        // ---- 0.6–3.5s 铺垫：kicker + 状态行 ----
        tl.to(ROOT + ' .b5-kicker', { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.60);
        tl.from(ROOT + ' .b5-kicker',
          { x: -14, duration: 0.4, ease: "expo.out" }, 0.60);

        tl.to(ROOT + ' .b5-statusline', { opacity: 1, duration: 0.5, ease: "power2.out" }, 1.20);
        tl.to(ROOT + ' .b5-status-cursor',
          { opacity: 0, duration: 0.4, repeat: 5, yoyo: true, ease: "steps(1)" }, 1.50);

        // ---- 3.40–3.98s 终端窗口滑入 ----
        tl.to(ROOT + ' .b5-term', { opacity: 1, duration: 0.01 }, 3.40);
        tl.from(ROOT + ' .b5-term',
          { x: -80, scale: 0.92, filter: "blur(14px)",
            duration: 0.55, ease: "power3.out" }, 3.40);
