<!--
  text-effects.html — 4 个流式文本动效变体

  用法：
    1. composition <head> 里 link CSS：
       <link rel="stylesheet" href="../components/text-effects/text-effects.css" />
    2. 选下面一个变体粘到 composition body
    3. 看 README 里对应的 GSAP timeline 模板驱动它

  HARD_CONSTRAINTS：
    #1 GSAP selector 用硬编码字符串，不用 template literal
    #2 复制变体到多个 beat 时，全局换内层 id（te-blur-1 → te-blur-hook 之类）
-->


<!-- ===================================================================
     变体 A · blur-sharpen — 编辑级标题 / 引语优雅出场
     用法：手 span 拆词（CJK 用短语 chunks，英文按词或半句切）
     =================================================================== -->
<div class="te-blur" id="te-blur-1">
  <span class="te-word">我自己</span>
  <span class="te-word">都不读</span>
</div>

<!--
  英文示例（spaces 用 nbsp 显式保留）：
  <div class="te-blur" id="te-blur-en">
    <span class="te-word">I've stopped</span>&nbsp;
    <span class="te-word">using</span>&nbsp;
    <span class="te-word">Markdown</span>
  </div>
-->


<!-- ===================================================================
     变体 B · skeleton-fill — "加载 → 答案"过渡
     init 函数按 data-lines 把 data-text 拆成 N 行 row
     =================================================================== -->
<div class="te-skel" id="te-skel-1"
     data-text="Sunlight scatters off the air. Blue wavelengths scatter most, so the sky glows blue."
     data-lines="4">
  <!-- inline init 会在这里填多行 .te-skel-row -->
</div>


<!-- ===================================================================
     变体 C · char-scramble — AI / 解码瞬间
     init 函数按 data-text 逐字符拆 .te-char（带 data-real 存真值）
     =================================================================== -->
<div class="te-scr" id="te-scr-1"
     data-text="claude.ai is ready">
</div>


<!-- ===================================================================
     变体 D · token-chunks — LLM 流式输出味道
     init 函数按伪 BPE 切 token（2-6 字符 + 词边界对齐 + 吸附空格）
     =================================================================== -->
<div class="te-tok" id="te-tok-1"
     data-text="Brains rehearsing, sorting, and sometimes just playing while the body rests.">
</div>


<!-- ===================================================================
     公共 init script —— B / C / D 三个变体的 DOM 拆分
     放在 composition body 末尾、GSAP timeline 之前
     无 innerHTML 注入；data-text 只走 textContent
     =================================================================== -->
<script>
  (function () {
    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    /* B. skeleton-fill：按 data-lines 切行 */
    document.querySelectorAll('.te-skel[data-text]').forEach(function (root) {
      var text = root.getAttribute('data-text') || '';
      var target = parseInt(root.getAttribute('data-lines'), 10) || 4;
      var words = text.split(/\s+/).filter(Boolean);
      var per = Math.max(2, Math.ceil(words.length / target));
      clear(root);
      var rowIdx = 0;
      for (var i = 0; i < words.length; i += per) {
        var chunk = words.slice(i, i + per).join(' ');
        var row = document.createElement('div');
        row.className = 'te-skel-row';
        var bar = document.createElement('div');
        bar.className = 'te-skel-bar';
        bar.style.width = (70 + ((rowIdx * 13) % 22)) + '%';
        var txt = document.createElement('div');
        txt.className = 'te-skel-text';
        txt.textContent = chunk;
        row.appendChild(bar);
        row.appendChild(txt);
        root.appendChild(row);
        rowIdx++;
      }
    });

    /* C. char-scramble：逐字符拆，留 data-real 给 GSAP 锁定时取真值 */
    document.querySelectorAll('.te-scr[data-text]').forEach(function (root) {
      var text = root.getAttribute('data-text') || '';
      clear(root);
      for (var i = 0; i < text.length; i++) {
        var c = text[i];
        if (c === ' ') {
          root.appendChild(document.createTextNode(' '));
          continue;
        }
        var span = document.createElement('span');
        span.className = 'te-char';
        span.setAttribute('data-real', c);
        /* 初始占位为真值；GSAP 启动后会先 scramble 再锁定 */
        span.textContent = c;
        root.appendChild(span);
      }
    });

    /* D. token-chunks：伪 BPE 切 2-6 字符 + 吸附尾随空格 */
    document.querySelectorAll('.te-tok[data-text]').forEach(function (root, idx) {
      var text = root.getAttribute('data-text') || '';
      var s = ((idx + 1) * 1013904223) >>> 0;
      function rand() {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 0xffffffff;
      }
      var tokens = [];
      var i = 0;
      while (i < text.length) {
        var size = 2 + Math.floor(rand() * 5);
        var end = Math.min(i + size, text.length);
        while (
          end < text.length &&
          /\w/.test(text[end - 1]) &&
          /\w/.test(text[end]) &&
          end - i < 8
        ) {
          end++;
        }
        var piece = text.slice(i, end);
        if (tokens.length && /^\s+$/.test(piece)) {
          tokens[tokens.length - 1] += piece;
        } else {
          tokens.push(piece);
        }
        i = end;
      }
      clear(root);
      tokens.forEach(function (tk) {
        var span = document.createElement('span');
        span.className = 'te-token';
        span.textContent = tk;
        root.appendChild(span);
      });
    });
  })();
</script>
