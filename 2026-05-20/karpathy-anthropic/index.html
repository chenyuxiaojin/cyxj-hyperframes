    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #F7F2EA;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        color: #2B2622;
        /* 整片数字列对齐（SKILL.md:357 "tabular-nums on number columns"），只影响 0-9 等宽 */
        font-variant-numeric: tabular-nums;
      }

      #root { position: relative; width: 1920px; height: 1080px; }

      /* ── 全局四件套（z-index 5-8，全程显示，不遮主体内容）── */

      /* 1. 透视网格（米色底专用，棕灰细线）*/
      #global-grid {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
        pointer-events: none;
        z-index: 5;
        background-image:
          linear-gradient(rgba(43, 38, 34, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(43, 38, 34, 0.06) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0;
      }

      /* 2. 暗角 vignette（米色底专用，深棕渐变）*/
      #global-vignette {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
        pointer-events: none;
        z-index: 6;
        background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 35%, rgba(43, 38, 34, 0.18) 100%);
        opacity: 0;
      }

      /* 3. crosshair 四角小十字 */
      .crosshair {
        position: absolute;
        pointer-events: none;
        z-index: 7;
        width: 28px; height: 28px;
        opacity: 0;
      }
      .crosshair::before, .crosshair::after {
        content: "";
        position: absolute;
        background: rgba(43, 38, 34, 0.32);
      }
      .crosshair::before { left: 50%; top: 0; width: 1px; height: 28px; transform: translateX(-50%); }
      .crosshair::after  { top: 50%; left: 0; height: 1px; width: 28px; transform: translateY(-50%); }
      #ch-tl { top: 60px;   left: 60px; }
      #ch-tr { top: 60px;   right: 60px; }
      #ch-bl { bottom: 60px;left: 60px; }
      #ch-br { bottom: 60px;right: 60px; }

      /* 4. grain 颗粒（SVG turbulence）*/
      #global-grain {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
        pointer-events: none;
        z-index: 8;
        opacity: 0;
        mix-blend-mode: multiply;
      }
    </style>
  </head>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 全局四件套入场（0-1s 渐显，全程保持，不退场）
      tl.to('#global-grid',     { opacity: 1,    duration: 1.0, ease: 'power2.out' }, 0.0);
      tl.to('#global-vignette', { opacity: 1,    duration: 1.2, ease: 'power2.out' }, 0.0);
      tl.to('.crosshair',       { opacity: 1,    duration: 0.6, ease: 'power2.out', stagger: 0.08 }, 0.3);
      tl.to('#global-grain',    { opacity: 0.10, duration: 1.5, ease: 'power2.out' }, 0.5);

      // 时长锚（21:32 = 1292s，hyperframes 用 data-duration，timeline 长度仅参考）
      tl.set({}, {}, 1292);

      window.__timelines['xcyj-karpathy-anthropic'] = tl;
