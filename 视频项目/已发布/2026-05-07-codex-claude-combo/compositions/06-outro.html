<!-- Beat 6 outro (53→60s, 7s) — "1+1>2 的威力，直接进入正题"
     视觉：1 + 1 > 2 大字等式 + 底部箭头 -->

<template id="beat-6-outro-template">
  <div
    data-composition-id="beat-6-outro"
    data-start="0"
    data-duration="7"
    data-width="1920"
    data-height="1080"
  >
    <style>
      [data-composition-id="beat-6-outro"] .b6-kicker {
        position: absolute;
        top: 220px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--f-mono);
        font-size: var(--fs-kicker);
        font-weight: 500;
        color: rgba(26, 22, 20, 0.45);
        letter-spacing: 4px;
        text-transform: uppercase;
        z-index: 12;
      }
      [data-composition-id="beat-6-outro"] .b6-eq {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        gap: 36px;
        z-index: 12;
      }
      [data-composition-id="beat-6-outro"] .b6-glyph {
        font-family: var(--f-en);
        font-weight: 900;
        font-size: 240px;
        line-height: 1;
      }
      [data-composition-id="beat-6-outro"] .b6-one-codex {
        color: var(--c-blue);
        text-shadow: 0 0 50px rgba(91, 169, 255, 0.45);
      }
      [data-composition-id="beat-6-outro"] .b6-one-claude {
        color: var(--c-hot);
        text-shadow: 0 0 50px rgba(217, 119, 87, 0.45);
      }
      [data-composition-id="beat-6-outro"] .b6-op {
        color: rgba(26, 22, 20, 0.55);
      }
      [data-composition-id="beat-6-outro"] .b6-two {
        color: var(--c-hot);
        text-shadow: 0 0 50px rgba(217, 119, 87, 0.5);
      }
      [data-composition-id="beat-6-outro"] .b6-cta {
        position: absolute;
        bottom: 220px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        font-family: var(--f-zh);
        font-weight: 600;
        font-size: 36px;
        color: var(--c-hot);
        z-index: 12;
      }
      [data-composition-id="beat-6-outro"] .b6-arrow {
        font-family: var(--f-en);
        font-weight: 700;
        font-size: 40px;
        color: var(--c-hot);
      }
    </style>

    <div class="b6-kicker">06 · OUTRO</div>

    <div class="b6-eq">
      <span class="b6-glyph b6-one-codex">1</span>
      <span class="b6-glyph b6-op">+</span>
      <span class="b6-glyph b6-one-claude">1</span>
      <span class="b6-glyph b6-op">&gt;</span>
      <span class="b6-glyph b6-two">2</span>
    </div>

    <div class="b6-cta">
      <span class="b6-arrow">→</span>
      <span>直接进入正题</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="beat-6-outro"]';

        tl.from(root + ' .b6-kicker', { opacity: 0, y: -10, duration: 0.4, ease: 'power2.out' }, 0);

        // 等式从左到右 stagger 入场
        tl.fromTo(root + ' .b6-one-codex',
          { opacity: 0, y: 30, scale: 0.7 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(2)' }, 0.3);
        tl.fromTo(root + ' .b6-eq .b6-op:nth-of-type(1)',
          { opacity: 0, scale: 0.5 },
          { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(2)' }, 0.6);
        tl.fromTo(root + ' .b6-one-claude',
          { opacity: 0, y: 30, scale: 0.7 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(2)' }, 0.8);
        tl.fromTo(root + ' .b6-eq .b6-op:nth-of-type(2)',
          { opacity: 0, scale: 0.5 },
          { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(2)' }, 1.1);
        tl.fromTo(root + ' .b6-two',
          { opacity: 0, y: 30, scale: 0.5, filter: 'blur(8px)' },
          { opacity: 1, y: 0, scale: 1, filter: 'blur(0px)', duration: 0.7, ease: 'back.out(2.2)' }, 1.4);

        // 2 持续脉冲（呼吸感）
        tl.to(root + ' .b6-two', {
          scale: 1.06, duration: 0.8, ease: 'sine.inOut', repeat: 3, yoyo: true
        }, 2.3);

        // CTA 入场
        tl.from(root + ' .b6-cta', {
          opacity: 0, y: 14, duration: 0.5, ease: 'power2.out'
        }, 2.0);

        // 箭头持续右移呼吸
        tl.to(root + ' .b6-arrow', {
          x: 8, duration: 0.5, ease: 'sine.inOut', repeat: 5, yoyo: true
        }, 2.6);

        // 出场
        tl.to([root + ' .b6-eq', root + ' .b6-cta', root + ' .b6-kicker'], {
          opacity: 0, filter: 'blur(8px)', duration: 0.5, ease: 'power2.in'
        }, 6.4);

        window.__timelines['beat-6-outro'] = tl;
      })();
    </script>
  </div>
</template>
