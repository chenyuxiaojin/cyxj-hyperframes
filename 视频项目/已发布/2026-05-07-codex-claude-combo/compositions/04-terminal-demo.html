<!-- Beat 4 终端实演 (23→37s, 14s) — "Claude Code 会话引入 Codex 审查代码、分派任务、第二双眼睛"
     视觉：cc-window 终端窗口 + 真实 /codex:review 命令演示 + Claude 委派 + Codex 输出
     基于联网核实的 codex@openai-codex 插件实际 slash 命令格式 -->

<template id="beat-4-terminal-demo-template">
  <div
    data-composition-id="beat-4-terminal-demo"
    data-start="0"
    data-duration="14"
    data-width="1920"
    data-height="1080"
  >
    <style>
      [data-composition-id="beat-4-terminal-demo"] .b4-kicker {
        position: absolute;
        top: 140px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--f-mono);
        font-size: var(--fs-kicker);
        font-weight: 500;
        color: rgba(26, 22, 20, 0.45);
        letter-spacing: 4px;
        text-transform: uppercase;
        z-index: 12;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 12;
      }
      [data-composition-id="beat-4-terminal-demo"] .cc-window {
        width: 1100px;
      }
      [data-composition-id="beat-4-terminal-demo"] .cc-body {
        min-height: 380px;
        font-size: 22px;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-claude-line {
        margin-top: 18px;
        color: rgba(248, 241, 231, 0.9);
        font-family: var(--f-mono);
        font-size: 22px;
        line-height: 1.5;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-claude-tag {
        color: var(--cc-orange, #d97757);
        font-weight: 600;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-codex-block {
        margin-top: 16px;
        padding-left: 16px;
        border-left: 2px solid rgba(91, 169, 255, 0.55);
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-codex-header {
        color: rgba(91, 169, 255, 0.95);
        font-family: var(--f-mono);
        font-size: 22px;
        line-height: 1.5;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-codex-item {
        color: rgba(248, 241, 231, 0.85);
        font-family: var(--f-mono);
        font-size: 20px;
        line-height: 1.6;
        padding-left: 24px;
        position: relative;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-codex-item::before {
        content: "✓";
        position: absolute;
        left: 0;
        color: var(--c-green, #8DD891);
        font-weight: 700;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-takeaway {
        position: absolute;
        bottom: 200px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 36px;
        z-index: 12;
      }
      [data-composition-id="beat-4-terminal-demo"] .b4-tag {
        padding: 10px 22px;
        background: rgba(20, 16, 12, 0.06);
        border: 1.5px solid rgba(26, 22, 20, 0.18);
        color: #1a1614;
        font-family: var(--f-zh);
        font-weight: 500;
        font-size: 22px;
        border-radius: 999px;
      }
    </style>

    <div class="b4-kicker">04 · DEMO</div>

    <div class="b4-stage">
      <div class="cc-window" id="b4-cc-window">
        <div class="cc-titlebar">
          <span class="mac-dot r"></span>
          <span class="mac-dot y"></span>
          <span class="mac-dot g"></span>
          <span class="cc-title">claude — ~/project</span>
        </div>
        <div class="cc-body">
          <div class="cc-prompt-line">
            <span class="cc-prompt-arrow">&gt;</span>
            <span class="cc-cmd" id="b4-cmd"></span>
            <span class="cc-cursor" id="b4-cursor"></span>
          </div>

          <div class="b4-claude-line" id="b4-claude-line">
            <span class="b4-claude-tag">[claude]</span>
            Delegating review to Codex…
          </div>

          <div class="b4-codex-block" id="b4-codex-block">
            <div class="b4-codex-header" id="b4-codex-header">
              [codex:review] Analyzing changes in auth.ts
            </div>
            <div class="b4-codex-item" id="b4-codex-item-1">
              SQL injection risk in query builder
            </div>
            <div class="b4-codex-item" id="b4-codex-item-2">
              Suggests parameterized approach
            </div>
            <div class="b4-codex-item" id="b4-codex-item-3">
              Overall: 8/10, minor refactors recommended
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="b4-takeaway">
      <span class="b4-tag b4-tag-1">审查代码</span>
      <span class="b4-tag b4-tag-2">分派任务</span>
      <span class="b4-tag b4-tag-3">第二双眼睛</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="beat-4-terminal-demo"]';

        // 入场前隐藏所有动态行
        gsap.set(root + ' #b4-claude-line', { opacity: 0, y: 8 });
        gsap.set(root + ' #b4-codex-block', { opacity: 0 });
        gsap.set(root + ' #b4-codex-header', { opacity: 0, x: -10 });
        gsap.set([root + ' #b4-codex-item-1', root + ' #b4-codex-item-2', root + ' #b4-codex-item-3'],
          { opacity: 0, x: -10 });
        gsap.set(root + ' .b4-takeaway .b4-tag', { opacity: 0, y: 12 });

        // kicker
        tl.from(root + ' .b4-kicker', { opacity: 0, y: -10, duration: 0.4, ease: 'power2.out' }, 0);

        // cc-window 入场（blur in）
        tl.fromTo(root + ' #b4-cc-window',
          { opacity: 0, y: 20, filter: 'blur(14px)' },
          { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.6, ease: 'power3.out' }, 0.3);

        // cursor 闪烁（steps(1) 硬切；finite repeat 兼容 hyperframes 帧捕获）
        // cursor 活跃 1.0s → 13.4s（出场前），共 12.4s。每周期 0.4s yoyo = 0.8s
        // Math.floor(12.4 / 0.8) - 1 = 14
        tl.to(root + ' #b4-cursor', {
          opacity: 0, duration: 0.4, repeat: 14, yoyo: true, ease: 'steps(1)'
        }, 1.0);

        // typewriter `/codex:review --base main`
        const cmd = '/codex:review --base main';
        const startType = 1.2;
        const perChar = 0.05;
        for (let i = 0; i <= cmd.length; i++) {
          tl.call(function (slice) {
            const el = document.querySelector(root + ' #b4-cmd');
            if (el) el.textContent = slice;
          }, [cmd.slice(0, i)], startType + i * perChar);
        }

        // Claude 委派行入场
        tl.to(root + ' #b4-claude-line', {
          opacity: 1, y: 0, duration: 0.4, ease: 'power2.out'
        }, 3.5);

        // Codex 块入场（左线 fade in）
        tl.to(root + ' #b4-codex-block', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 4.2);
        tl.to(root + ' #b4-codex-header', {
          opacity: 1, x: 0, duration: 0.4, ease: 'power2.out'
        }, 4.5);

        // Codex 输出 3 项 stagger
        tl.to(root + ' #b4-codex-item-1', { opacity: 1, x: 0, duration: 0.35, ease: 'power2.out' }, 5.2);
        tl.to(root + ' #b4-codex-item-2', { opacity: 1, x: 0, duration: 0.35, ease: 'power2.out' }, 5.7);
        tl.to(root + ' #b4-codex-item-3', { opacity: 1, x: 0, duration: 0.35, ease: 'power2.out' }, 6.2);

        // takeaway 三个标签 stagger 入场
        tl.to(root + ' .b4-tag-1', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 7.2);
        tl.to(root + ' .b4-tag-2', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 7.5);
        tl.to(root + ' .b4-tag-3', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 7.8);

        // 出场
        tl.to([root + ' #b4-cc-window', root + ' .b4-takeaway', root + ' .b4-kicker'], {
          opacity: 0, filter: 'blur(8px)', duration: 0.5, ease: 'power2.in'
        }, 13.4);

        window.__timelines['beat-4-terminal-demo'] = tl;
      })();
    </script>
  </div>
</template>
