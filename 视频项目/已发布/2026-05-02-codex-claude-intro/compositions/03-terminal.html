<template id="beat-3-terminal-template">
  <div
    data-composition-id="beat-3-terminal"
    data-start="0"
    data-duration="10"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Beat 3 (master 13.0–23.0s, local 0–10s)
      演示 `claude mcp add codex` 命令把 Codex 作为插件安装到 Claude Code，
      呼应文案"在 Claude Code 会话中引入 Codex 来审查代码、分派任务"。

      Stage layout:
        - LEFT  : Mac 风格 Claude Code 终端（x:80–1080），主体演员
        - RIGHT-TOP : frosted-glass MCP 状态 HUD（model / tools / status）

      视觉语言继承 v2 工程 02-claude-terminal.html（frosted glass + Claude
      orange + JetBrains Mono），所有 selector 由 beat-2-terminal 全局替换为
      beat-3-terminal、CSS class 由 b2- 改为 b3-。
    -->

    <!-- ============== LEFT — terminal window ============== -->
    <div class="b3-term">
      <!-- mac chrome -->
      <div class="b3-term-chrome">
        <span class="b3-dot b3-dot-r"></span>
        <span class="b3-dot b3-dot-y"></span>
        <span class="b3-dot b3-dot-g"></span>
        <span class="b3-term-title">claude-code &nbsp;·&nbsp; ~/codex-demo</span>
        <span class="b3-term-pulse"></span>
      </div>

      <div class="b3-term-body">
        <!-- prompt typewriter -->
        <div class="b3-line b3-prompt-line">
          <span class="b3-caret">❯</span>
          <span class="b3-prompt-cmd">claude </span><span class="b3-prompt-arg">mcp add codex</span><span class="b3-cursor">▋</span>
        </div>

        <!-- thinking -->
        <div class="b3-line b3-thinking">
          <span class="b3-spinner">◐</span>
          <span class="b3-thinking-text">Adding Codex MCP server</span><span class="b3-bounce-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>

        <!-- tool-call log -->
        <div class="b3-log">
          <div class="b3-log-row" data-row="0">
            <span class="b3-arrow">→</span>
            <span class="b3-tool">fetching</span>
            <span class="b3-arg">codex@latest</span>
            <span class="b3-badge b3-ok">ok</span>
          </div>
          <div class="b3-log-row" data-row="1">
            <span class="b3-arrow">→</span>
            <span class="b3-tool">verifying</span>
            <span class="b3-arg">signature</span>
            <span class="b3-badge b3-ok">ok</span>
          </div>
          <div class="b3-log-row" data-row="2">
            <span class="b3-arrow">→</span>
            <span class="b3-tool">registering</span>
            <span class="b3-arg">mcp_servers.json</span>
            <span class="b3-badge b3-ok">ok</span>
          </div>
          <div class="b3-log-row" data-row="3">
            <span class="b3-arrow">→</span>
            <span class="b3-tool">handshake</span>
            <span class="b3-arg">codex ↔ claude</span>
            <span class="b3-badge b3-run">connecting</span>
          </div>
        </div>

        <!-- mcp_settings.json snippet -->
        <div class="b3-code">
          <div class="b3-code-line">
            <span class="b3-c-op">{</span>
          </div>
          <div class="b3-code-line b3-code-indent">
            <span class="b3-c-key">"mcp_servers"</span><span class="b3-c-op">: {</span>
          </div>
          <div class="b3-code-line b3-code-indent2">
            <span class="b3-c-str">"codex"</span><span class="b3-c-op">: { </span><span class="b3-c-key">"command"</span><span class="b3-c-op">: </span><span class="b3-c-str">"codex serve"</span><span class="b3-c-op"> }</span>
          </div>
          <div class="b3-code-line b3-code-indent">
            <span class="b3-c-op">}</span>
          </div>
          <div class="b3-code-line">
            <span class="b3-c-op">}</span>
          </div>
        </div>

        <!-- done -->
        <div class="b3-line b3-done">
          <span class="b3-check">✓</span>
          <span class="b3-done-text">Codex connected — 第二双眼睛已就位</span>
        </div>
      </div>
    </div>

    <!-- ============== RIGHT-TOP — MCP status HUD ============== -->
    <div class="b3-hud">
      <div class="b3-hud-eyebrow">CODEX · MCP STATUS</div>
      <div class="b3-hud-row">
        <span class="b3-hud-key">SERVER</span>
        <span class="b3-hud-val b3-hud-server">codex@1.4</span>
      </div>
      <div class="b3-hud-row">
        <span class="b3-hud-key">TOOLS</span>
        <span class="b3-hud-val b3-hud-tools">0</span>
      </div>
      <div class="b3-hud-row">
        <span class="b3-hud-key">STATUS</span>
        <span class="b3-hud-val b3-hud-state">
          <span class="b3-hud-led"></span><span class="b3-hud-state-text">PENDING</span>
        </span>
      </div>
    </div>

    <style>
      [data-composition-id="beat-3-terminal"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Inter", "Noto Sans SC", sans-serif;
      }

      /* ---------------- LEFT — terminal ---------------- */
      [data-composition-id="beat-3-terminal"] .b3-term {
        position: absolute;
        top: 140px;
        left: 80px;
        width: 1000px;
        background: linear-gradient(180deg, #0d0d12 0%, #08080c 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 80px rgba(217, 119, 87, 0.18);
        overflow: hidden;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      [data-composition-id="beat-3-terminal"] .b3-term-chrome {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 18px;
        background: linear-gradient(180deg, #1b1b22, #131319);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
      }
      [data-composition-id="beat-3-terminal"] .b3-dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        display: inline-block;
      }
      [data-composition-id="beat-3-terminal"] .b3-dot-r { background: #ff5f57; }
      [data-composition-id="beat-3-terminal"] .b3-dot-y { background: #febc2e; }
      [data-composition-id="beat-3-terminal"] .b3-dot-g { background: #28c840; }
      [data-composition-id="beat-3-terminal"] .b3-term-title {
        flex: 1;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.02em;
      }
      [data-composition-id="beat-3-terminal"] .b3-term-pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #d97757;
        box-shadow: 0 0 12px #d97757, 0 0 22px rgba(217, 119, 87, 0.6);
      }

      [data-composition-id="beat-3-terminal"] .b3-term-body {
        padding: 26px 28px 28px;
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.92);
        min-height: 720px;
      }
      [data-composition-id="beat-3-terminal"] .b3-line {
        margin-bottom: 16px;
        white-space: nowrap;
      }

      [data-composition-id="beat-3-terminal"] .b3-prompt-line { font-size: 24px; }
      [data-composition-id="beat-3-terminal"] .b3-caret {
        color: #5eead4;
        font-weight: 700;
        margin-right: 12px;
        text-shadow: 0 0 10px rgba(94, 234, 212, 0.55);
      }
      [data-composition-id="beat-3-terminal"] .b3-prompt-cmd { color: #ffffff; }
      [data-composition-id="beat-3-terminal"] .b3-prompt-arg {
        color: #fde68a;
        text-shadow: 0 0 10px rgba(253, 230, 138, 0.35);
      }
      [data-composition-id="beat-3-terminal"] .b3-cursor {
        display: inline-block;
        margin-left: 2px;
        color: #5eead4;
        transform: translateY(-1px);
      }

      [data-composition-id="beat-3-terminal"] .b3-thinking {
        color: rgba(217, 119, 87, 0.95);
        font-size: 20px;
      }
      [data-composition-id="beat-3-terminal"] .b3-spinner {
        display: inline-block;
        margin-right: 12px;
        color: #d97757;
        text-shadow: 0 0 10px rgba(217, 119, 87, 0.6);
        transform-origin: 50% 50%;
      }
      [data-composition-id="beat-3-terminal"] .b3-thinking-text {
        color: rgba(255, 255, 255, 0.78);
      }
      [data-composition-id="beat-3-terminal"] .b3-bounce-dots span {
        display: inline-block;
        color: #d97757;
        margin-left: 1px;
      }

      [data-composition-id="beat-3-terminal"] .b3-log {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 18px;
      }
      [data-composition-id="beat-3-terminal"] .b3-log-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 20px;
      }
      [data-composition-id="beat-3-terminal"] .b3-arrow {
        color: #d97757;
        font-weight: 700;
        text-shadow: 0 0 8px rgba(217, 119, 87, 0.45);
      }
      [data-composition-id="beat-3-terminal"] .b3-tool { color: #ffffff; }
      [data-composition-id="beat-3-terminal"] .b3-arg { color: rgba(255, 255, 255, 0.55); }
      [data-composition-id="beat-3-terminal"] .b3-badge {
        margin-left: auto;
        padding: 2px 10px;
        font-size: 15px;
        font-weight: 700;
        border-radius: 5px;
        white-space: nowrap;
      }
      [data-composition-id="beat-3-terminal"] .b3-ok {
        color: #8dffb8;
        background: rgba(141, 255, 184, 0.08);
        border: 1px solid rgba(141, 255, 184, 0.4);
      }
      [data-composition-id="beat-3-terminal"] .b3-run {
        color: #d97757;
        background: rgba(217, 119, 87, 0.12);
        border: 1px solid rgba(217, 119, 87, 0.5);
      }

      [data-composition-id="beat-3-terminal"] .b3-code {
        margin-top: 6px;
        margin-bottom: 16px;
        padding: 16px 18px;
        background: rgba(255, 255, 255, 0.025);
        border-left: 2px solid #d97757;
        border-radius: 6px;
        font-size: 18px;
        line-height: 1.65;
      }
      [data-composition-id="beat-3-terminal"] .b3-code-line { white-space: nowrap; }
      [data-composition-id="beat-3-terminal"] .b3-code-indent { padding-left: 22px; }
      [data-composition-id="beat-3-terminal"] .b3-code-indent2 { padding-left: 44px; }
      [data-composition-id="beat-3-terminal"] .b3-c-fn  { color: #93c5fd; }
      [data-composition-id="beat-3-terminal"] .b3-c-op  { color: rgba(255, 255, 255, 0.55); }
      [data-composition-id="beat-3-terminal"] .b3-c-str { color: #fde68a; text-shadow: 0 0 8px rgba(253, 230, 138, 0.3); }
      [data-composition-id="beat-3-terminal"] .b3-c-key { color: #fca5a5; }
      [data-composition-id="beat-3-terminal"] .b3-c-num { color: #f5b39a; }

      [data-composition-id="beat-3-terminal"] .b3-done {
        font-size: 22px;
        margin-top: 4px;
        font-family: "JetBrains Mono", "Noto Sans SC", monospace;
      }
      [data-composition-id="beat-3-terminal"] .b3-check {
        color: #8dffb8;
        font-weight: 700;
        margin-right: 12px;
        text-shadow: 0 0 14px rgba(141, 255, 184, 0.7);
      }
      [data-composition-id="beat-3-terminal"] .b3-done-text {
        color: #ffffff;
      }

      /* ---------------- RIGHT-TOP — HUD ---------------- */
      [data-composition-id="beat-3-terminal"] .b3-hud {
        position: absolute;
        top: 140px;
        right: 80px;
        width: 600px;
        padding: 26px 32px 30px;
        background: linear-gradient(150deg,
          rgba(255, 255, 255, 0.07),
          rgba(255, 255, 255, 0.02) 50%,
          rgba(217, 119, 87, 0.06));
        backdrop-filter: blur(14px) saturate(1.2);
        -webkit-backdrop-filter: blur(14px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 18px;
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        font-family: "JetBrains Mono", monospace;
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-eyebrow {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.34em;
        color: #d97757;
        text-shadow: 0 0 10px rgba(217, 119, 87, 0.5);
        margin-bottom: 18px;
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 18px;
        padding: 10px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-row:first-of-type {
        border-top: none;
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-key {
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.08em;
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-val {
        color: #ffffff;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-state {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-led {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 0 rgba(217, 119, 87, 0);
      }
      [data-composition-id="beat-3-terminal"] .b3-hud-state-text {
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.08em;
      }
    </style>

    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // typewriter helper
        const typewriter = (selector, fullText, startAt, duration) => {
          const el = document.querySelector(selector);
          if (!el) return;
          el.textContent = "";
          const counter = { i: 0 };
          tl.to(counter, {
            i: fullText.length,
            duration,
            ease: "none",
            onUpdate: () => {
              const n = Math.floor(counter.i);
              el.textContent = fullText.slice(0, n);
            },
          }, startAt);
        };

        const root = '[data-composition-id="beat-3-terminal"]';

        // ====================================================
        // PHASE 0 (0.00–0.70s) — terminal + HUD enter
        // ====================================================
        tl.from(root + ' .b3-term',
          { x: -60, opacity: 0, filter: "blur(16px)",
            duration: 0.65, ease: "power3.out" }, 0.00);
        tl.from(root + ' .b3-term-chrome',
          { y: -8, opacity: 0, duration: 0.40, ease: "power2.out" }, 0.20);
        tl.from(root + ' .b3-hud',
          { x: 60, opacity: 0, filter: "blur(14px)",
            duration: 0.65, ease: "power3.out" }, 0.10);
        tl.from(root + ' .b3-hud-eyebrow',
          { x: 12, opacity: 0, duration: 0.35, ease: "expo.out" }, 0.32);

        // chrome pulse — finite, throughout
        gsap.to(root + ' .b3-term-pulse',
          { opacity: 0.45, duration: 0.5, repeat: 18, yoyo: true,
            ease: "sine.inOut", delay: 0.20 });

        // ====================================================
        // PHASE 1 (0.70–2.30s) — prompt typewriter
        // ====================================================
        gsap.set(root + ' .b3-cursor', { opacity: 0 });

        typewriter(root + ' .b3-prompt-cmd', "claude ", 0.80, 0.65);
        typewriter(root + ' .b3-prompt-arg', "mcp add codex", 1.45, 0.85);

        tl.to(root + ' .b3-cursor',
          { opacity: 1, duration: 0.15, ease: "power1.in" }, 2.30);
        gsap.to(root + ' .b3-cursor',
          { opacity: 0, duration: 0.32, repeat: 22, yoyo: true,
            ease: "steps(1)", delay: 2.40 });

        // ====================================================
        // PHASE 2 (2.40–3.40s) — Thinking
        // ====================================================
        tl.from(root + ' .b3-thinking',
          { y: 6, opacity: 0, duration: 0.30, ease: "power2.out" }, 2.50);
        gsap.to(root + ' .b3-spinner',
          { rotate: 720, duration: 1.5, ease: "none", delay: 2.50 });
        gsap.fromTo(root + ' .b3-bounce-dots span',
          { y: 0, opacity: 0.4 },
          { y: -4, opacity: 1, duration: 0.28, repeat: 5, yoyo: true,
            stagger: 0.12, ease: "sine.inOut", delay: 2.60 });

        // HUD server populates
        gsap.set(root + ' .b3-hud-server', { opacity: 0 });
        tl.to(root + ' .b3-hud-server',
          { opacity: 1, duration: 0.25, ease: "power2.out" }, 2.70);

        // ====================================================
        // PHASE 3 (3.40–6.20s) — tool log rows + tools count + status flip
        // ====================================================
        const logRows = document.querySelectorAll(root + ' .b3-log-row');
        const logTimes = [3.50, 4.00, 4.50, 5.00];
        logRows.forEach((row, i) => {
          tl.from(row,
            { x: -16, opacity: 0, duration: 0.32, ease: "power3.out" },
            logTimes[i]);
          tl.from(row.querySelector(".b3-badge"),
            { scale: 0.7, opacity: 0, duration: 0.25,
              ease: "back.out(1.6)" },
            logTimes[i] + 0.20);
        });

        // HUD tools count up 0 → 8
        const toolsEl = document.querySelector(root + ' .b3-hud-tools');
        const toolsCounter = { v: 0 };
        tl.to(toolsCounter, {
          v: 8, duration: 1.4, ease: "power2.out",
          onUpdate: () => {
            if (toolsEl) toolsEl.textContent = Math.floor(toolsCounter.v);
          },
        }, 4.00);

        // ====================================================
        // PHASE 4 (6.20–7.80s) — code block (mcp_settings.json)
        // ====================================================
        tl.from(root + ' .b3-code',
          { y: 16, opacity: 0, filter: "blur(8px)",
            duration: 0.40, ease: "power3.out" }, 6.30);

        const codeLines = document.querySelectorAll(root + ' .b3-code .b3-code-line');
        codeLines.forEach((ln, i) => {
          tl.from(ln,
            { x: -8, opacity: 0, duration: 0.22, ease: "power2.out" },
            6.45 + i * 0.16);
        });

        // ====================================================
        // PHASE 5 (7.80–9.20s) — done line + status flip
        // ====================================================
        tl.from(root + ' .b3-done',
          { y: 8, opacity: 0, duration: 0.30, ease: "power3.out" }, 7.90);
        tl.from(root + ' .b3-check',
          { scale: 0.5, opacity: 0, duration: 0.32,
            ease: "back.out(2.0)" }, 7.95);

        // HUD status PENDING → CONNECTED
        const stateEl = document.querySelector(root + ' .b3-hud-state-text');
        const ledEl = document.querySelector(root + ' .b3-hud-led');
        tl.call(() => {
          if (stateEl) {
            stateEl.textContent = "CONNECTED";
            stateEl.style.color = "#8dffb8";
          }
          if (ledEl) {
            ledEl.style.background = "#8dffb8";
            ledEl.style.boxShadow = "0 0 12px #8dffb8";
          }
        }, [], 8.00);
        gsap.to(root + ' .b3-hud-led',
          { boxShadow: "0 0 22px #8dffb8, 0 0 36px rgba(141,255,184,0.5)",
            duration: 0.55, repeat: 5, yoyo: true,
            ease: "sine.inOut", delay: 8.05 });

        // Subtle window glow uptick
        gsap.to(root + ' .b3-term',
          { boxShadow:
              "0 40px 100px rgba(0,0,0,0.65), " +
              "0 0 0 1px rgba(255,255,255,0.04) inset, " +
              "0 0 120px rgba(217,119,87,0.32)",
            duration: 0.5, repeat: 1, yoyo: true,
            ease: "sine.inOut", delay: 8.00 });

        // ====================================================
        // PHASE 6 (9.20–10s) — whip out
        // ====================================================
        tl.to(root + ' .b3-term',
          { x: -80, opacity: 0, filter: "blur(20px)",
            duration: 0.55, ease: "power3.in" }, 9.40);
        tl.to(root + ' .b3-hud',
          { x: 80, opacity: 0, filter: "blur(20px)",
            duration: 0.55, ease: "power3.in" }, 9.40);

        // Duration anchor
        tl.to({}, { duration: 10 }, 0);
        window.__timelines["beat-3-terminal"] = tl;
      })();
    </script>
  </div>
</template>
