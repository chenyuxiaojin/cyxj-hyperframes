    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const COMP = '[data-composition-id="beat-c-motion-grid"]';
        const DUR = 3.88;

        // ============ 0.0–0.5s : 标题进入 ============
        tl.from(COMP + ' .bcm-eyebrow',
          { y: -10, opacity: 0, duration: 0.35, ease: 'power3.out' }, 0.05);
        tl.from(COMP + ' .bcm-title-zh',
          { y: 50, opacity: 0, scale: 0.9, filter: 'blur(14px)',
            duration: 0.55, ease: 'power3.out' }, 0.15);
        tl.from(COMP + ' .bcm-title-en',
          { x: -16, opacity: 0, duration: 0.4, ease: 'power2.out' }, 0.32);
        tl.from(COMP + ' .bcm-divider',
          { width: 0, opacity: 0, duration: 0.4, ease: 'power3.out' }, 0.40);

        // ============ 0.30–1.20s : 4 张卡片依次砸入 ============
        const CARD_INS = [
          { sel: '.bcm-card-a', at: 0.30 },
          { sel: '.bcm-card-b', at: 0.45 },
          { sel: '.bcm-card-c', at: 0.60 },
          { sel: '.bcm-card-d', at: 0.75 },
        ];
        CARD_INS.forEach(({ sel, at }) => {
          tl.to(COMP + ' ' + sel,
            { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'back.out(1.4)' }, at);
        });

        // ============ 卡片 A · 粒子爆发 ============
        const partsEl = document.querySelector(COMP + ' .bcm-particles');
        const PT_COUNT = 28;
        const COLORS = ['#d97757', '#f5b39a', '#ffffff', '#ffd87a', '#7ec0ff', '#a684ff'];
        const particles = [];
        for (let i = 0; i < PT_COUNT; i++) {
          const el = document.createElement('div');
          el.className = 'bcm-pt';
          const ang = (i / PT_COUNT) * Math.PI * 2 + Math.sin(i * 1.7) * 0.4;
          const dist = 80 + Math.abs(Math.sin(i * 2.3)) * 50;
          const col = COLORS[i % COLORS.length];
          el.style.background = col;
          el.style.boxShadow = '0 0 10px ' + col + ', 0 0 18px ' + col;
          partsEl.appendChild(el);
          particles.push({ el, ang, dist });
        }
        gsap.to(COMP + ' .bcm-card-a .bcm-particle-core',
          { scale: 1.6, opacity: 0.6, duration: 0.45,
            repeat: 5, yoyo: true, ease: 'sine.inOut',
            delay: 0.85 });
        const BURSTS = 3;
        const BURST_INTERVAL = 0.85;
        const BURST_START = 1.05;
        for (let r = 0; r < BURSTS; r++) {
          const t = BURST_START + r * BURST_INTERVAL;
          particles.forEach((p, i) => {
            tl.set(p.el, { x: 0, y: 0, opacity: 1, scale: 1 }, t);
            tl.to(p.el,
              { x: Math.cos(p.ang) * p.dist,
                y: Math.sin(p.ang) * p.dist,
                opacity: 0, scale: 0.4,
                duration: 0.75, ease: 'power2.out' }, t);
          });
        }

        // ============ 卡片 B · 字幕飞入 + 卡拉OK ============
        const chars = document.querySelectorAll(COMP + ' .bcm-caption-char');
        const CAP_CYCLES = 2;
        const CAP_CYCLE_DUR = 1.20;
        const CAP_START = 1.00;
        for (let r = 0; r < CAP_CYCLES; r++) {
          const t = CAP_START + r * CAP_CYCLE_DUR;
          tl.set(chars, { y: 40, opacity: 0, color: '#ffffff' }, t);
          tl.to(chars,
            { y: 0, opacity: 1, duration: 0.40, ease: 'back.out(1.6)',
              stagger: 0.08 }, t);
          chars.forEach((c, i) => {
            const cAt = t + 0.50 + i * 0.10;
            tl.to(c, { color: '#d97757',
                       textShadow: '0 0 24px rgba(217,119,87,0.9)',
                       duration: 0.18, ease: 'power2.out' }, cAt);
            tl.to(c, { color: '#ffffff',
                       textShadow: '0 0 18px rgba(255,255,255,0.35)',
                       duration: 0.20, ease: 'power2.in' }, cAt + 0.18);
          });
          tl.fromTo(COMP + ' .bcm-caption-bar',
            { scaleX: 0.4, opacity: 0.3 },
            { scaleX: 1, opacity: 0.8, duration: 0.55, ease: 'power2.out' }, t + 0.10);
        }

        // ============ 卡片 C · 数字滚动 + 柱状图 ============
        const counterEl = document.querySelector(COMP + ' .bcm-counter-num');
        const counter = { v: 0 };
        const DATA_CYCLES = 2;
        const DATA_CYCLE_DUR = 1.20;
        const DATA_START = 1.15;
        for (let r = 0; r < DATA_CYCLES; r++) {
          const t = DATA_START + r * DATA_CYCLE_DUR;
          tl.set(counter, { v: 0 }, t);
          tl.set(COMP + ' .bcm-bar',
            { scaleY: 0, opacity: 0.2 }, t);
          tl.to(counter,
            { v: 248, duration: 0.85, ease: 'power2.out',
              onUpdate: () => {
                if (counterEl) counterEl.textContent = Math.round(counter.v);
              } }, t);
          tl.to(COMP + ' .bcm-bar',
            { scaleY: 1, opacity: 1, duration: 0.50,
              ease: 'back.out(1.5)', stagger: 0.08 }, t + 0.10);
        }

        // ============ 卡片 D · 光效横扫 ============
        const SWEEP_CYCLES = 3;
        const SWEEP_CYCLE_DUR = 0.78;
        const SWEEP_START = 1.30;
        for (let r = 0; r < SWEEP_CYCLES; r++) {
          const t = SWEEP_START + r * SWEEP_CYCLE_DUR;
          tl.fromTo(COMP + ' .bcm-shimmer-sweep',
            { x: 0 },
            { x: 700, duration: 0.78, ease: 'power2.inOut' }, t);
          tl.fromTo(COMP + ' .bcm-shimmer-text',
            { color: 'rgba(255,255,255,0.18)' },
            { color: 'rgba(255,255,255,0.55)',
              duration: 0.32, ease: 'sine.inOut',
              yoyo: true, repeat: 1 }, t + 0.10);
        }

        // ============ 关键词命中 (master 14.36s = local 3.12s) 高潮 ============
        tl.to(COMP + ' .bcm-title-zh',
          { scale: 1.04, duration: 0.18, ease: 'power2.out' }, 3.00);
        tl.to(COMP + ' .bcm-title-zh',
          { scale: 1.0, duration: 0.25, ease: 'power2.in' }, 3.18);

        // ============ 3.55–3.88 : 准备过渡 ============
        tl.to(COMP + ' .bcm-grid-wrap',
          { opacity: 0.65, scale: 0.985, filter: 'blur(2px)',
            duration: 0.30, ease: 'power2.in' }, 3.55);

        // ============ duration anchor ============
        tl.to({}, { duration: DUR }, 0);
        window.__timelines['beat-c-motion-grid'] = tl;
      })();
    </script>
