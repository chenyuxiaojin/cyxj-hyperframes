<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
  <div
    id="root-tip-16"
    data-composition-id="tip-16-remote-control"
    data-start="0"
    data-duration="10.834"
    data-width="1920"
    data-height="1080"
    data-layout-allow-overflow="true"
    style="width:1920px;height:1080px;background:var(--c-bg);position:relative;overflow:hidden;font-family:var(--f-zh);"
  >
    <!--
      ==========================================================
      Tip 16 手机远程操控 · 10.834s · 整片 346.166s 起算

      口播分段（相对秒）：
        0.00-2.20  第16招通过手机远程操控
        2.20-5.03  你只需要打开这一个命令然后扫描二维码
        5.03-7.30  你就可以在电脑上开启一个任务然后离开
        7.30-10.80 可以从手机或者说任何浏览器控制这一个对话

      cue 表（4 cue）：
        1) 0.0-2.2   hero opener「手机远程操控」chrome + 副标 Remote Control · Anywhere
        2) 2.2-5.0   终端 .cc-window 弹入 + typewriter `claude --remote --pair`
                     + ✓ QR ready 行 + 右侧 QR 二维码飞入 + 扫描线 sweep
        3) 5.0-7.3   笔电 💻 出现 + "可以走开了" chip + 终端切换为 spinner working
                     → 笔电+chip 漂走 + spinner 持续转
        4) 7.3-10.8  整体 fade out → 三端环绕：左 📱/中 Claude bubble/右 🌐/上 💻
                     + 三方 SVG 连接线 dashoffset 流动
                     + hero hold 「随时随地」chrome-text-hot + particles drift
      ==========================================================
    -->

    <!-- 全程层 -->
    <div class="perspective-grid" id="grid"></div>
    <div class="crosshair-overlay">
      <span class="crosshair" style="left:340px; top:200px;">+</span>
      <span class="crosshair" style="right:340px; top:200px;">+</span>
      <span class="crosshair" style="left:340px; bottom:200px;">+</span>
      <span class="crosshair" style="right:340px; bottom:200px;">+</span>
    </div>
    <div class="vignette-strong" id="vignette"></div>

    <!-- ===== Cue 1: hero opener ===== -->
    <div id="opener-stack"
         style="position:absolute; inset:0;
                display:flex; flex-direction:column; align-items:center; justify-content:center;
                gap:24px; opacity:0; z-index:18;">
      <div class="kicker">
        <span class="kicker-num">第 16 招</span>
        <span style="opacity:.5">/</span>
        <span>CLAUDE CODE</span>
      </div>
      <h1 class="hero-zh chrome-text"
          style="font-family:var(--f-zh); font-weight:800;
                 font-size:160px; line-height:1.1; letter-spacing:0.02em;
                 white-space:nowrap; margin:0; padding:8px 0;">手机远程操控</h1>
      <div class="opener-subtitle">
        <span class="hot-tag">Remote Control</span>
        <span style="opacity:.55;">·</span>
        <span>Anywhere</span>
      </div>
    </div>

    <!-- ===== Cue 2-3: 终端 + QR + 笔电 ===== -->
    <!-- 终端 -->
    <div class="term-wrap" id="term-wrap">
      <div class="cc-window">
        <div class="cc-titlebar">
          <span class="mac-dot" style="background:#FF5F57;"></span>
          <span class="mac-dot" style="background:#FEBC2E;"></span>
          <span class="mac-dot" style="background:#28C840;"></span>
          <span class="cc-title">claude code · ~/project</span>
        </div>
        <div class="cc-body">
          <div class="cc-prompt-line">
            <span class="cc-prompt-arrow">$</span>
            <span class="cc-cmd" id="term-cmd"></span>
            <span class="cc-cursor" id="term-cursor"></span>
          </div>
          <div class="cc-info" id="term-info" style="opacity:0;">QR ready · 用手机扫码</div>
          <div class="term-spinner-row" id="term-spinner-row">
            <span class="term-spinner-ring" id="term-spinner-ring"></span>
            <span>working on task… · session linked</span>
          </div>
        </div>
        <div class="cc-statusline">
          <span class="cc-sl-seg">
            <span class="cc-sl-icon model"></span>
            <span class="cc-sl-label">model</span>
            <span class="cc-sl-value">opus</span>
          </span>
          <span class="cc-sl-seg">
            <span class="cc-sl-icon ctx"></span>
            <span class="cc-sl-label">remote</span>
            <span class="cc-sl-value" style="color:var(--c-success);">linked</span>
          </span>
          <span class="cc-sl-seg">
            <span class="cc-sl-icon cost"></span>
            <span class="cc-sl-label">device</span>
            <span class="cc-sl-value">phone · web</span>
          </span>
        </div>
      </div>
    </div>

    <!-- QR 二维码 stage -->
    <div class="qr-stage" id="qr-stage">
      <div class="qr-frame">
        <svg viewBox="0 0 13 13" style="shape-rendering: crispEdges;">
          <!-- 三角 finder pattern (左上 / 右上 / 左下) -->
          <!-- 左上 -->
          <rect x="0" y="0" width="5" height="5" fill="#0f0d0a"/>
          <rect x="1" y="1" width="3" height="3" fill="#FFFCF6"/>
          <rect x="2" y="2" width="1" height="1" fill="#0f0d0a"/>
          <!-- 右上 -->
          <rect x="8" y="0" width="5" height="5" fill="#0f0d0a"/>
          <rect x="9" y="1" width="3" height="3" fill="#FFFCF6"/>
          <rect x="10" y="2" width="1" height="1" fill="#0f0d0a"/>
          <!-- 左下 -->
          <rect x="0" y="8" width="5" height="5" fill="#0f0d0a"/>
          <rect x="1" y="9" width="3" height="3" fill="#FFFCF6"/>
          <rect x="2" y="10" width="1" height="1" fill="#0f0d0a"/>

          <!-- 数据像素（手编 deterministic pattern） -->
          <!-- 顶部数据带（行 0-4，列 5-7） -->
          <rect x="5" y="0" width="1" height="1" fill="#0f0d0a"/>
          <rect x="7" y="0" width="1" height="1" fill="#0f0d0a"/>
          <rect x="6" y="1" width="1" height="1" fill="#0f0d0a"/>
          <rect x="5" y="2" width="1" height="1" fill="#0f0d0a"/>
          <rect x="7" y="2" width="1" height="1" fill="#0f0d0a"/>
          <rect x="6" y="3" width="1" height="1" fill="#0f0d0a"/>
          <rect x="5" y="4" width="1" height="1" fill="#0f0d0a"/>
          <rect x="7" y="4" width="1" height="1" fill="#0f0d0a"/>

          <!-- 中央水平 timing 行（行 5-7） -->
          <rect x="0" y="5" width="1" height="1" fill="#0f0d0a"/>
          <rect x="2" y="5" width="1" height="1" fill="#0f0d0a"/>
          <rect x="4" y="5" width="1" height="1" fill="#0f0d0a"/>
          <rect x="6" y="5" width="1" height="1" fill="#0f0d0a"/>
          <rect x="8" y="5" width="1" height="1" fill="#0f0d0a"/>
          <rect x="10" y="5" width="1" height="1" fill="#0f0d0a"/>
          <rect x="12" y="5" width="1" height="1" fill="#0f0d0a"/>

          <rect x="1" y="6" width="1" height="1" fill="#0f0d0a"/>
          <rect x="6" y="6" width="1" height="1" fill="#0f0d0a"/>
          <rect x="9" y="6" width="1" height="1" fill="#0f0d0a"/>
          <rect x="11" y="6" width="1" height="1" fill="#0f0d0a"/>

          <rect x="3" y="7" width="1" height="1" fill="#0f0d0a"/>
          <rect x="6" y="7" width="1" height="1" fill="#0f0d0a"/>
          <rect x="8" y="7" width="1" height="1" fill="#0f0d0a"/>
          <rect x="10" y="7" width="1" height="1" fill="#0f0d0a"/>
          <rect x="12" y="7" width="1" height="1" fill="#0f0d0a"/>

          <!-- 右下数据区（行 8-12，列 5-12） -->
          <rect x="6" y="8" width="1" height="1" fill="#0f0d0a"/>
          <rect x="8" y="8" width="1" height="1" fill="#0f0d0a"/>
          <rect x="10" y="8" width="1" height="1" fill="#0f0d0a"/>
          <rect x="11" y="8" width="1" height="1" fill="#0f0d0a"/>

          <rect x="5" y="9" width="1" height="1" fill="#0f0d0a"/>
          <rect x="7" y="9" width="1" height="1" fill="#0f0d0a"/>
          <rect x="9" y="9" width="1" height="1" fill="#0f0d0a"/>
          <rect x="12" y="9" width="1" height="1" fill="#0f0d0a"/>

          <rect x="6" y="10" width="1" height="1" fill="#0f0d0a"/>
          <rect x="8" y="10" width="1" height="1" fill="#0f0d0a"/>
          <rect x="11" y="10" width="1" height="1" fill="#0f0d0a"/>

          <rect x="5" y="11" width="1" height="1" fill="#0f0d0a"/>
          <rect x="7" y="11" width="1" height="1" fill="#0f0d0a"/>
          <rect x="9" y="11" width="1" height="1" fill="#0f0d0a"/>
          <rect x="10" y="11" width="1" height="1" fill="#0f0d0a"/>
          <rect x="12" y="11" width="1" height="1" fill="#0f0d0a"/>

          <rect x="6" y="12" width="1" height="1" fill="#0f0d0a"/>
          <rect x="8" y="12" width="1" height="1" fill="#0f0d0a"/>
          <rect x="11" y="12" width="1" height="1" fill="#0f0d0a"/>
        </svg>
        <div class="qr-scan-line" id="qr-scan-line"></div>
      </div>
      <div class="qr-label">
        SCAN <span class="hot">→</span> 手机即可接管
      </div>
    </div>

    <!-- 笔电 + 走开 chip -->
    <div class="laptop-icon" id="laptop-icon"
         style="left:1180px; top:380px;">💻</div>
    <div class="leave-chip" id="leave-chip"
         style="left:590px; top:140px;">
      <span>✓ 人可以走开了</span>
    </div>

    <!-- ===== Cue 4: 三端环绕 + hero hold ===== -->
    <div class="device-stage" id="device-stage">
      <!-- 三方 SVG 连接线 -->
      <svg class="device-links" id="device-links" viewBox="0 0 1920 1080"
           preserveAspectRatio="none">
        <!-- bubble center (960, 497) - 边缘 ~160 半径 -->
        <!-- → phone (380, 540) -->
        <path class="device-link-path" id="link-phone"
              d="M 800 540 L 480 540"/>
        <!-- → browser (1540, 540) -->
        <path class="device-link-path" id="link-browser"
              d="M 1120 540 L 1440 540"/>
        <!-- → laptop (960, 200) -->
        <path class="device-link-path" id="link-laptop"
              d="M 960 337 L 960 280"/>
      </svg>

      <!-- 中央 Claude bubble -->
      <div class="central-bubble" id="central-bubble">
        <img class="cb-logo" src="../assets/claude-code-logo.png" alt="Claude" />
        <span class="cb-title">Claude</span>
        <span class="cb-spinner-row">
          <span class="cb-spinner" id="cb-spinner"></span>
          <span>working…</span>
        </span>
      </div>

      <!-- 三端 -->
      <div class="device-icon phone" id="dev-phone">
        <span class="device-emoji">📱</span>
        <span class="device-label">手机</span>
      </div>
      <div class="device-icon browser" id="dev-browser">
        <span class="device-emoji">🌐</span>
        <span class="device-label">浏览器</span>
      </div>
      <div class="device-icon laptop" id="dev-laptop">
        <span class="device-emoji">💻</span>
        <span class="device-label">电脑</span>
      </div>
    </div>

    <!-- 落版 hero hold -->
    <h2 class="closing-zh chrome-text-hot" id="closing-zh">随时随地</h2>
    <div class="closing-en" id="closing-en">Anywhere · Anytime · Any device</div>

    <!-- particles -->
    <div id="closing-particles">
      <span class="particle" style="left:18%; top:32%;"></span>
      <span class="particle" style="left:34%; top:64%;"></span>
      <span class="particle" style="left:48%; top:24%;"></span>
      <span class="particle" style="left:62%; top:56%;"></span>
      <span class="particle" style="left:78%; top:36%;"></span>
      <span class="particle" style="left:26%; top:74%;"></span>
      <span class="particle" style="left:84%; top:68%;"></span>
      <span class="particle" style="left:14%; top:50%;"></span>
    </div>

  </div>

  <script>
    window.__timelines = window.__timelines || {};
    (function () {
      const root = '[data-composition-id="tip-16-remote-control"]';
      const tl = gsap.timeline({ paused: true });
      const SLOT = 10.834;

      // ========== 初始 set ==========
      // 居中（CLAUDE.md 硬约束 #6: 用 GSAP xPercent/yPercent 而非 CSS transform）
      tl.set(root + ' .central-bubble', { xPercent: -50, yPercent: -50 }, 0);
      tl.set(root + ' .device-icon.phone', { yPercent: -50 }, 0);
      tl.set(root + ' .device-icon.browser', { yPercent: -50 }, 0);
      tl.set(root + ' .device-icon.laptop', { xPercent: -50 }, 0);
      tl.set(root + ' .closing-zh', { xPercent: -50 }, 0);
      tl.set(root + ' .closing-en', { xPercent: -50 }, 0);
      tl.set(root + ' .leave-chip', { xPercent: -50 }, 0);

      // typewriter 内容清空
      tl.call(() => {
        const c = document.querySelector(root + ' #term-cmd');
        if (c) c.textContent = '';
      }, [], 0);

      // ========== 全程层呼吸 ==========
      tl.to(root + ' #grid',
        { backgroundPositionY: '+=80px', duration: SLOT, ease: 'none' }, 0);
      tl.to(root + ' #vignette',
        { opacity: 0.95, duration: 5, repeat: 1, yoyo: true, ease: 'sine.inOut' }, 0);
      tl.to(root + ' .crosshair',
        { opacity: 0.8, duration: 1.6, repeat: 5, yoyo: true, ease: 'sine.inOut',
          stagger: { each: 0.15, from: 'random' } }, 0);

      // ============================================================
      // Cue 1 (0.0-2.2): hero opener
      // ============================================================
      tl.fromTo(root + ' #opener-stack',
        { opacity: 0, y: 22, filter: 'blur(14px)' },
        { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.6, ease: 'power3.out' },
        0.15);
      tl.fromTo(root + ' #opener-stack .chrome-text',
        { backgroundPosition: '100% 0' },
        { backgroundPosition: '0% 0', duration: 0.7, ease: 'power2.out' },
        0.45);
      tl.fromTo(root + ' .opener-subtitle',
        { opacity: 0, y: 12, scale: 0.92 },
        { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'back.out(1.6)' },
        1.30);
      tl.to(root + ' .opener-subtitle .hot-tag',
        { textShadow: '0 0 24px rgba(217, 119, 87, 0.85)',
          duration: 0.4, repeat: 1, yoyo: true, ease: 'sine.inOut' },
        1.85);

      // 2.0 opener fade out (往上推)
      tl.to(root + ' #opener-stack',
        { opacity: 0, y: -24, filter: 'blur(10px)',
          duration: 0.35, ease: 'power3.in' },
        2.00);

      // ============================================================
      // Cue 2 (2.2-5.0): 终端 + QR
      // ============================================================
      // 终端入场
      tl.fromTo(root + ' #term-wrap',
        { opacity: 0, scale: 0.94, y: 16 },
        { opacity: 1, scale: 1, y: 0, duration: 0.55, ease: 'power3.out',
          immediateRender: false },
        2.30);

      // typewriter `claude --remote --pair` (21 chars × 0.075s = 1.58s)
      const cmd = 'claude --remote --pair';
      const cmdStart = 2.55;
      const charDur = 0.075;
      for (let i = 1; i <= cmd.length; i++) {
        tl.call(() => {
          const c = document.querySelector(root + ' #term-cmd');
          if (c) c.textContent = cmd.substring(0, i);
        }, [], cmdStart + (i - 1) * charDur);
      }
      // 隐藏 cursor
      tl.to(root + ' #term-cursor',
        { opacity: 0, duration: 0.1 }, cmdStart + cmd.length * charDur);

      // ✓ QR ready 行
      tl.fromTo(root + ' #term-info',
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.35, ease: 'power3.out',
          immediateRender: false },
        4.20);

      // QR stage 飞入
      tl.fromTo(root + ' #qr-stage',
        { opacity: 0, x: 60, scale: 0.92 },
        { opacity: 1, x: 0, scale: 1, duration: 0.55, ease: 'back.out(1.4)',
          immediateRender: false },
        4.30);

      // 扫描线 sweep（top 28 → bottom 348，2 次循环）
      tl.fromTo(root + ' #qr-scan-line',
        { opacity: 1, top: '28px' },
        { top: '368px', duration: 0.75, ease: 'sine.inOut',
          repeat: 5, yoyo: true,
          immediateRender: false },
        4.85);

      // ============================================================
      // Cue 3 (5.0-7.3): 笔电出现 + 走开 chip + 终端 spinner
      // ============================================================
      // ✓ QR ready 切到 spinner
      tl.to(root + ' #term-info',
        { opacity: 0, y: -6, duration: 0.3, ease: 'power3.in' },
        5.05);
      tl.fromTo(root + ' #term-spinner-row',
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out',
          immediateRender: false },
        5.10);
      // term spinner ring 持续旋转
      tl.to(root + ' #term-spinner-ring',
        { rotation: 360 * 6, duration: 5.0, ease: 'none',
          transformOrigin: 'center center' },
        5.10);

      // "走开" chip 弹入
      tl.fromTo(root + ' #leave-chip',
        { opacity: 0, scale: 0.6, y: -10 },
        { opacity: 1, scale: 1, y: 0, duration: 0.45, ease: 'back.out(2.0)',
          immediateRender: false },
        5.30);

      // 笔电 emoji 弹入
      tl.fromTo(root + ' #laptop-icon',
        { opacity: 0, x: -20, y: -10, scale: 0.85, rotation: -6 },
        { opacity: 1, x: 0, y: 0, scale: 1, rotation: 0,
          duration: 0.5, ease: 'back.out(1.6)',
          immediateRender: false },
        5.45);

      // 6.30 笔电 + chip 漂走（向右下漂出）
      tl.to(root + ' #laptop-icon',
        { x: 280, y: 200, rotation: 12, opacity: 0.25,
          duration: 1.0, ease: 'power2.out' },
        6.20);
      tl.to(root + ' #leave-chip',
        { y: -30, opacity: 0, duration: 0.55, ease: 'power2.in' },
        6.40);

      // ============================================================
      // Cue 4 (7.3-10.8): 整体 fade out → 三端环绕 + hero hold
      // ============================================================
      // 终端 + QR + spinner 整体淡出
      tl.to(root + ' #term-wrap',
        { opacity: 0, y: -24, filter: 'blur(8px)',
          duration: 0.4, ease: 'power3.in' },
        7.10);
      tl.to(root + ' #qr-stage',
        { opacity: 0, x: 30, filter: 'blur(8px)',
          duration: 0.4, ease: 'power3.in' },
        7.10);
      tl.to(root + ' #laptop-icon',
        { opacity: 0, duration: 0.3, ease: 'power3.in' },
        7.10);

      // device-stage 淡入
      tl.to(root + ' #device-stage',
        { opacity: 1, duration: 0.3, ease: 'power2.out' },
        7.45);

      // 中央 Claude bubble 弹入
      tl.fromTo(root + ' #central-bubble',
        { opacity: 0, scale: 0.55 },
        { opacity: 1, scale: 1, duration: 0.55, ease: 'back.out(2.0)',
          immediateRender: false },
        7.55);

      // cb-spinner 持续旋转
      tl.to(root + ' #cb-spinner',
        { rotation: 360 * 4, duration: 3.5, ease: 'none',
          transformOrigin: 'center center' },
        7.65);

      // 三端依次飞入：左 phone / 右 browser / 上 laptop
      tl.fromTo(root + ' #dev-phone',
        { opacity: 0, x: -30, scale: 0.85 },
        { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: 'back.out(1.6)',
          immediateRender: false },
        7.80);
      tl.fromTo(root + ' #dev-browser',
        { opacity: 0, x: 30, scale: 0.85 },
        { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: 'back.out(1.6)',
          immediateRender: false },
        7.95);
      tl.fromTo(root + ' #dev-laptop',
        { opacity: 0, y: -20, scale: 0.85 },
        { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.6)',
          immediateRender: false },
        8.10);

      // 三方连接线浮现 + 流动
      tl.fromTo(root + ' .device-link-path',
        { opacity: 0 },
        { opacity: 0.65, duration: 0.5, ease: 'power3.out',
          immediateRender: false },
        8.20);
      // 连接线脉冲（dasharray 流动 — strokeDashoffset 动）
      tl.to(root + ' .device-link-path',
        { strokeDashoffset: -36, duration: 1.0, ease: 'none',
          repeat: 8 },
        8.40);

      // hero hold 「随时随地」
      tl.fromTo(root + ' #closing-zh',
        { opacity: 0, y: 22, filter: 'blur(14px)' },
        { opacity: 1, y: 0, filter: 'blur(0px)',
          duration: 0.6, ease: 'power3.out',
          immediateRender: false },
        8.60);
      tl.fromTo(root + ' #closing-zh',
        { backgroundPosition: '100% 0' },
        { backgroundPosition: '0% 0', duration: 0.8, ease: 'power2.out',
          immediateRender: false },
        8.85);

      // 副标
      tl.fromTo(root + ' #closing-en',
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out',
          immediateRender: false },
        9.20);

      // particles fade in + drift
      tl.to(root + ' #closing-particles',
        { opacity: 1, duration: 0.4, ease: 'power2.out' }, 9.40);
      tl.to(root + ' #closing-particles .particle',
        { y: '-=22', duration: 1.2, ease: 'sine.inOut',
          stagger: { each: 0.06, from: 'random' } },
        9.55);

      // ===== Pad timeline (法则 #11) =====
      tl.to({}, { duration: SLOT }, 0);
      window.__timelines["tip-16-remote-control"] = tl;
    })();
  </script>
</body>
</html>
