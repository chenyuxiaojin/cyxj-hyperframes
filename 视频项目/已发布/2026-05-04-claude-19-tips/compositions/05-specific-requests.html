<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
  <div
    id="root-tip-05"
    data-composition-id="tip-05-specific"
    data-start="0"
    data-duration="24.233"
    data-width="1920"
    data-height="1080"
    data-layout-allow-overflow="true"
    style="width:1920px;height:1080px;background:var(--c-bg);position:relative;overflow:hidden;font-family:var(--f-zh);"
  >
    <!--
      ==========================================================
      Tip 05 不要下模糊需求 — 24.233s — 6 cues + hero hold
      口播节奏（相对秒，整片 92.066s 起算）：
        0.0-3.7    "第五个不要总是对 Claude 下达一些模糊的需求"
        3.7-6.7    "比如写一个功能 或者说我需要修改"
        6.7-8.5    "这里的效果我不是特别满意这种话"
        9.2-11.2   "这样它是不清楚你想要的东西的"
        11.3-13.5  "你应该学会向它抛问题"
        13.5-16.1  "比如问它这样的效果 如果你是用户"
        16.1-19.3  "你会不会满意 让它先自行推理逻辑"
        19.5-21.2  "它的产出的质量会更高"
        21.2-22.6  "这类似于计划模式"   ⭐ Tip 4 callback
        22.6-24.2  hero hold

      视觉节拍：
        A  0.0-3.7   hero opener「不要下模糊需求」
        B  3.7-9.0   左 BAD 卡片：模糊气泡 → Claude 蒙圈 + 输出乱
        C  9.0-13.5  BAD 卡淡化 → 右 GOOD 卡入场：具体气泡
        D  13.5-19.3 GOOD 卡内 Claude 推理 3 步 stagger + 输出清晰
        E  19.3-22.6 质量条对比（30% vs 90%）+ 「类似计划模式」hint chip
        F  22.6-24.2 hero hold「具体一点」+ BE SPECIFIC + particles
      ==========================================================
    -->

    <div class="perspective-grid" id="grid"></div>
    <div class="crosshair-overlay">
      <span class="crosshair" style="left:340px; top:200px;">+</span>
      <span class="crosshair" style="right:340px; top:200px;">+</span>
      <span class="crosshair" style="left:340px; bottom:200px;">+</span>
      <span class="crosshair" style="right:340px; bottom:200px;">+</span>
    </div>
    <div class="vignette-strong" id="vignette"></div>

    <!-- ===== Cue A (0-3.7): hero opener「不要下模糊需求」===== -->
    <div id="hero-block-a"
         style="position:absolute; inset:0;
                display:flex; flex-direction:column; align-items:center; justify-content:center;
                gap:32px;
                opacity:0;">
      <div class="kicker">
        <span class="kicker-num">第 05 招</span>
        <span style="opacity:.5">/</span>
        <span>CLAUDE CODE</span>
      </div>
      <h1 class="hero-zh chrome-text">不要下模糊需求</h1>
      <div style="font-family:var(--f-en); font-size:30px; letter-spacing:0.18em;
                  text-transform:uppercase; color:var(--c-muted); font-weight:600;">
        Don't Be Vague
      </div>
    </div>

    <!-- ===== Cue B-E: 双卡对比舞台 ===== -->
    <div class="sr-stage" id="sr-stage">
      <div style="display:flex; gap:60px; justify-content:center; align-items:stretch;">
        <!-- 左 BAD 卡 -->
        <div class="sr-card bad" id="bad-card">
          <div class="sr-card-titlebar">
            <span class="sr-card-tag">
              <span class="sr-card-tag-icon">×</span>
              <span>BAD · 模糊需求</span>
            </span>
            <span class="sr-card-meta">vague prompt</span>
          </div>
          <div class="question-bubble" id="bad-q1">写一个功能</div>
          <div class="question-bubble" id="bad-q2">这里效果我不太满意</div>
          <div class="claude-resp" id="bad-resp">
            <div class="claude-resp-line">
              <span class="claude-resp-prompt">claude</span>
              <span class="claude-resp-text confused" id="bad-resp-1"></span>
            </div>
            <div class="claude-resp-line">
              <span class="claude-resp-text muted" id="bad-resp-2"></span>
            </div>
          </div>
        </div>

        <!-- 右 GOOD 卡 -->
        <div class="sr-card good" id="good-card" style="opacity:0;">
          <div class="sr-card-titlebar">
            <span class="sr-card-tag">
              <span class="sr-card-tag-icon">✓</span>
              <span>GOOD · 抛问题</span>
            </span>
            <span class="sr-card-meta">specific prompt</span>
          </div>
          <div class="question-bubble" id="good-q1">如果你是用户，你会满意吗？</div>
          <div class="question-bubble" id="good-q2">先推理一下逻辑再动手</div>
          <div class="claude-resp" id="good-resp">
            <div class="reason-step" id="reason-1">
              <span class="reason-step-num">①</span>
              <span class="reason-step-text">明白需求</span>
            </div>
            <div class="reason-step" id="reason-2">
              <span class="reason-step-num">②</span>
              <span class="reason-step-text">推理逻辑</span>
            </div>
            <div class="reason-step" id="reason-3">
              <span class="reason-step-num">③</span>
              <span class="reason-step-text">执行方案</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 质量条对比 + 类似计划模式 hint -->
      <div class="quality-row" id="quality-row">
        <div class="quality-meter bad">
          <div class="quality-meter-label">
            <span>BAD output</span>
            <span class="quality-meter-pct" id="bad-pct">0%</span>
          </div>
          <div class="quality-meter-bar"><div class="quality-meter-fill" id="bad-fill"></div></div>
        </div>
        <div class="similar-hint" id="similar-hint">
          <span class="similar-hint-arrow">↗</span>
          <span>类似计划模式</span>
        </div>
        <div class="quality-meter good">
          <div class="quality-meter-label">
            <span>GOOD output</span>
            <span class="quality-meter-pct" id="good-pct">0%</span>
          </div>
          <div class="quality-meter-bar"><div class="quality-meter-fill" id="good-fill"></div></div>
        </div>
      </div>
    </div>

    <!-- ===== Cue F: 收尾金句「具体一点」===== -->
    <div id="closing-block"
         style="position:absolute; inset:0;
                display:flex; flex-direction:column; align-items:center; justify-content:center;
                gap:24px;
                white-space:nowrap; opacity:0;">
      <h2 class="chrome-text"
          style="font-family:var(--f-zh); font-weight:800;
                 font-size:144px; line-height:1.1; letter-spacing:0;
                 white-space:nowrap; margin:0; padding:8px 0;">具体一点</h2>
      <div style="font-family:var(--f-en); font-size:32px; letter-spacing:0.20em;
                  text-transform:uppercase; color:var(--c-muted); font-weight:600;">
        Be Specific
      </div>
    </div>

    <!-- ===== particles drift ===== -->
    <div id="particles" style="position:absolute; inset:0; pointer-events:none; opacity:0;">
      <span class="particle" style="left:18%; top:32%;"></span>
      <span class="particle" style="left:34%; top:64%;"></span>
      <span class="particle" style="left:48%; top:24%;"></span>
      <span class="particle" style="left:62%; top:56%;"></span>
      <span class="particle" style="left:78%; top:36%;"></span>
      <span class="particle" style="left:26%; top:74%;"></span>
      <span class="particle" style="left:84%; top:68%;"></span>
      <span class="particle" style="left:14%; top:50%;"></span>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    (function () {
      const root = '[data-composition-id="tip-05-specific"]';
      const tl = gsap.timeline({ paused: true });
      const SLOT = 24.233;

      // ===== 全程层呼吸 =====
      tl.to(root + ' #grid',
        { backgroundPositionY: '+=80px', duration: SLOT, ease: 'none' }, 0);
      tl.to(root + ' #vignette',
        { opacity: 0.95, duration: 5, repeat: 2, yoyo: true, ease: 'sine.inOut' }, 0);
      tl.to(root + ' .crosshair',
        { opacity: 0.8, duration: 1.6, repeat: 7, yoyo: true, ease: 'sine.inOut',
          stagger: { each: 0.15, from: 'random' } }, 0);

      // ============================================================
      // Cue A (0.0-3.7): hero opener「不要下模糊需求」
      // ============================================================
      tl.fromTo(root + ' #hero-block-a',
        { opacity: 0, y: 20, filter: 'blur(14px)' },
        { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.7, ease: 'power3.out' },
        0.2);
      tl.fromTo(root + ' #hero-block-a .chrome-text',
        { backgroundPosition: '100% 0' },
        { backgroundPosition: '0% 0', duration: 0.9, ease: 'power2.out' },
        0.4);
      tl.to(root + ' #hero-block-a',
        { opacity: 0, y: -14, filter: 'blur(10px)', duration: 0.5, ease: 'power2.in' },
        3.2);

      // ============================================================
      // Cue B (3.7-9.0): 左 BAD 卡片入场 + 模糊气泡 → Claude 蒙圈
      // ============================================================
      tl.fromTo(root + ' #sr-stage',
        { opacity: 0, scale: 0.96, y: 20, filter: 'blur(12px)' },
        { opacity: 1, scale: 1, y: 0, filter: 'blur(0px)',
          duration: 0.65, ease: 'power3.out' },
        3.7);

      // 模糊气泡 1 (4.5s)
      tl.fromTo(root + ' #bad-q1',
        { opacity: 0, x: -16, y: 8 },
        { opacity: 1, x: 0, y: 0, duration: 0.5, ease: 'power3.out' },
        4.5);
      // 模糊气泡 2 (6.0s)
      tl.fromTo(root + ' #bad-q2',
        { opacity: 0, x: -16, y: 8 },
        { opacity: 1, x: 0, y: 0, duration: 0.5, ease: 'power3.out' },
        6.0);

      // Claude 蒙圈响应（7.5s）
      tl.fromTo(root + ' #bad-resp',
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' },
        7.5);

      // 蒙圈文字逐字打字
      const confusedTxt = '???  这里指什么？';
      const confStart = 7.9;
      const confDur = 0.06;
      confusedTxt.split('').forEach((ch, i) => {
        tl.call(() => {
          const el = document.querySelector(root + ' #bad-resp-1');
          if (el) el.textContent = confusedTxt.slice(0, i + 1);
        }, [], confStart + i * confDur);
      });
      // 第二行（模糊产出）8.6s
      tl.call(() => {
        const el = document.querySelector(root + ' #bad-resp-2');
        if (el) el.textContent = '// TODO: ??? 等待用户澄清…';
      }, [], 8.6);

      // ============================================================
      // Cue C (9.0-13.5): BAD 卡片淡化 + 右 GOOD 卡片入场 + 具体气泡
      // ============================================================
      // BAD 卡片淡化到 .35
      tl.to(root + ' #bad-card',
        { opacity: 0.35, scale: 0.98, duration: 0.7, ease: 'power2.inOut' },
        9.2);

      // GOOD 卡片入场（11.3s 起，配合"学会抛问题"）
      tl.fromTo(root + ' #good-card',
        { opacity: 0, x: 30, y: 16, filter: 'blur(10px)' },
        { opacity: 1, x: 0, y: 0, filter: 'blur(0px)', duration: 0.6, ease: 'power3.out' },
        11.3);

      // 具体气泡 1 (12.0s)
      tl.fromTo(root + ' #good-q1',
        { opacity: 0, x: -16, y: 8 },
        { opacity: 1, x: 0, y: 0, duration: 0.5, ease: 'power3.out' },
        12.0);
      // 具体气泡 2 (13.0s)
      tl.fromTo(root + ' #good-q2',
        { opacity: 0, x: -16, y: 8 },
        { opacity: 1, x: 0, y: 0, duration: 0.5, ease: 'power3.out' },
        13.0);

      // ============================================================
      // Cue D (13.5-19.3): GOOD 卡 Claude 推理 3 步 stagger reveal
      // ============================================================
      tl.fromTo(root + ' #good-resp',
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' },
        14.0);

      // 3 步推理 stagger（每条 1.2s 节奏）
      const reasons = ['#reason-1', '#reason-2', '#reason-3'];
      reasons.forEach((sel, i) => {
        const at = 14.5 + i * 1.3;
        tl.fromTo(root + ' ' + sel,
          { opacity: 0, x: -12 },
          { opacity: 1, x: 0, duration: 0.45, ease: 'power3.out' },
          at);
      });

      // GOOD 卡片整体 glow 一次（18.5s "推理逻辑" 高潮）
      tl.to(root + ' #good-card',
        { boxShadow: 'var(--shadow-panel), 0 0 0 2px rgba(78, 143, 114, 0.55), 0 0 48px rgba(78, 143, 114, 0.4)',
          duration: 0.5, yoyo: true, repeat: 1 },
        18.5);

      // ============================================================
      // Cue E (19.3-22.6): 质量条对比 + 「类似计划模式」hint
      // ============================================================
      // 双卡片整体淡化 + 上移让位（quality-row 在下方有空间）
      tl.to([root + ' #bad-card', root + ' #good-card'],
        { y: -20, duration: 0.6, ease: 'power2.out' },
        19.3);

      // quality-row 入场
      tl.fromTo(root + ' #quality-row',
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' },
        19.3);

      // BAD quality 30%（缓慢爬升 0.9s）
      tl.to(root + ' #bad-fill',
        { width: '30%', duration: 0.9, ease: 'power2.out' }, 19.6);
      tl.to({}, {
        duration: 0.9, ease: 'power2.out',
        onUpdate: function () {
          const p = this.progress();
          const val = Math.round(30 * p);
          const el = document.querySelector(root + ' #bad-pct');
          if (el) el.textContent = val + '%';
        }
      }, 19.6);

      // GOOD quality 90%（缓慢爬升 1.2s，更长更骄傲）
      tl.to(root + ' #good-fill',
        { width: '90%', duration: 1.2, ease: 'power2.out' }, 19.9);
      tl.to({}, {
        duration: 1.2, ease: 'power2.out',
        onUpdate: function () {
          const p = this.progress();
          const val = Math.round(90 * p);
          const el = document.querySelector(root + ' #good-pct');
          if (el) el.textContent = val + '%';
        }
      }, 19.9);

      // 「类似计划模式」hint chip（21.2s 配合口播 callback）
      tl.fromTo(root + ' #similar-hint',
        { opacity: 0, scale: 0.8, y: 8 },
        { opacity: 1, scale: 1, y: 0, duration: 0.55, ease: 'back.out(1.5)' },
        21.2);

      // ============================================================
      // Cue F (22.6-24.233): hero hold「具体一点」
      // ============================================================
      tl.to(root + ' #sr-stage',
        { opacity: 0, y: -16, duration: 0.55, ease: 'power2.in' },
        22.2);

      tl.fromTo(root + ' #closing-block',
        { opacity: 0, y: 28, filter: 'blur(14px)' },
        { opacity: 1, y: 0, filter: 'blur(0px)',
          duration: 0.7, ease: 'power3.out' },
        22.7);
      tl.fromTo(root + ' #closing-block .chrome-text',
        { backgroundPosition: '100% 0' },
        { backgroundPosition: '0% 0', duration: 0.7, ease: 'power2.out' },
        22.9);

      tl.to(root + ' #particles',
        { opacity: 1, duration: 0.4, ease: 'power2.out' }, 23.1);
      tl.to(root + ' .particle',
        { y: '-=18', duration: 0.9, repeat: 0, ease: 'sine.inOut',
          stagger: { each: 0.06, from: 'random' } },
        23.3);

      // ===== Pad timeline =====
      tl.to({}, { duration: SLOT }, 0);
      window.__timelines["tip-05-specific"] = tl;
    })();
  </script>
</body>
</html>
