<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>N1-1 — 陈与小金 Website Teaser (15s)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #0A0A0A;
      }
      .beat-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px; height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="n1-1-mywebsite"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <!-- Beat 1 — Hook (0–3s) -->
      <div
        id="beat-1-hook-host"
        class="beat-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/beat-1-hook.html"
        data-start="0"
        data-duration="3"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 2 — Identity (3–7s) -->
      <div
        id="beat-2-identity-host"
        class="beat-layer"
        data-composition-id="beat-2-identity"
        data-composition-src="compositions/beat-2-identity.html"
        data-start="3"
        data-duration="4"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 3 — Platforms (7–12s) -->
      <div
        id="beat-3-platforms-host"
        class="beat-layer"
        data-composition-id="beat-3-platforms"
        data-composition-src="compositions/beat-3-platforms.html"
        data-start="7"
        data-duration="5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Beat 4 — Outro (12–15s) -->
      <div
        id="beat-4-outro-host"
        class="beat-layer"
        data-composition-id="beat-4-outro"
        data-composition-src="compositions/beat-4-outro.html"
        data-start="12"
        data-duration="3"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      const tl = gsap.timeline({ paused: true });
      // Root anchor — 15s slot. Sub-composition timelines auto-link.
      tl.to({}, { duration: 15 }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines["n1-1-mywebsite"] = tl;
    </script>
  </body>
</html>
