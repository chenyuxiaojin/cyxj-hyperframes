<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #0A0A0A;
      }
      [data-composition-id="beat-4-outro"] {
        position: relative;
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #0A0A0A;
      }
      .b4-smoke-main {
        position: absolute; inset: 0;
        background-image: url("../assets/smoke-main-tiled.webp");
        background-size: 1200px auto;
        background-repeat: repeat;
        opacity: 0.55;
        z-index: 1;
        mix-blend-mode: screen;
      }
      .b4-smoke-mist {
        position: absolute; inset: 0;
        background-image: url("../assets/smoke-mist-tiled.webp");
        background-size: 1600px auto;
        background-repeat: repeat;
        opacity: 0.35;
        z-index: 2;
        mix-blend-mode: screen;
      }
      .b4-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        gap: 36px;
      }
      .b4-url {
        position: relative;
        font-family: "Inter", sans-serif;
        font-weight: 900;
        font-size: 96px;
        color: #FF6BB3;
        letter-spacing: 0.04em;
        opacity: 0;
        text-shadow: 0 0 40px rgba(255, 107, 179, 0.45);
      }
      .b4-url-shimmer {
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.55) 50%,
          transparent 70%);
        background-size: 200% 100%;
        background-position: -150% 0;
        mix-blend-mode: overlay;
        pointer-events: none;
        opacity: 0;
      }
      .b4-tagline {
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 22px;
        color: #C7C7C7;
        letter-spacing: 0.18em;
        opacity: 0;
      }
      .b4-grain {
        position: absolute;
        inset: -50%;
        width: 200%;
        height: 200%;
        z-index: 95;
        pointer-events: none;
        opacity: 0.15;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        animation: b4-grain-shake 0.5s steps(1) infinite;
      }
      @keyframes b4-grain-shake {
        0%,100% { transform: translate(0,0); }
        20% { transform: translate(-5%,3%); }
        40% { transform: translate(4%,-6%); }
        60% { transform: translate(-3%,5%); }
        80% { transform: translate(6%,2%); }
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="beat-4-outro"
      data-start="0"
      data-duration="3"
      data-width="1920"
      data-height="1080"
    >
      <div class="b4-smoke-main"></div>
      <div class="b4-smoke-mist"></div>

      <div class="b4-center">
        <div class="b4-url">
          demo.xiaochens.com
          <div class="b4-url-shimmer"></div>
        </div>
        <div class="b4-tagline">BUILT WITH CLAUDE CODE</div>
      </div>

      <div class="b4-grain"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true, defaults: { overwrite: "auto" } });

      // URL emerge
      tl.fromTo(".b4-url",
        { scale: 1.3, opacity: 0, filter: "blur(18px)" },
        { scale: 1.0, opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "expo.out" },
        0
      );

      // Shimmer sweep
      tl.fromTo(".b4-url-shimmer",
        { backgroundPosition: "-150% 0", opacity: 0 },
        { backgroundPosition: "150% 0", opacity: 1, duration: 0.6, ease: "power2.inOut" },
        0.5
      );
      tl.to(".b4-url-shimmer", { opacity: 0, duration: 0.2 }, 1.1);

      // Tagline rise in
      tl.fromTo(".b4-tagline",
        { y: 12, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
        1.0
      );

      // Grain intensify
      tl.to(".b4-grain", { opacity: 0.22, duration: 1.0, ease: "linear" }, 2.0);

      // Final ping
      tl.to(".b4-url", { scale: 1.03, duration: 0.15, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.7);

      tl.to({}, { duration: 3 }, 0);

      window.__timelines["beat-4-outro"] = tl;
    </script>
  </body>
</html>
