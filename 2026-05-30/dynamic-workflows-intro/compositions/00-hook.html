    <script>

      const C = '[data-composition-id="beat-0-hook"]';
      const tl = gsap.timeline({ paused: true });

      // local 0 = master 0 (本拍从 0 开始)。reframe 在主时间线 2.4–3.1 落地。
      // 全部先隐藏 (tl.set @0)，host 满屏期干净。
      tl.set(C + " .b0-kicker", { opacity: 0, y: -24 }, 0);
      tl.set(C + " .b0-hero-zh", { opacity: 0, y: 52 }, 0);
      tl.set(C + " .b0-logo-mark", { opacity: 0, scale: 0.6 }, 0);
      tl.set(C + " .b0-hero-en-text", { opacity: 0, x: -20 }, 0);
      tl.set(C + " .b0-tag", { opacity: 0, y: 20 }, 0);
      tl.set(C + " .b0-tag-mark", { scaleX: 0 }, 0);

      // 入场 (卡口播): 2.6 kicker / 2.9 "随Opus4.8" 大字 / 3.5 logo+en / 7.4 "最期待" tag
      tl.to(C + " .b0-kicker", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 2.6);
      tl.to(C + " .b0-hero-zh", { opacity: 1, y: 0, duration: 0.85, ease: "power3.out" }, 2.9);
      tl.to(C + " .b0-logo-mark", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 3.5);
      tl.to(C + " .b0-hero-en-text", { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 3.6);
      tl.to(C + " .b0-tag", { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 7.4);
      tl.to(C + " .b0-tag-mark", { scaleX: 1, duration: 0.5, ease: "power2.inOut" }, 7.75);
      // 无 exit 动画 (非最后一拍)；内容 hold 到 10.48，转场由后续拍接管。

      // ★哨兵：时间线长度 = data-duration，入场时间码才精确 (HF 按比例 seek)。
      tl.set({}, {}, 10.48);

      window.__timelines["beat-0-hook"] = tl;
    </script>
