<template id="beat-2-terminal-template">
  <div
    data-composition-id="beat-2-terminal"
    data-start="0"
    data-duration="5.78"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Segment B (master 5.46–11.24s, local 0–5.78s)
      Speech: "演示如何让 Claude Code 帮我添加这些和这些"
      Key word "Claude Code" lands at master 7.50s = local 2.04s.

      Stage layout:
        - LEFT: simulated Claude Code terminal window (x:80–700, y:200–880)
          Stays clear of the speaker's face which sits horizontally around
          x:700–1100. The terminal is the hero — the prompt typewriter
          finishes reaching the word "claude-code" right around local 2.04s
          so the audio "Claude Code" lands on the moment the user can read
          the binary name.
        - RIGHT-TOP: small frosted-glass status HUD (model / context /
          status). Reinforces the "agent is actually working" read without
          competing with the terminal.

      Visual language matches 04-mg-and-charts.html (frosted glass, Claude
      orange, JetBrains Mono) and 01-hook.html (deep shadow, halo glow).
    -->

    <!-- ============== LEFT — terminal window ============== -->
    <div class="b2-term">
      <!-- mac-style chrome: traffic-light dots + title + active indicator -->
      <div class="b2-term-chrome">
        <span class="b2-dot b2-dot-r"></span>
        <span class="b2-dot b2-dot-y"></span>
        <span class="b2-dot b2-dot-g"></span>
        <span class="b2-term-title">claude-code &nbsp;·&nbsp; ~/xcyj-demo</span>
        <span class="b2-term-pulse"></span>
      </div>

      <!-- terminal body — typewriter, thinking, tool log, code, done -->
      <div class="b2-term-body">
        <!-- Line 1: prompt with typewriter. The visible text is held
             in a span we mutate via GSAP.to(counter,...) onUpdate. -->
        <div class="b2-line b2-prompt-line">
          <span class="b2-caret">❯</span>
          <span class="b2-prompt-cmd">claude-code </span><span class="b2-prompt-arg">"add motion graphics to my video"</span><span class="b2-cursor">▋</span>
        </div>

        <!-- Thinking indicator — rotating glyph + bouncing dots -->
        <div class="b2-line b2-thinking">
          <span class="b2-spinner">◐</span>
          <span class="b2-thinking-text">Thinking</span><span class="b2-bounce-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>

        <!-- Tool-call log — three rows, staggered -->
        <div class="b2-log">
          <div class="b2-log-row" data-row="0">
            <span class="b2-arrow">→</span>
            <span class="b2-tool">analyzing</span>
            <span class="b2-arg">recording.mp4</span>
            <span class="b2-badge b2-ok">ok</span>
          </div>
          <div class="b2-log-row" data-row="1">
            <span class="b2-arrow">→</span>
            <span class="b2-tool">detecting</span>
            <span class="b2-arg">key beats</span>
            <span class="b2-badge b2-ok">3 found</span>
          </div>
          <div class="b2-log-row" data-row="2">
            <span class="b2-arrow">→</span>
            <span class="b2-tool">generating</span>
            <span class="b2-arg">motion graphics</span>
            <span class="b2-badge b2-run">run</span>
          </div>
        </div>

        <!-- Generated code block -->
        <div class="b2-code">
          <div class="b2-code-line">
            <span class="b2-c-fn">gsap</span><span class="b2-c-op">.</span><span class="b2-c-fn">from</span><span class="b2-c-op">(</span><span class="b2-c-str">".title"</span><span class="b2-c-op">, {</span>
          </div>
          <div class="b2-code-line b2-code-indent">
            <span class="b2-c-key">y</span><span class="b2-c-op">:</span> <span class="b2-c-num">40</span><span class="b2-c-op">,</span> <span class="b2-c-key">opacity</span><span class="b2-c-op">:</span> <span class="b2-c-num">0</span><span class="b2-c-op">,</span>
          </div>
          <div class="b2-code-line b2-code-indent">
            <span class="b2-c-key">duration</span><span class="b2-c-op">:</span> <span class="b2-c-num">0.6</span><span class="b2-c-op">,</span> <span class="b2-c-key">ease</span><span class="b2-c-op">:</span> <span class="b2-c-str">"power3.out"</span>
          </div>
          <div class="b2-code-line">
            <span class="b2-c-op">});</span>
          </div>
        </div>

        <!-- Done line -->
        <div class="b2-line b2-done">
          <span class="b2-check">✓</span>
          <span class="b2-done-text">4 motion graphics generated</span>
        </div>
      </div>
    </div>

    <style>

          0 30px 80px rgba(0, 0, 0, 0.4),

        align-items: center;
        gap: 8px;
      }
      [data-composition-id="beat-2-terminal"] .b2-hud-led {

        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 0 rgba(217, 119, 87, 0);

      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ---- helpers ----
        // typewriter: mutates a target element's textContent over `duration`
        // seconds from 0 chars → full string. Uses a counter we tween.
        const typewriter = (selector, fullText, startAt, duration) => {
          const el = document.querySelector(selector);
          if (!el) return;
          // Clear initial visible text — leave only an empty container.
          el.textContent = "";
          const counter = { i: 0 };
          tl.to(counter, {
            i: fullText.length,
            duration,
            ease: "none",
            onUpdate: () => {
              const n = Math.floor(counter.i);
              el.textContent = fullText.slice(0, n);
            },
          }, startAt);
        };

        // ====================================================
        // PHASE 0 (0.00–0.50s) — terminal window + HUD enter
        // ====================================================
        tl.from('[data-composition-id="beat-2-terminal"] .b2-term',
          { x: -60, opacity: 0, filter: "blur(16px)",
            duration: 0.55, ease: "power3.out" }, 0.00);
        tl.from('[data-composition-id="beat-2-terminal"] .b2-term-chrome',
          { y: -8, opacity: 0, duration: 0.35, ease: "power2.out" }, 0.18);
        tl.from('[data-composition-id="beat-2-terminal"] .b2-hud',
          { x: 60, opacity: 0, filter: "blur(14px)",
            duration: 0.55, ease: "power3.out" }, 0.10);
        tl.from('[data-composition-id="beat-2-terminal"] .b2-hud-eyebrow',
          { x: 12, opacity: 0, duration: 0.3, ease: "expo.out" }, 0.28);

        // tiny pulse on the chrome's brand light — finite (10 reps over ~5s)
        gsap.to('[data-composition-id="beat-2-terminal"] .b2-term-pulse',
          { opacity: 0.45, duration: 0.5, repeat: 10, yoyo: true,
            ease: "sine.inOut", delay: 0.20 });

        // ====================================================
        // PHASE 1 (0.50–2.04s) — prompt typewriter
        //   "claude-code " (12 chars) lands around local 1.6–2.0s
        //   so the spoken "Claude Code" @ master 7.50 (= local 2.04)
        //   syncs with the user reading the binary name.
        // ====================================================
        // Hide initial cursor; flash it AFTER prompt typewriter completes.
        gsap.set('[data-composition-id="beat-2-terminal"] .b2-cursor',
          { opacity: 0 });

        // Type the binary name first (slower — this is the keyword moment).
        // .b2-prompt-cmd already contains "claude-code " — we re-type it.
        typewriter(
          '[data-composition-id="beat-2-terminal"] .b2-prompt-cmd',
          "claude-code ",
          0.55, 1.10
        );
        // Then the quoted argument (faster, supporting role).
        typewriter(
          '[data-composition-id="beat-2-terminal"] .b2-prompt-arg',
          '"add motion graphics to my video"',
          1.65, 0.42
        );

        // Cursor fades in + blinks finite (8 blinks across the rest of comp)
        tl.to('[data-composition-id="beat-2-terminal"] .b2-cursor',
          { opacity: 1, duration: 0.15, ease: "power1.in" }, 2.10);
        gsap.to('[data-composition-id="beat-2-terminal"] .b2-cursor',
          { opacity: 0, duration: 0.32, repeat: 9, yoyo: true,
            ease: "steps(1)", delay: 2.20 });

        // ====================================================
        // PHASE 2 (2.04–3.0s) — Thinking indicator
        // ====================================================
        tl.from('[data-composition-id="beat-2-terminal"] .b2-thinking',
          { y: 6, opacity: 0, duration: 0.30, ease: "power2.out" }, 2.20);

        // Spinner rotates — 720deg over 1.4s, then stops (replaced by log)
        gsap.to('[data-composition-id="beat-2-terminal"] .b2-spinner',
          { rotate: 720, duration: 1.4, ease: "none", delay: 2.20 });

        // Bounce dots: each dot pops with stagger, repeats 3 times
        gsap.fromTo(
          '[data-composition-id="beat-2-terminal"] .b2-bounce-dots span',
          { y: 0, opacity: 0.4 },
          { y: -4, opacity: 1, duration: 0.28, repeat: 5, yoyo: true,
            stagger: 0.12, ease: "sine.inOut", delay: 2.30 }
        );

        // HUD model populates around now — single keystroke pop
        gsap.set('[data-composition-id="beat-2-terminal"] .b2-hud-model',
          { opacity: 0 });
        tl.to('[data-composition-id="beat-2-terminal"] .b2-hud-model',
          { opacity: 1, duration: 0.25, ease: "power2.out" }, 2.30);

        // HUD context — count up 0 → 12_400 tokens
        const ctxEl = document.querySelector(
          '[data-composition-id="beat-2-terminal"] .b2-hud-ctx'
        );
        const ctxCounter = { v: 0 };
        tl.to(ctxCounter, {
          v: 12400, duration: 1.6, ease: "power2.out",
          onUpdate: () => {
            if (ctxEl) {
              ctxEl.textContent =
                ctxCounter.v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",")
                + " tokens";
            }
          },
        }, 2.40);

        // HUD status flips IDLE → ACTIVE
        const stateEl = document.querySelector(
          '[data-composition-id="beat-2-terminal"] .b2-hud-state-text'
        );
        const ledEl = document.querySelector(
          '[data-composition-id="beat-2-terminal"] .b2-hud-led'
        );
        tl.call(() => {
          if (stateEl) stateEl.textContent = "ACTIVE";
          if (stateEl) stateEl.style.color = "#8dffb8";
          if (ledEl) {
            ledEl.style.background = "#8dffb8";
            ledEl.style.boxShadow = "0 0 12px #8dffb8";
          }
        }, [], 2.50);
        // LED breathes — finite 6 reps
        gsap.to('[data-composition-id="beat-2-terminal"] .b2-hud-led',
          { boxShadow: "0 0 22px #8dffb8, 0 0 36px rgba(141,255,184,0.5)",
            duration: 0.55, repeat: 5, yoyo: true,
            ease: "sine.inOut", delay: 2.55 });

        // ====================================================
        // PHASE 3 (3.0–5.0s) — tool log lines + code block
        // ====================================================
        // Three log rows fade-in with staggered slide-from-left.
        const logRows = document.querySelectorAll(
          '[data-composition-id="beat-2-terminal"] .b2-log-row'
        );
        const logTimes = [3.00, 3.32, 3.66];
        logRows.forEach((row, i) => {
          tl.from(row,
            { x: -16, opacity: 0, duration: 0.32, ease: "power3.out" },
            logTimes[i]);
          // small badge pop after the row is visible
          tl.from(row.querySelector(".b2-badge"),
            { scale: 0.7, opacity: 0, duration: 0.25,
              ease: "back.out(1.6)" },
            logTimes[i] + 0.18);
        });

        // Code block container reveals.
        tl.from('[data-composition-id="beat-2-terminal"] .b2-code',
          { y: 16, opacity: 0, filter: "blur(8px)",
            duration: 0.35, ease: "power3.out" }, 3.95);

        // Code lines stream in one-by-one.
        const codeLines = document.querySelectorAll(
          '[data-composition-id="beat-2-terminal"] .b2-code .b2-code-line'
        );
        codeLines.forEach((ln, i) => {
          tl.from(ln,
            { x: -8, opacity: 0, duration: 0.22, ease: "power2.out" },
            4.05 + i * 0.10);
        });

        // ====================================================
        // PHASE 4 (5.0–5.78s) — done line + final flash
        // ====================================================
        tl.from('[data-composition-id="beat-2-terminal"] .b2-done',
          { y: 8, opacity: 0, duration: 0.30, ease: "power3.out" }, 5.05);
        tl.from('[data-composition-id="beat-2-terminal"] .b2-check',
          { scale: 0.5, opacity: 0, duration: 0.32,
            ease: "back.out(2.0)" }, 5.10);

        // Subtle window glow uptick on completion (2 yoyos)
        gsap.to('[data-composition-id="beat-2-terminal"] .b2-term',
          { boxShadow:
              "0 40px 100px rgba(0,0,0,0.65), " +
              "0 0 0 1px rgba(255,255,255,0.04) inset, " +
              "0 0 120px rgba(217,119,87,0.32)",
            duration: 0.45, repeat: 1, yoyo: true,
