<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>XCYJ — Codex × Claude Code 教程片头</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #050810;
        font-family: "Noto Sans SC", "Inter", sans-serif;
        color: #ffffff;
      }
      /* 透视网格背景层（参考 MOTION_PHILOSOPHY 的"perspective grid + crosshairs + vignette + grain"基线） */
      .grid-bg {
        position: absolute;
        inset: 0;
        background-color: #050810;
        background-image:
          linear-gradient(rgba(120, 160, 220, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(120, 160, 220, 0.05) 1px, transparent 1px);
        background-size: 80px 80px;
        z-index: 0;
      }
      .grid-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.55) 100%);
        pointer-events: none;
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        z-index: 5;
      }
      /* 字幕层基础样式（中文为主，先按 beat 整段时码塞入；后期可在达芬奇里调精度）
         默认 opacity:1，hyperframes 的 clip 类会按 data-start/duration 控制显隐。 */
      .caption {
        position: absolute;
        left: 50%;
        bottom: 80px;
        transform: translateX(-50%);
        max-width: 1720px;
        padding: 18px 36px;
        background: rgba(0, 0, 0, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        font-size: 38px;
        font-weight: 500;
        line-height: 1.32;
        letter-spacing: 0.02em;
        color: #ffffff;
        text-align: center;
        z-index: 30;
        text-shadow: 0 0 12px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="xcyj-codex-claude-intro"
      data-start="0"
      data-duration="52"
      data-width="1920"
      data-height="1080"
    >
      <!-- 背景层：深蓝透视网格 + vignette -->
      <div class="grid-bg"></div>

      <!-- BEAT 1 — Hook: Codex × Claude Code 标题钩子 -->
      <div
        id="beat-1"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="6"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 2 — Debate: GPT 5.5 vs Opus 4.7 → 用 Codex 插件结合 -->
      <div
        id="beat-2"
        class="scene-layer"
        data-composition-id="beat-2-debate"
        data-composition-src="compositions/02-debate.html"
        data-start="6"
        data-duration="7"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 3 — Terminal: claude mcp add codex 演示 + ✓ Codex connected -->
      <div
        id="beat-3"
        class="scene-layer"
        data-composition-id="beat-3-terminal"
        data-composition-src="compositions/03-terminal.html"
        data-start="13"
        data-duration="10"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 4 — Topics: 九大主题 stagger 列表 -->
      <div
        id="beat-4"
        class="scene-layer"
        data-composition-id="beat-4-topics"
        data-composition-src="compositions/04-topics.html"
        data-start="23"
        data-duration="14"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 5 — Thesis: 1+1>2 kinetic type -->
      <div
        id="beat-5"
        class="scene-layer"
        data-composition-id="beat-5-thesis"
        data-composition-src="compositions/05-thesis.html"
        data-start="37"
        data-duration="6"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 6 — CTA: 订阅引导卡 -->
      <div
        id="beat-6"
        class="scene-layer"
        data-composition-id="beat-6-cta"
        data-composition-src="compositions/06-cta.html"
        data-start="43"
        data-duration="5"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 7 — Outro: 频道 ID + 网格缓退 hold -->
      <div
        id="beat-7"
        class="scene-layer"
        data-composition-id="beat-7-outro"
        data-composition-src="compositions/07-outro.html"
        data-start="48"
        data-duration="4"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- 字幕层（按 beat 整段时码，data-track-index=20 与子合成解耦；
           后期可在达芬奇里替换/精修，此处仅占位文案模板） -->
      <div
        class="caption clip"
        data-start="0.5"
        data-duration="5.0"
        data-track-index="20"
      >最近 Codex 和 Claude Code 的组合热度极高</div>

      <div
        class="caption clip"
        data-start="6.5"
        data-duration="6.0"
        data-track-index="20"
      >GPT 5.5 还是 Opus 4.7？为什么不用 Codex 插件把两者结合起来</div>

      <div
        class="caption clip"
        data-start="13.5"
        data-duration="9.0"
        data-track-index="20"
      >在 Claude Code 会话中引入 Codex —— 你的"第二双眼睛"</div>

      <div
        class="caption clip"
        data-start="23.5"
        data-duration="13.0"
        data-track-index="20"
      >下期保姆级教程 · 9 大主题全方位覆盖</div>

      <div
        class="caption clip"
        data-start="37.5"
        data-duration="5.0"
        data-track-index="20"
      >今天先看看怎么把 Codex 嵌入 Claude Code，发挥 1+1&gt;2 的威力</div>

      <div
        class="caption clip"
        data-start="43.5"
        data-duration="4.0"
        data-track-index="20"
      >听起来很有趣？订阅频道，直接进入正题</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // 主合成时长锚点：52s（7 个 beat 串联：6 + 7 + 10 + 14 + 6 + 5 + 4 = 52）
      mainTl.to({}, { duration: 52 }, 0);
      window.__timelines["xcyj-codex-claude-intro"] = mainTl;
    </script>
  </body>
</html>
