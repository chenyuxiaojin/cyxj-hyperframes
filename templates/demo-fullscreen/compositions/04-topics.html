<template id="beat-4-topics-template">
  <div
    data-composition-id="beat-4-topics"
    data-start="0"
    data-duration="14"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Beat 4 (master 23.0–37.0s, local 0–14s)
      九大主题预告列表。文案："下期保姆级教程涵盖：安装、基础用法、代码管理、
      云端模式、记忆功能、自动化、技能库、MCP、计算机自动化控制"。

      Layout:
        - 顶部 eyebrow + 中央标题（0-1.5s 入场）
        - 9 项纵向 list（居中 980px 宽），编号 + 中文 + 英文 subtitle
        - stagger 入场（1.0-2.5s）
        - 然后焦点 cycling 高亮，每项 ~1.05s（2.7-12.15s）
        - 12.15-14.0s 总览卡 + whip out

      硬编码 selector（不用 template literal，避免 lint 报错）。
    -->

    <div class="b4-stage">
      <div class="b4-eyebrow">下期完整教程预告 · NEXT EPISODE</div>
      <div class="b4-headline">
        <span class="b4-num">9</span><span class="b4-headline-text"> 大主题</span>
      </div>

      <ul class="b4-list">
        <li class="b4-item" data-idx="1">
          <span class="b4-no">01</span>
          <span class="b4-zh">安装</span>
          <span class="b4-en">Installation</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="2">
          <span class="b4-no">02</span>
          <span class="b4-zh">基础用法</span>
          <span class="b4-en">Basic Usage</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="3">
          <span class="b4-no">03</span>
          <span class="b4-zh">代码管理</span>
          <span class="b4-en">Code Management</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="4">
          <span class="b4-no">04</span>
          <span class="b4-zh">云端模式</span>
          <span class="b4-en">Cloud Mode</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="5">
          <span class="b4-no">05</span>
          <span class="b4-zh">记忆功能</span>
          <span class="b4-en">Memory</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="6">
          <span class="b4-no">06</span>
          <span class="b4-zh">自动化</span>
          <span class="b4-en">Automation</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="7">
          <span class="b4-no">07</span>
          <span class="b4-zh">技能库</span>
          <span class="b4-en">Skills</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="8">
          <span class="b4-no">08</span>
          <span class="b4-zh">MCP</span>
          <span class="b4-en">Model Context Protocol</span>
          <span class="b4-bar"></span>
        </li>
        <li class="b4-item" data-idx="9">
          <span class="b4-no">09</span>
          <span class="b4-zh">计算机控制</span>
          <span class="b4-en">Computer Use</span>
          <span class="b4-bar"></span>
        </li>
      </ul>
    </div>

    <style>
      [data-composition-id="beat-4-topics"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
      }
      [data-composition-id="beat-4-topics"] .b4-stage {
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 1100px;
        padding-top: 70px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      [data-composition-id="beat-4-topics"] .b4-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.42em;
        padding-left: 0.42em;
        color: #d97757;
        text-shadow: 0 0 16px rgba(217, 119, 87, 0.65);
        margin-bottom: 18px;
      }
      [data-composition-id="beat-4-topics"] .b4-headline {
        font-size: 88px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
        margin-bottom: 36px;
        display: flex;
        align-items: baseline;
      }
      [data-composition-id="beat-4-topics"] .b4-num {
        font-family: "Inter", sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 28px rgba(217, 119, 87, 0.55),
          0 0 56px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-4-topics"] .b4-headline-text {
        background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 62%, #ededed 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      [data-composition-id="beat-4-topics"] .b4-list {
        list-style: none;
        margin: 0;
        padding: 0;
        width: 980px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      [data-composition-id="beat-4-topics"] .b4-item {
        position: relative;
        display: grid;
        grid-template-columns: 90px 280px 1fr;
        align-items: center;
        gap: 28px;
        padding: 14px 28px 14px 24px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.025),
          rgba(255, 255, 255, 0.015) 60%,
          rgba(255, 255, 255, 0)
        );
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        opacity: 0.45;
        transform: translateZ(0);
        transition: none;
      }
      [data-composition-id="beat-4-topics"] .b4-no {
        font-family: "JetBrains Mono", monospace;
        font-size: 28px;
        font-weight: 700;
        color: rgba(217, 119, 87, 0.55);
        letter-spacing: 0.04em;
      }
      [data-composition-id="beat-4-topics"] .b4-zh {
        font-size: 36px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.01em;
      }
      [data-composition-id="beat-4-topics"] .b4-en {
        font-family: "Inter", sans-serif;
        font-size: 20px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.04em;
      }
      [data-composition-id="beat-4-topics"] .b4-bar {
        position: absolute;
        left: 0; top: 14%;
        width: 4px;
        height: 72%;
        background: linear-gradient(180deg, #d97757, rgba(217, 119, 87, 0));
        border-radius: 0 4px 4px 0;
        box-shadow: 0 0 14px rgba(217, 119, 87, 0.65);
        opacity: 0;
      }
      [data-composition-id="beat-4-topics"] .b4-item.is-active {
        opacity: 1;
      }
      [data-composition-id="beat-4-topics"] .b4-item.is-active .b4-no {
        color: #d97757;
        text-shadow: 0 0 14px rgba(217, 119, 87, 0.7);
      }
      [data-composition-id="beat-4-topics"] .b4-item.is-active .b4-bar {
        opacity: 1;
      }
    </style>

    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ====================================================
        // PHASE 0 (0.0–1.5s) — eyebrow + headline 入场
        // ====================================================
        tl.from('[data-composition-id="beat-4-topics"] .b4-eyebrow',
          { y: 12, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.20);
        tl.from('[data-composition-id="beat-4-topics"] .b4-num',
          { scale: 0.5, opacity: 0, duration: 0.55,
            ease: "back.out(1.8)" }, 0.55);
        tl.from('[data-composition-id="beat-4-topics"] .b4-headline-text',
          { x: -16, opacity: 0, filter: "blur(10px)",
            duration: 0.50, ease: "power3.out" }, 0.85);

        // ====================================================
        // PHASE 1 (1.0–2.5s) — 9 items stagger fade-up
        // ====================================================
        tl.from('[data-composition-id="beat-4-topics"] .b4-item',
          { y: 24, opacity: 0, filter: "blur(6px)",
            duration: 0.40, stagger: 0.12,
            ease: "power3.out" }, 1.10);

        // ====================================================
        // PHASE 2 (2.7–12.15s) — focus cycling，每项约 1.05s
        // 9 项 × 1.05s = 9.45s。从 2.7 开始到 12.15 结束。
        // ====================================================
        const items = document.querySelectorAll(
          '[data-composition-id="beat-4-topics"] .b4-item'
        );
        const FOCUS_DUR = 1.05;
        const FOCUS_START = 2.7;
        items.forEach((item, i) => {
          tl.call(() => {
            // 清掉上一项
            items.forEach((other) => other.classList.remove("is-active"));
            item.classList.add("is-active");
          }, [], FOCUS_START + i * FOCUS_DUR);
        });

        // ====================================================
        // PHASE 3 (12.15–13.50s) — 全部点亮 + 总览
        // ====================================================
        tl.call(() => {
          items.forEach((item) => item.classList.add("is-active"));
        }, [], 12.15);

        // headline 数字 9 闪一下表示"全部就绪"
        tl.to('[data-composition-id="beat-4-topics"] .b4-num',
          { scale: 1.15, textShadow:
              "0 0 60px rgba(217,119,87,0.95), 0 0 120px rgba(217,119,87,0.5)",
            duration: 0.40, ease: "power2.out" }, 12.25);
        tl.to('[data-composition-id="beat-4-topics"] .b4-num',
          { scale: 1.0, duration: 0.35, ease: "power2.in" }, 12.65);

        // ====================================================
        // PHASE 4 (13.40–14.0s) — whip out
        // ====================================================
        tl.to('[data-composition-id="beat-4-topics"] .b4-stage',
          { y: -40, opacity: 0, filter: "blur(20px)",
            duration: 0.55, ease: "power3.in" }, 13.40);

        // Duration anchor
        tl.to({}, { duration: 14 }, 0);
        window.__timelines["beat-4-topics"] = tl;
      })();
    </script>
  </div>
</template>
