<template id="beat-2-debate-template">
  <div
    data-composition-id="beat-2-debate"
    data-start="0"
    data-duration="7"
    data-width="1920"
    data-height="1080"
  >
    <!--
      Beat 2 (master 6.0–13.0s, local 0–7s)
      文案："关于该用 GPT 5.5 还是 Opus 4.7 的争论不绝于耳。
              既然如此，为什么不利用 Codex 插件，把两者结合起来用呢？"
      Visual：左 GPT 冷白 / 右 Opus 橙 → 中央 VS 闪烁 → 两卡合并 → "Codex Plugin"
    -->

    <div class="b2-eyebrow">THE DEBATE · 一场没必要的争论</div>

    <div class="b2-arena">
      <div class="b2-card b2-card-gpt">
        <div class="b2-card-tag">By OpenAI</div>
        <div class="b2-card-name">GPT 5.5</div>
        <div class="b2-card-stat">
          <span class="b2-stat-dot"></span>
          <span class="b2-stat-dot"></span>
          <span class="b2-stat-dot"></span>
          <span class="b2-stat-dot"></span>
        </div>
        <div class="b2-card-tagline">速度 · 成本 · 多模态</div>
      </div>

      <div class="b2-vs">
        <span class="b2-vs-spark b2-vs-spark-l">⚡</span>
        <span class="b2-vs-text">VS</span>
        <span class="b2-vs-spark b2-vs-spark-r">⚡</span>
      </div>

      <div class="b2-card b2-card-opus">
        <div class="b2-card-tag">By Anthropic</div>
        <div class="b2-card-name">Opus 4.7</div>
        <div class="b2-card-stat">
          <span class="b2-stat-dot"></span>
          <span class="b2-stat-dot"></span>
          <span class="b2-stat-dot"></span>
          <span class="b2-stat-dot"></span>
        </div>
        <div class="b2-card-tagline">推理 · 长文 · 工程</div>
      </div>
    </div>

    <!-- Merge card 出现在合并瞬间 -->
    <div class="b2-merge">
      <div class="b2-merge-eyebrow">既然如此 · WHY NOT BOTH</div>
      <div class="b2-merge-name">Codex × Claude Code</div>
      <div class="b2-merge-tagline">用 Codex 当插件，把两者结合起来</div>
    </div>

    <style>
      [data-composition-id="beat-2-debate"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
      }
      [data-composition-id="beat-2-debate"] .b2-eyebrow {
        position: absolute;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.42em;
        padding-left: 0.42em;
        color: #d97757;
        text-shadow: 0 0 16px rgba(217, 119, 87, 0.65);
      }

      /* arena */
      [data-composition-id="beat-2-debate"] .b2-arena {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        gap: 80px;
      }

      [data-composition-id="beat-2-debate"] .b2-card {
        width: 540px;
        padding: 56px 56px 48px;
        border-radius: 24px;
        backdrop-filter: blur(18px) saturate(1.25);
        -webkit-backdrop-filter: blur(18px) saturate(1.25);
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      /* GPT card — 冷白色调 */
      [data-composition-id="beat-2-debate"] .b2-card-gpt {
        background: linear-gradient(
          150deg,
          rgba(180, 200, 230, 0.10),
          rgba(160, 180, 210, 0.04) 50%,
          rgba(120, 150, 180, 0.06)
        );
        border: 1px solid rgba(160, 200, 240, 0.18);
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 60px rgba(140, 180, 220, 0.18);
      }
      [data-composition-id="beat-2-debate"] .b2-card-gpt .b2-card-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: rgba(170, 200, 235, 0.78);
        text-shadow: 0 0 10px rgba(170, 200, 235, 0.4);
      }
      [data-composition-id="beat-2-debate"] .b2-card-gpt .b2-card-name {
        font-size: 96px;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #c8d8ec 70%, #a8b8cc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 22px rgba(200, 220, 240, 0.32);
      }
      [data-composition-id="beat-2-debate"] .b2-card-gpt .b2-stat-dot {
        background: rgba(200, 220, 240, 0.85);
        box-shadow: 0 0 10px rgba(200, 220, 240, 0.55);
      }

      /* Opus card — Claude 橙 */
      [data-composition-id="beat-2-debate"] .b2-card-opus {
        background: linear-gradient(
          150deg,
          rgba(255, 220, 200, 0.10),
          rgba(217, 119, 87, 0.04) 50%,
          rgba(217, 119, 87, 0.10)
        );
        border: 1px solid rgba(217, 119, 87, 0.25);
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 60px rgba(217, 119, 87, 0.20);
      }
      [data-composition-id="beat-2-debate"] .b2-card-opus .b2-card-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: #d97757;
        text-shadow: 0 0 12px rgba(217, 119, 87, 0.55);
      }
      [data-composition-id="beat-2-debate"] .b2-card-opus .b2-card-name {
        font-size: 96px;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 26px rgba(217, 119, 87, 0.55),
          0 0 52px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-2-debate"] .b2-card-opus .b2-stat-dot {
        background: rgba(217, 119, 87, 0.95);
        box-shadow: 0 0 10px rgba(217, 119, 87, 0.65);
      }

      [data-composition-id="beat-2-debate"] .b2-card-stat {
        display: flex;
        gap: 12px;
      }
      [data-composition-id="beat-2-debate"] .b2-stat-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      [data-composition-id="beat-2-debate"] .b2-card-tagline {
        font-size: 22px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.06em;
      }

      /* VS center */
      [data-composition-id="beat-2-debate"] .b2-vs {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "Inter", sans-serif;
        font-size: 92px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="beat-2-debate"] .b2-vs-text {
        background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 62%, #ededed 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 28px rgba(255, 255, 255, 0.42);
      }
      [data-composition-id="beat-2-debate"] .b2-vs-spark {
        font-size: 56px;
        color: #d97757;
        text-shadow: 0 0 18px rgba(217, 119, 87, 0.85);
      }

      /* merge card */
      [data-composition-id="beat-2-debate"] .b2-merge {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1180px;
        padding: 64px 72px 56px;
        background: linear-gradient(
          150deg,
          rgba(255, 255, 255, 0.08),
          rgba(217, 119, 87, 0.06) 50%,
          rgba(160, 180, 210, 0.04)
        );
        backdrop-filter: blur(20px) saturate(1.3);
        -webkit-backdrop-filter: blur(20px) saturate(1.3);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        box-shadow:
          0 50px 120px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 0 100px rgba(217, 119, 87, 0.22);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        opacity: 0;
      }
      [data-composition-id="beat-2-debate"] .b2-merge-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.42em;
        padding-left: 0.42em;
        color: #d97757;
        text-shadow: 0 0 14px rgba(217, 119, 87, 0.65);
      }
      [data-composition-id="beat-2-debate"] .b2-merge-name {
        font-size: 116px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 30px rgba(217, 119, 87, 0.55),
          0 0 60px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-2-debate"] .b2-merge-tagline {
        font-size: 30px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.78);
        letter-spacing: 0.04em;
      }
    </style>

    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ====================================================
        // PHASE 0 (0.0–1.0s) — eyebrow + 两卡 + VS 入场
        // ====================================================
        tl.from('[data-composition-id="beat-2-debate"] .b2-eyebrow',
          { opacity: 0, y: 12, duration: 0.40, ease: "power3.out" }, 0.10);
        tl.from('[data-composition-id="beat-2-debate"] .b2-card-gpt',
          { x: -80, opacity: 0, filter: "blur(14px)",
            duration: 0.65, ease: "power3.out" }, 0.30);
        tl.from('[data-composition-id="beat-2-debate"] .b2-card-opus',
          { x: 80, opacity: 0, filter: "blur(14px)",
            duration: 0.65, ease: "power3.out" }, 0.30);
        tl.from('[data-composition-id="beat-2-debate"] .b2-vs',
          { scale: 0.3, opacity: 0, rotation: -45,
            duration: 0.55, ease: "back.out(2.0)" }, 0.65);

        // ====================================================
        // PHASE 1 (1.0–3.6s) — 双方"争论"，交替闪烁高亮
        // ====================================================
        const debateRound = (target, at) => {
          tl.to(target, { scale: 1.05, duration: 0.30,
            ease: "power2.out" }, at);
          tl.to(target, { scale: 1.0, duration: 0.30,
            ease: "power2.in" }, at + 0.30);
        };
        debateRound('[data-composition-id="beat-2-debate"] .b2-card-gpt', 1.10);
        debateRound('[data-composition-id="beat-2-debate"] .b2-card-opus', 1.70);
        debateRound('[data-composition-id="beat-2-debate"] .b2-card-gpt', 2.30);
        debateRound('[data-composition-id="beat-2-debate"] .b2-card-opus', 2.90);

        // VS spark 火花持续
        gsap.fromTo('[data-composition-id="beat-2-debate"] .b2-vs-spark-l',
          { rotate: 0 },
          { rotate: -25, duration: 0.6, repeat: 7, yoyo: true,
            ease: "sine.inOut", delay: 1.10 });
        gsap.fromTo('[data-composition-id="beat-2-debate"] .b2-vs-spark-r',
          { rotate: 0 },
          { rotate: 25, duration: 0.6, repeat: 7, yoyo: true,
            ease: "sine.inOut", delay: 1.10 });

        // ====================================================
        // PHASE 2 (3.6–4.6s) — VS 旋转 + scale up，标志"够了"
        // ====================================================
        tl.to('[data-composition-id="beat-2-debate"] .b2-vs',
          { scale: 1.2, rotation: 360, duration: 0.65,
            ease: "power3.inOut" }, 3.70);
        tl.to('[data-composition-id="beat-2-debate"] .b2-vs',
          { scale: 0.0, opacity: 0, duration: 0.30,
            ease: "power2.in" }, 4.35);

        // ====================================================
        // PHASE 3 (4.4–5.4s) — 两卡向中央合并，opacity 渐出
        // ====================================================
        tl.to('[data-composition-id="beat-2-debate"] .b2-card-gpt',
          { x: 280, scale: 0.7, opacity: 0, filter: "blur(14px)",
            duration: 0.75, ease: "power3.inOut" }, 4.50);
        tl.to('[data-composition-id="beat-2-debate"] .b2-card-opus',
          { x: -280, scale: 0.7, opacity: 0, filter: "blur(14px)",
            duration: 0.75, ease: "power3.inOut" }, 4.50);

        // ====================================================
        // PHASE 4 (5.2–6.4s) — merge 卡出现 + glow
        // ====================================================
        tl.fromTo('[data-composition-id="beat-2-debate"] .b2-merge',
          { opacity: 0, scale: 0.8, filter: "blur(20px)" },
          { opacity: 1, scale: 1.0, filter: "blur(0px)",
            duration: 0.70, ease: "power4.out" }, 5.20);

        tl.from('[data-composition-id="beat-2-debate"] .b2-merge-eyebrow',
          { opacity: 0, y: 10, duration: 0.30,
            ease: "power3.out" }, 5.55);
        tl.from('[data-composition-id="beat-2-debate"] .b2-merge-name',
          { opacity: 0, y: 30, filter: "blur(14px)",
            duration: 0.55, ease: "power4.out" }, 5.70);
        tl.from('[data-composition-id="beat-2-debate"] .b2-merge-tagline',
          { opacity: 0, y: 12, duration: 0.40,
            ease: "power3.out" }, 6.05);

        // ====================================================
        // PHASE 5 (6.4–7.0s) — whip out
        // ====================================================
        tl.to('[data-composition-id="beat-2-debate"] .b2-merge',
          { y: -40, opacity: 0, filter: "blur(20px)",
            duration: 0.55, ease: "power3.in" }, 6.40);

        // Duration anchor
        tl.to({}, { duration: 7 }, 0);
        window.__timelines["beat-2-debate"] = tl;
      })();
    </script>
  </div>
</template>
