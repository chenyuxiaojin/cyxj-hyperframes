<template id="beat-1-hook-template">
  <div
    data-composition-id="beat-1-hook"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <!-- 居中 frosted-glass 卡：演示风格不再 docked left，因为没录屏要让位。
         继承 v2 工程的 chrome-渐变 headline + Claude 橙发光美学。 -->
    <div class="b1-card">
      <div class="b1-eyebrow">PLUGIN COMBO · 陈与小金 · XCYJ</div>
      <div class="b1-headline">
        <span class="b1-codex">Codex</span>
        <span class="b1-cross">×</span>
        <span class="b1-cc">Claude Code</span>
      </div>
      <div class="b1-tagline">最热的 AI 编程组合</div>
      <div class="b1-underline"></div>
    </div>

    <style>
      [data-composition-id="beat-1-hook"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Noto Sans SC", "Inter", sans-serif;
      }
      [data-composition-id="beat-1-hook"] .b1-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1320px;
        padding: 64px 72px 56px;
        background: linear-gradient(
          150deg,
          rgba(255, 255, 255, 0.07),
          rgba(255, 255, 255, 0.02) 45%,
          rgba(217, 119, 87, 0.08)
        );
        backdrop-filter: blur(18px) saturate(1.25);
        -webkit-backdrop-filter: blur(18px) saturate(1.25);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 28px;
        box-shadow:
          0 50px 120px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 80px rgba(217, 119, 87, 0.14);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      [data-composition-id="beat-1-hook"] .b1-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.42em;
        padding-left: 0.42em;
        color: #d97757;
        text-shadow: 0 0 16px rgba(217, 119, 87, 0.65);
      }
      [data-composition-id="beat-1-hook"] .b1-headline {
        font-size: 132px;
        font-weight: 800;
        line-height: 1.0;
        letter-spacing: -0.02em;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 32px;
      }
      [data-composition-id="beat-1-hook"] .b1-codex {
        background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 62%, #ededed 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 22px rgba(255, 255, 255, 0.35),
          0 0 44px rgba(255, 255, 255, 0.14);
      }
      [data-composition-id="beat-1-hook"] .b1-cross {
        font-family: "Inter", sans-serif;
        font-weight: 300;
        font-size: 156px;
        color: #d97757;
        text-shadow:
          0 0 32px rgba(217, 119, 87, 0.85),
          0 0 80px rgba(217, 119, 87, 0.45);
        transform-origin: center;
      }
      [data-composition-id="beat-1-hook"] .b1-cc {
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 26px rgba(217, 119, 87, 0.55),
          0 0 52px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-1-hook"] .b1-tagline {
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.72);
      }
      [data-composition-id="beat-1-hook"] .b1-underline {
        width: 200px;
        height: 5px;
        background: linear-gradient(
          90deg,
          rgba(217, 119, 87, 0),
          #d97757,
          rgba(217, 119, 87, 0)
        );
        border-radius: 3px;
        box-shadow: 0 0 24px rgba(217, 119, 87, 0.85);
      }
    </style>

    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="beat-1-hook"]';

        // 卡入场（blur-clear + 上推）
        tl.from(`${root} .b1-card`,
          { y: 60, opacity: 0, filter: "blur(18px)",
            duration: 0.7, ease: "power3.out" }, 0.20);

        // Eyebrow 横滑入
        tl.from(`${root} .b1-eyebrow`,
          { opacity: 0, x: -16, duration: 0.45, ease: "expo.out" }, 0.85);

        // Headline 三段 stagger："Codex" → "×" → "Claude Code"
        tl.from(`${root} .b1-codex`,
          { y: 40, opacity: 0, filter: "blur(14px)",
            duration: 0.55, ease: "power3.out" }, 1.30);
        tl.from(`${root} .b1-cross`,
          { scale: 0.4, opacity: 0, rotation: -90,
            duration: 0.65, ease: "back.out(2.2)" }, 1.85);
        tl.from(`${root} .b1-cc`,
          { y: 40, opacity: 0, filter: "blur(14px)",
            duration: 0.6, ease: "power4.out" }, 2.50);

        // Tagline + 装饰线
        tl.from(`${root} .b1-tagline`,
          { opacity: 0, y: 12, duration: 0.45, ease: "power2.out" }, 3.30);
        tl.from(`${root} .b1-underline`,
          { width: 0, opacity: 0, duration: 0.5, ease: "expo.out" }, 3.65);

        // × 持续呼吸（4 次 sine yoyo）
        gsap.to(`${root} .b1-cross`,
          { textShadow:
              "0 0 48px rgba(217,119,87,0.95), 0 0 110px rgba(217,119,87,0.55)",
            duration: 1.0, repeat: 4, yoyo: true, ease: "sine.inOut" });

        // Whip 出场：5.4-6.0s blur + scale + opacity
        tl.to(`${root} .b1-card`,
          { y: -40, opacity: 0, filter: "blur(20px)",
            duration: 0.55, ease: "power3.in" }, 5.40);

        // Duration anchor
        tl.to({}, { duration: 6 }, 0);
        window.__timelines["beat-1-hook"] = tl;
      })();
    </script>
  </div>
</template>
